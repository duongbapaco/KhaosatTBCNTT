<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<form id="surveyForm">
  <input type="text" id="user" placeholder="Người sử dụng" required>
  <input type="text" id="dept" placeholder="Bộ phận" required>
  <input type="text" id="device" placeholder="Tên thiết bị" required>
  <textarea id="specs" placeholder="Cấu hình"></textarea>
  <input type="text" id="os" placeholder="HĐH">
  <input type="text" id="office" placeholder="Office">
  <textarea id="others" placeholder="Phần mềm khác"></textarea>
  <textarea id="note" placeholder="Đề xuất/Kiến nghị"></textarea>
  <button type="submit">Gửi khảo sát</button>
</form>

<script>
  const supabase = supabase.createClient('https://xfmmfoidlqnhbdjpzqoe.supabase.co', 'YOUR_ANON_KEY');
  
  document.getElementById('surveyForm').onsubmit = async (e) => {
    e.preventDefault();
    const { data, error } = await supabase.from('survey_devices').insert([{
      full_name: document.getElementById('user').value,
      department: document.getElementById('dept').value,
      device_name: document.getElementById('device').value,
      specs: document.getElementById('specs').value,
      os: document.getElementById('os').value,
      office_version: document.getElementById('office').value,
      other_software: document.getElementById('others').value,
      suggestions: document.getElementById('note').value
    }]);
    if (alert('Đã gửi thành công!')) location.reload();
  };
</script>
