<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Khảo sát Thiết bị CNTT</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
</head>
<body class="bg-light p-3">

<div class="card shadow p-4" style="max-width: 1000px; margin: auto;">
    <h4 class="text-center text-primary mb-4">PHIẾU KHẢO SÁT THIẾT BỊ CNTT</h4>
    <form id="surveyForm">
        <div class="row g-2">
            <div class="col-md-4"><label>Bộ phận</label><input type="text" id="dept" class="form-control" required></div>
            <div class="col-md-4"><label>Người sử dụng</label><input type="text" id="user" class="form-control" required></div>
            <div class="col-md-4"><label>Số lượng</label><input type="number" id="qty" class="form-control" value="1" required></div>
            <div class="col-12"><label>Tên thiết bị</label><input type="text" id="device" class="form-control" required></div>
            <div class="col-12"><label>Cấu hình</label><textarea id="specs" class="form-control" rows="2"></textarea></div>
            <div class="col-md-3"><label>Hệ điều hành</label><select id="os" class="form-select"><option>Win 10</option><option>Win 11</option></select></div>
            <div class="col-md-3"><label>Bản quyền HĐH</label><select id="os_license" class="form-select"><option>Có</option><option>Chưa</option></select></div>
            <div class="col-md-3"><label>Office</label><select id="office" class="form-select"><option>Office 2019</option><option>Office 365</option></select></div>
            <div class="col-md-3"><label>Bản quyền Office</label><select id="office_license" class="form-select"><option>Có</option><option>Chưa</option></select></div>
            <div class="col-12"><label>Phần mềm khác</label><input type="text" id="others" class="form-control"></div>
            <div class="col-12"><label>Kiến nghị</label><textarea id="note" class="form-control" rows="2"></textarea></div>
            <button type="submit" class="btn btn-primary mt-3">Lưu thông tin</button>
        </div>
    </form>
    <hr>
    <button onclick="exportToExcel()" class="btn btn-success mb-3">Xuất báo cáo</button>
    <table class="table table-bordered">
        <thead class="table-dark">
            <tr><th>Người dùng</th><th>SL</th><th>Thiết bị</th><th>HĐH</th><th>Office</th><th>Thao tác</th></tr>
        </thead>
        <tbody id="tableBody"></tbody>
    </table>
</div>

<script>
    // Khai báo một lần duy nhất
    const _sb = supabase.createClient('https://ckoersckkzygzuifplwj.supabase.co', 'sb_publishable_cfzmHqhoCkWwD2KZBEHZvw_xr5vVDbi');

    async function loadData() {
        const { data } = await _sb.from('survey_devices').select('*');
        if (data) {
            document.getElementById('tableBody').innerHTML = data.map(row => `
                <tr>
                    <td>${row.full_name || ''}</td>
                    <td>${row.quantity || 1}</td>
                    <td>${row.device_name || ''}</td>
                    <td>${row.os || ''}</td>
                    <td>${row.office_version || ''}</td>
                    <td><button class="btn btn-danger btn-sm" onclick="deleteRow(${row.id})">Xóa</button></td>
                </tr>`).join('');
        }
    }

    document.getElementById('surveyForm').onsubmit = async (e) => {
        e.preventDefault();
        const data = {
            department: document.getElementById('dept').value,
            full_name: document.getElementById('user').value,
            quantity: parseInt(document.getElementById('qty').value),
            device_name: document.getElementById('device').value,
            specs: document.getElementById('specs').value,
            os: document.getElementById('os').value + " (" + document.getElementById('os_license').value + ")",
            office_version: document.getElementById('office').value + " (" + document.getElementById('office_license').value + ")",
            other_software: document.getElementById('others').value,
            suggestions: document.getElementById('note').value
        };
        const { error } = await _sb.from('survey_devices').insert([data]);
        if(error) alert("Lỗi: " + error.message);
        else { alert("Đã lưu!"); loadData(); }
    };

    async function deleteRow(id) {
        await _sb.from('survey_devices').delete().eq('id', id);
        loadData();
    }

    async function exportToExcel() {
        const { data } = await _sb.from('survey_devices').select('*');
        if(!data || data.length === 0) return alert("Chưa có dữ liệu!");
        XLSX.writeFile(XLSX.utils.book_append_sheet(XLSX.utils.book_new(), XLSX.utils.json_to_sheet(data), "BaoCao"), "Bao_Cao.xlsx");
    }

    loadData();
</script>
</body>
</html>
