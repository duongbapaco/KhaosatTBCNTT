<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Phiếu Khảo Sát Trang Thiết Bị Công Nghệ</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
    <style>
        textarea { resize: vertical; min-height: 80px; }
        .table-responsive { overflow-x: auto; }
    </style>
</head>
<body class="bg-light">

<div class="container py-5">
    <div class="card shadow p-4">
        <h2 class="text-center mb-3">PHIẾU KHẢO SÁT TRANG THIẾT BỊ CÔNG NGHỆ</h2>
        <p class="text-center text-muted">Vui lòng điền đầy đủ và chính xác thông tin thiết bị của đơn vị/phòng ban</p>
        
        <form id="surveyForm">
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label>Bộ phận / Phòng ban / Nhà máy *</label>
                    <input list="deptList" id="dept" class="form-control" placeholder="Chọn hoặc nhập mới..." required>
                    <datalist id="deptList">
                        <option value="Khối Văn phòng">
                        <option value="Nhà máy A">
                        <option value="Nhà máy B">
                    </datalist>
                </div>
                <div class="col-md-6 mb-3">
                    <label>Người sử dụng *</label>
                    <input type="text" id="user" class="form-control" placeholder="Nhập họ tên" required>
                </div>
            </div>

            <div class="row">
                <div class="col-md-6 mb-3">
                    <label>Tên thiết bị *</label>
                    <input list="deviceList" id="device" class="form-control" required>
                    <datalist id="deviceList">
                        <option value="Laptop Dell">
                        <option value="Máy tính để bàn (Desktop)">
                        <option value="Máy in">
                    </datalist>
                </div>
                <div class="col-md-6 mb-3">
                    <label>Số lượng *</label>
                    <input type="number" id="qty" class="form-control" value="1" required>
                </div>
            </div>

            <div class="mb-3">
                <label>Cấu hình chi tiết *</label>
                <textarea id="specs" class="form-control" placeholder="Ví dụ: Core i5, RAM 16GB, SSD 512GB..."></textarea>
            </div>

            <div class="row">
                <div class="col-md-4 mb-3">
                    <label>Hệ điều hành</label>
                    <select id="os" class="form-select">
                        <option value="Windows 10">Windows 10</option>
                        <option value="Windows 11">Windows 11</option>
                        <option value="macOS">macOS</option>
                    </select>
                </div>
                <div class="col-md-4 mb-3">
                    <label>Phần mềm Office</label>
                    <select id="office" class="form-select">
                        <option value="Office 2019">Office 2019</option>
                        <option value="Office 2021">Office 2021</option>
                        <option value="Office 365">Office 365</option>
                    </select>
                </div>
                <div class="col-md-4 mb-3">
                    <label>Tình trạng bản quyền</label>
                    <select id="license" class="form-select">
                        <option value="Chưa có bản quyền">Chưa có bản quyền</option>
                        <option value="Có bản quyền">Có bản quyền</option>
                    </select>
                </div>
            </div>

            <div class="mb-3">
                <label>Phần mềm khác</label>
                <textarea id="others" class="form-control" placeholder="Photoshop, AutoCAD, MISA..."></textarea>
            </div>

            <div class="mb-3">
                <label>Đề xuất / Kiến nghị</label>
                <textarea id="note" class="form-control"></textarea>
            </div>

            <button type="submit" class="btn btn-primary w-100">Thêm vào bảng thống kê</button>
        </form>

        <hr class="my-4">

        <h5>Dữ liệu đã thu thập (Xem trước)</h5>
        <div class="table-responsive">
            <table class="table table-bordered table-sm" id="previewTable">
                <thead>
                    <tr><th>STT</th><th>Người dùng</th><th>Bộ phận</th><th>Thiết bị</th><th>Cấu hình</th><th>HĐH</th><th>Office</th><th>Phần mềm</th><th>SL</th><th>Bản quyền</th><th>Đề xuất</th></tr>
                </thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>
        <button onclick="exportToExcel()" class="btn btn-success mt-3">Xuất báo cáo Excel</button>
    </div>
</div>

<script>
    // Thay đổi URL và Key của bạn vào đây
    const supabase = supabase.createClient('URL_CUA_BAN', 'ANON_KEY_CUA_BAN');
    let surveyData = [];

    document.getElementById('surveyForm').onsubmit = async (e) => {
        e.preventDefault();
        const entry = {
            user: document.getElementById('user').value,
            dept: document.getElementById('dept').value,
            device: document.getElementById('device').value,
            qty: document.getElementById('qty').value,
            specs: document.getElementById('specs').value,
            os: document.getElementById('os').value,
            office: document.getElementById('office').value,
            license: document.getElementById('license').value,
            others: document.getElementById('others').value,
            note: document.getElementById('note').value
        };
        
        // Lưu vào Supabase
        await supabase.from('survey_devices').insert([entry]);
        
        // Cập nhật xem trước
        surveyData.push(entry);
        renderTable();
        document.getElementById('surveyForm').reset();
    };

    function renderTable() {
        const body = document.getElementById('tableBody');
        body.innerHTML = surveyData.map((d, i) => `<tr>
            <td>${i+1}</td><td>${d.user}</td><td>${d.dept}</td><td>${d.device}</td>
            <td>${d.specs}</td><td>${d.os}</td><td>${d.office}</td><td>${d.others}</td>
            <td>${d.qty}</td><td>${d.license}</td><td>${d.note}</td>
        </tr>`).join('');
    }

    function exportToExcel() {
        const wb = XLSX.utils.book_new();
        const ws = XLSX.utils.json_to_sheet(surveyData);
        XLSX.utils.book_append_sheet(wb, ws, "BaoCao");
        XLSX.writeFile(wb, "PhieuKhaoSat.xlsx");
    }
</script>
</body>
</html>
