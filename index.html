<script>
    // ... (các phần trên giữ nguyên)

    document.getElementById('surveyForm').onsubmit = async (e) => {
        e.preventDefault();
        const id = document.getElementById('editId').value;
        
        // Thu thập toàn bộ dữ liệu từ các ô nhập liệu
        const updatedData = {
            department: document.getElementById('dept').value,
            full_name: document.getElementById('user').value,
            device_name: document.getElementById('device').value,
            qty: parseInt(document.getElementById('qty').value),
            os: document.getElementById('os').value,
            office_version: document.getElementById('office').value,
            other_software: document.getElementById('others').value,
            specs: document.getElementById('specs').value
        };

        if (id) {
            // Cập nhật đúng dòng có ID đó với tất cả dữ liệu mới
            const { error } = await _sb.from('survey_devices').update(updatedData).eq('id', id);
            if (error) {
                alert("Lỗi cập nhật: " + error.message);
            } else {
                alert("Đã cập nhật thay đổi thành công!");
            }
        } else {
            // Thêm mới nếu không có ID
            await _sb.from('survey_devices').insert([updatedData]);
            alert("Đã thêm mới thành công!");
        }
        
        resetForm(); 
        init(); // Tự động load lại bảng để thấy thay đổi mới nhất
    };

    // ... (các phần dưới giữ nguyên)
</script>
