<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Hệ thống Quản trị Tài sản 2026</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        /* CSS tối ưu cho in ấn và hiển thị */
        #qr-container { display: none; position: fixed; top: 10%; left: 50%; transform: translateX(-50%); background: white; padding: 30px; border: 2px solid #0d6efd; z-index: 1000; box-shadow: 0 0 20px rgba(0,0,0,0.5); text-align: center; border-radius: 15px; }
        #qrcode-preview { margin: 15px auto; width: 200px; height: 200px; }
        @media print { .no-print { display: none; } #qr-container { position: static; transform: none; border: none; box-shadow: none; } }
        .status-dot { height: 12px; width: 12px; border-radius: 50%; display: inline-block; }
    </style>
</head>
<body class="bg-light p-4">

    <div id="qr-container" class="no-print">
        <h5 id="qr-title" class="text-primary fw-bold">TEM TÀI SẢN</h5>
        <div id="qrcode-preview"></div>
        <button class="btn btn-primary" onclick="window.print()">🖨️ In Tem</button>
        <button class="btn btn-secondary" onclick="document.getElementById('qr-container').style.display='none'">Đóng</button>
    </div>

    <div class="card p-4 shadow" style="max-width: 1500px; margin: auto;">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h3 class="text-uppercase fw-bold text-primary">HỆ THỐNG QUẢN TRỊ TÀI SẢN 2026</h3>
            <div id="cloudStatus" class="badge bg-secondary"><span class="status-dot bg-warning"></span> Đang kết nối...</div>
        </div>

        <div class="row mb-4">
            <div class="col-md-4"><div class="card bg-warning p-3 text-center"><h6>Chưa có bản quyền</h6><h3 id="missingLicenseCount">0</h3></div></div>
            <div class="col-md-4"><div class="card bg-success text-white p-3 text-center"><h6>Đã có bản quyền</h6><h3 id="haveLicenseCount">0</h3></div></div>
            <div class="col-md-4"><div class="card bg-primary text-white p-3 text-center"><h6>Tổng thiết bị</h6><h3 id="totalCount">0</h3></div></div>
        </div>

        <form id="dataForm" class="row g-3 bg-white p-3 border rounded mb-4">
            <input type="hidden" id="editId">
            <div class="col-md-2"><label>Bộ phận</label><input type="text" id="dept" class="form-control" required></div>
            <div class="col-md-2"><label>Người dùng</label><input type="text" id="user" class="form-control" required></div>
            <div class="col-md-2"><label>Thiết bị</label><input type="text" id="device" class="form-control"></div>
            <div class="col-md-2"><label>Hệ điều hành</label>
                <select id="os" class="form-select">
                    <optgroup label="Windows Hiện đại"><option>Windows 11</option><option>Windows 10</option></optgroup>
                    <optgroup label="Windows Cổ điển"><option>Windows 8.1</option><option>Windows 8</option><option>Windows 7</option><option>Windows Vista</option><option>Windows XP</option><option>Windows 2000</option><option>Windows 98</option><option>Windows 95</option></optgroup>
                    <optgroup label="Windows Server"><option>Server 2025</option><option>Server 2022</option><option>Server 2019</option><option>Server 2016</option><option>Server 2012 R2</option><option>Server 2008</option><option>Server 2003</option></optgroup>
                </select>
            </div>
            <div class="col-md-1"><label>BQ HĐH</label><select id="os_license" class="form-select"><option>Chưa có</option><option>Có</option></select></div>
            <div class="col-md-2"><label>Office</label>
                <select id="office" class="form-select">
                    <option>Microsoft 365</option><option>Office 2024</option><option>Office 2021</option><option>Office 2019</option><option>Office 2016</option><option>Office 2013</option><option>Office 2010</option><option>Office 2007</option><option>Office 2003</option><option>Office XP</option><option>Office 2000</option><option>Office 97</option>
                </select>
            </div>
            <div class="col-md-1"><label>BQ Off</label><select id="office_license" class="form-select"><option>Chưa có</option><option>Có</option></select></div>
            
            <div class="col-md-2">
                <label>PM Chuyên ngành</label>
                <input class="form-control" list="pmList" id="pm" placeholder="Chọn/Nhập PM...">
                <datalist id="pmList">
                    <option value="Không có"><option value="ASIA Enterprise 2025"><option value="ASIA Enterprise 2020"><option value="ASIA Standard"><option value="Quasoft ERP"><option value="Quasoft CRM"><option value="Quasoft HRM"><option value="MISA SME.NET 2024"><option value="FAST Accounting"><option value="BRAVO 8R3">
                </datalist>
            </div>
            <div class="col-md-1"><label>BQ PM</label><select id="pm_license" class="form-select"><option>Chưa có</option><option>Có</option></select></div>
            <div class="col-md-6"><label>Cấu hình</label><input type="text" id="specs" class="form-control"></div>
            <div class="col-md-6"><label>Đề xuất</label><input type="text" id="proposal" class="form-control"></div>
            
            <div class="col-12 text-end">
                <button type="submit" class="btn btn-primary px-4" id="submitBtn">Lưu Dữ Liệu</button>
                <button type="button" class="btn btn-secondary" onclick="resetForm()">Hủy</button>
                <button type="button" class="btn btn-success" onclick="exportExcel()">Xuất Excel</button>
            </div>
        </form>

        <div class="mb-3"><input type="text" id="searchInput" class="form-control" placeholder="🔍 Lọc dữ liệu..." onkeyup="filterTable()"></div>
        <div class="table-responsive">
            <table class="table table-bordered table-hover" id="reportTable">
                <thead class="table-dark">
                    <tr><th>Bộ phận</th><th>User</th><th>Thiết bị</th><th>HĐH (BQ)</th><th>Office (BQ)</th><th>PM (BQ)</th><th>Thao tác</th></tr>
                </thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>
    </div>

<script>
    const _sb = supabase.createClient('https://ckoersckkzygzuifplwj.supabase.co', 'sb_publishable_cfzmHqhoCkWwD2KZBEHZvw_xr5vVDbi');
    const PASS = 'admin123';
    let currentQR = null;

    // Phân hệ tạo QR ổn định
    function showQR(text, title) {
        document.getElementById("qr-title").innerText = title;
        document.getElementById("qrcode-preview").innerHTML = ""; 
        currentQR = new QRCode(document.getElementById("qrcode-preview"), {
            text: text, width: 200, height: 200, correctLevel: QRCode.CorrectLevel.H
        });
        document.getElementById("qr-container").style.display = "block";
    }

    async function loadData() {
        try {
            const { data } = await _sb.from('survey_devices').select('*').order('id', {ascending: false});
            document.getElementById('tableBody').innerHTML = (data||[]).map(r => `
                <tr onclick='showQR("User: ${r.full_name} | TB: ${r.device_name}", "${r.device_name}")' style="cursor:pointer">
                    <td>${r.department||''}</td><td>${r.full_name||''}</td><td>${r.device_name||''}</td>
                    <td>${r.os||''} (${r.os_license||''})</td><td>${r.office_version||''} (${r.office_license||''})</td>
                    <td>${r.special_pm||''} (${r.pm_license||''})</td>
                    <td>
                        <button class="btn btn-sm btn-info" onclick="event.stopPropagation(); editRow(${JSON.stringify(r).replace(/"/g, '&quot;')})">Sửa</button>
                        <button class="btn btn-sm btn-danger" onclick="event.stopPropagation(); deleteRow('${r.id}')">Xóa</button>
                    </td>
                </tr>`).join('');
            updateStats(data || []);
            document.getElementById('cloudStatus').className = "badge bg-success";
            document.getElementById('cloudStatus').innerHTML = 'Online';
        } catch (err) {
            document.getElementById('cloudStatus').className = "badge bg-danger";
        }
    }

    document.getElementById('dataForm').onsubmit = async (e) => {
        e.preventDefault();
        const id = document.getElementById('editId').value;
        const payload = { department: document.getElementById('dept').value, full_name: document.getElementById('user').value, device_name: document.getElementById('device').value, os: document.getElementById('os').value, os_license: document.getElementById('os_license').value, office_version: document.getElementById('office').value, office_license: document.getElementById('office_license').value, special_pm: document.getElementById('pm').value, pm_license: document.getElementById('pm_license').value, specs: document.getElementById('specs').value, proposal: document.getElementById('proposal').value };
        if(id) await _sb.from('survey_devices').update(payload).eq('id', id);
        else await _sb.from('survey_devices').insert([payload]);
        loadData(); resetForm();
        showQR(`User: ${payload.full_name} | TB: ${payload.device_name}`, payload.device_name);
    };

    async function deleteRow(id) { if(prompt("Nhập mật khẩu:") === PASS) { await _sb.from('survey_devices').delete().eq('id', id); loadData(); } }
    function editRow(r) { document.getElementById('editId').value = r.id; document.getElementById('dept').value = r.department; document.getElementById('user').value = r.full_name; document.getElementById('device').value = r.device_name; document.getElementById('os').value = r.os; document.getElementById('os_license').value = r.os_license; document.getElementById('office').value = r.office_version; document.getElementById('office_license').value = r.office_license; document.getElementById('pm').value = r.special_pm; document.getElementById('pm_license').value = r.pm_license; document.getElementById('specs').value = r.specs || ''; document.getElementById('proposal').value = r.proposal || ''; document.getElementById('submitBtn').innerText = "Cập nhật"; window.scrollTo(0, 0); }
    function updateStats(data) { document.getElementById('totalCount').innerText = data.length; const missing = data.filter(r => r.os_license === 'Chưa có' || r.office_license === 'Chưa có' || r.pm_license === 'Chưa có').length; document.getElementById('missingLicenseCount').innerText = missing; document.getElementById('haveLicenseCount').innerText = data.length - missing; }
    function filterTable() { const q = document.getElementById('searchInput').value.toLowerCase(); document.querySelectorAll('#tableBody tr').forEach(row => row.style.display = row.innerText.toLowerCase().includes(q) ? '' : 'none'); }
    function resetForm() { document.getElementById('dataForm').reset(); document.getElementById('editId').value = ''; document.getElementById('submitBtn').innerText = "Lưu Dữ Liệu"; }
    function exportExcel() { XLSX.writeFile(XLSX.utils.table_to_book(document.getElementById("reportTable")), "KiemKe_TaiSan.xlsx"); }
    loadData();
</script>
</body>
</html>
