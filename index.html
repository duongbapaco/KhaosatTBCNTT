<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Hệ thống Quản trị Tài sản 2026 Pro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        .table thead { background: #343a40; color: white; }
        .bg-warning-light { background-color: #fff3cd; } /* Màu cảnh báo bản quyền */
    </style>
</head>
<body class="bg-light p-3">

<div class="container-fluid">
    <h3 class="text-primary fw-bold">QUẢN TRỊ TÀI SẢN CNTT 2026</h3>
    
    <div class="row g-2 mb-3">
        <div class="col-md-3"><input type="text" id="filterDept" class="form-control" placeholder="Lọc theo bộ phận..."></div>
        <div class="col-md-9 text-end">
            <button class="btn btn-warning" onclick="printReport()">🖨️ In Báo Cáo</button>
            <button class="btn btn-success" onclick="exportFile()">📊 Xuất Excel</button>
            <button class="btn btn-info" onclick="exportWord()">📄 Xuất Word</button>
        </div>
    </div>

    <form id="dataForm" class="row g-2 bg-white p-3 border rounded mb-4">
        <div class="col-md-2"><input type="text" id="dept" class="form-control" placeholder="Bộ phận" required></div>
        <div class="col-md-2"><input type="text" id="user" class="form-control" placeholder="Người dùng" required></div>
        <div class="col-md-2">
            <select id="os" class="form-select">
                <optgroup label="Windows"><option>Win 11</option><option>Win 10</option><option>Win 8.1</option><option>Win 7</option><option>Win XP</option><option>Server 2025/2022/2019/2016</option></optgroup>
                <optgroup label="Khác"><option>macOS Sequoia/Sonoma</option><option>Ubuntu/Debian/CentOS</option></optgroup>
            </select>
        </div>
        <div class="col-md-1"><select id="os_lic" class="form-select"><option value="Chưa có">Chưa có</option><option value="Đã có">Đã có</option></select></div>
        <div class="col-md-2">
            <select id="office" class="form-select">
                <option>Microsoft 365</option><option>Office 2024</option><option>Office 2021</option><option>Office 2019</option><option>Office 2016</option><option>Office 2013</option><option>Office 2010</option><option>Office 2007</option>
            </select>
        </div>
        <div class="col-md-1"><select id="off_lic" class="form-select"><option value="Chưa có">Chưa có</option><option value="Đã có">Đã có</option></select></div>
        <div class="col-md-2"><input type="text" id="pm" class="form-control" placeholder="PM khác"></div>
        <div class="col-md-1"><select id="pm_lic" class="form-select"><option value="Chưa có">Chưa có</option><option value="Đã có">Đã có</option></select></div>
        <div class="col-md-12"><button type="submit" class="btn btn-primary w-100">LƯU DỮ LIỆU</button></div>
    </form>

    <div class="table-responsive">
        <table class="table table-bordered" id="reportTable">
            <thead><tr><th>Thông tin</th><th>HĐH (Bản quyền)</th><th>Office (Bản quyền)</th><th>PM Khác (Bản quyền)</th><th>Thao tác</th></tr></thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>
</div>

<script>
    const _sb = supabase.createClient('URL', 'KEY');
    
    // Xử lý phím Enter cho mật khẩu
    function secureAction(callback) {
        let pass = prompt("Nhập mật khẩu quản trị:");
        if (pass === "123456") callback();
        else alert("Sai mật khẩu!");
    }

    async function loadData() {
        const { data } = await _sb.from('survey_devices').select('*');
        // Sắp xếp: Ưu tiên "Chưa có" bản quyền lên đầu
        data.sort((a,b) => (a.os_lic === 'Chưa có' ? -1 : 1));
        
        document.getElementById('tableBody').innerHTML = data.map(r => `
            <tr class="${r.os_lic === 'Chưa có' ? 'bg-warning-light' : ''}">
                <td>${r.department} - ${r.user}</td>
                <td>${r.os} (${r.os_lic})</td>
                <td>${r.office} (${r.off_lic})</td>
                <td>${r.pm} (${r.pm_lic})</td>
                <td>
                    <button class="btn btn-sm btn-dark" onclick="showQR('${r.id}')">QR</button>
                    <button class="btn btn-sm btn-danger" onclick="secureAction(() => deleteRow('${r.id}'))">Xóa</button>
                </td>
            </tr>`).join('');
    }

    function exportWord() {
        const header = "<html xmlns:o='urn:schemas-microsoft-com:office:office' xmlns:w='urn:schemas-microsoft-com:office:word' xmlns='http://www.w3.org/TR/REC-html40'><head><meta charset='utf-8'><title>Export Word</title></head><body>";
        const footer = "</body></html>";
        const sourceHTML = header + document.getElementById("reportTable").outerHTML + footer;
        const source = 'data:application/vnd.ms-word;charset=utf-8,' + encodeURIComponent(sourceHTML);
        const fileDownload = document.createElement("a");
        fileDownload.href = source;
        fileDownload.download = 'BaoCao_TaiSan.doc';
        fileDownload.click();
    }
    
    // Các hàm khác (print, QR...) giữ nguyên logic của phiên bản ổn định trước
</script>
</body>
</html>
