<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phiếu Khảo Sát Thiết Bị</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
    <link rel="icon" href="data:,">
</head>
<body class="bg-light">

<div class="container py-4">
    <div class="card shadow p-4 mx-auto" style="max-width: 800px;">
        <h4 class="text-center mb-4 text-primary">PHIẾU KHẢO SÁT TRANG THIẾT BỊ</h4>
        <form id="surveyForm">
            <div class="row g-3">
                <div class="col-md-6"><label>Bộ phận/Phòng ban</label><input type="text" id="dept" class="form-control" required></div>
                <div class="col-md-6"><label>Người sử dụng</label><input type="text" id="user" class="form-control" required></div>
                <div class="col-12"><label>Tên thiết bị</label><input type="text" id="device" class="form-control" required></div>
                <div class="col-12"><label>Cấu hình chi tiết</label><textarea id="specs" class="form-control" rows="2"></textarea></div>
                <div class="col-md-6"><label>Hệ điều hành</label>
                    <select id="os" class="form-select">
                        <option value="Windows 10">Windows 10</option><option value="Windows 11">Windows 11</option>
                        <option value="macOS">macOS</option><option value="Khác">Khác</option>
                    </select>
                </div>
                <div class="col-md-6"><label>Phiên bản Office</label>
                    <select id="office" class="form-select">
                        <option value="Office 2019">Office 2019</option><option value="Office 2021">Office 2021</option>
                        <option value="Office 365">Office 365</option><option value="Chưa cài">Chưa cài</option>
                    </select>
                </div>
                <div class="col-12"><label>Phần mềm khác</label><input type="text" id="others" class="form-control"></div>
                <div class="col-12"><label>Đề xuất / Kiến nghị</label><textarea id="note" class="form-control" rows="2"></textarea></div>
            </div>
            <button type="submit" class="btn btn-primary w-100 mt-4">Gửi thông tin</button>
        </form>

        <hr class="my-4">
        <button onclick="exportToExcel()" class="btn btn-success w-100 mb-3">Xuất báo cáo Excel</button>
        
        <h5>Dữ liệu đã thu thập:</h5>
        <div class="table-responsive">
            <table class="table table-bordered table-sm">
                <thead><tr><th>Người dùng</th><th>Bộ phận</th><th>Thiết bị</th></tr></thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
    const supabaseClient = supabase.createClient(
        'https://ckoersckkzygzuifplwj.supabase.co', 
        'sb_publishable_cfzmHqhoCkWwD2KZBEHZvw_xr5vVDbi'
    );

    async function loadData() {
        const { data } = await supabaseClient.from('survey_devices').select('*');
        if (data) {
            document.getElementById('tableBody').innerHTML = data.map(row => 
                `<tr><td>${row.full_name}</td><td>${row.department}</td><td>${row.device_name}</td></tr>`
            ).join('');
        }
    }

    document.getElementById('surveyForm').onsubmit = async (e) => {
        e.preventDefault();
        const data = {
            department: document.getElementById('dept').value,
            full_name: document.getElementById('user').value,
            device_name: document.getElementById('device').value,
            specs: document.getElementById('specs').value,
            os: document.getElementById('os').value,
            office_version: document.getElementById('office').value,
            other_software: document.getElementById('others').value,
            suggestions: document.getElementById('note').value
        };

        const { error } = await supabaseClient.from('survey_devices').insert([data]);
        if (error) {
            alert("Lỗi: " + error.message);
        } else {
            alert("Đã gửi thành công!");
            document.getElementById('surveyForm').reset();
            loadData(); // Tải lại bảng ngay sau khi thêm mới
        }
    };

    async function exportToExcel() {
        const { data } = await supabaseClient.from('survey_devices').select('*');
        const ws = XLSX.utils.json_to_sheet(data);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "BaoCao");
        XLSX.writeFile(wb, "PhieuKhaoSat.xlsx");
    }

    loadData(); // Tải dữ liệu ngay khi trang được mở
</script>
</body>
</html>
