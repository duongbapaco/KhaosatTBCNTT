<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>QUẢN TRỊ TÀI SẢN 2026 - FULL SYSTEM</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        body { font-family: 'Times New Roman', serif; background-color: #f8f9fa; }
        .label-text { font-weight: bold; font-size: 0.75rem; margin-bottom: 2px; display: block; color: #444; }
        .qr-canvas { width: 50px; height: 50px; margin: auto; cursor: pointer; border: 1px solid #dee2e6; }
        #connectionStatus { font-size: 0.8rem; padding: 2px 10px; border-radius: 10px; }
        @media print { .no-print { display: none !important; } }
    </style>
</head>
<body class="p-3">

<div class="no-print mb-4 p-3 bg-white border shadow-sm">
    <h5 class="text-center text-uppercase fw-bold">HỆ THỐNG QUẢN TRỊ TÀI SẢN CNTT 2026</h5>
    <div class="text-center mb-2"><span id="connectionStatus" class="bg-warning text-dark">Đang kiểm tra kết nối...</span></div>
    
    <form id="masterForm">
        <input type="hidden" id="editId">
        <div class="row g-2">
            <div class="col-md-2"><span class="label-text">BỘ PHẬN</span><input type="text" id="dpt" class="form-control" required></div>
            <div class="col-md-2"><span class="label-text">NGƯỜI DÙNG</span><input type="text" id="usr" class="form-control" required></div>
            <div class="col-md-2"><span class="label-text">THIẾT BỊ</span><input type="text" id="dev" class="form-control"></div>
            <div class="col-md-1"><span class="label-text">SỐ LƯỢNG</span><input type="number" id="qty" class="form-control" value="1"></div>
            
            <div class="col-md-2"><span class="label-text">HỆ ĐIỀU HÀNH</span><select id="os" class="form-select">
                <option value="">-- Chọn HĐH --</option>
                <optgroup label="Windows">
                    <option>Windows 11</option><option>Windows 10</option><option>Windows 8.1</option><option>Windows 8</option>
                    <option>Windows 7</option><option>Windows Vista</option><option>Windows XP</option><option>Windows 2000</option><option>Windows 98/95</option>
                </optgroup>
                <optgroup label="MacOS / Linux">
                    <option>macOS Sequoia</option><option>macOS Sonoma</option><option>Ubuntu Linux</option>
                </optgroup>
            </select></div>
            <div class="col-md-1"><span class="label-text">BQ HĐH</span><select id="osL" class="form-select"><option>Chưa có bản quyền</option><option>Đã có bản quyền</option></select></div>
            
            <div class="col-md-2"><span class="label-text">OFFICE</span><select id="off" class="form-select">
                <option value="">-- Chọn Office --</option>
                <option>Microsoft 365</option><option>Office 2024</option><option>Office 2021</option><option>Office 2019</option>
                <option>Office 2016</option><option>Office 2013</option><option>Office 2010</option><option>Office 2007</option><option>Office 2003</option>
                <option>WPS Office</option>
            </select></div>
            <div class="col-md-1"><span class="label-text">BQ OFFICE</span><select id="offL" class="form-select"><option>Chưa có bản quyền</option><option>Đã có bản quyền</option></select></div>
            
            <div class="col-md-2"><span class="label-text">PM CHUYÊN NGÀNH</span><input type="text" id="pm" class="form-control" list="pmList">
                <datalist id="pmList">
                    <optgroup label="ASIA Soft"><option value="ASIA Enterprise 2026"><option value="ASIA ERP 2025"><option value="ASIA Gold 2024"></optgroup>
                    <optgroup label="MISA"><option value="MISA SME 2025"><option value="MISA AMIS"><option value="MISA Mimosa"></optgroup>
                    <optgroup label="QUASOFT"><option value="QUASOFT V9"><option value="QUASOFT V8"></optgroup>
                    <optgroup label="Khác"><option value="Fast Accounting"><option value="Bravo ERP"><option value="AutoCAD 2026"><option value="Adobe Creative Cloud"></optgroup>
                </datalist>
            </div>
            <div class="col-md-1"><span class="label-text">BQ PM</span><select id="pmL" class="form-select"><option>Chưa có bản quyền</option><option>Đã có bản quyền</option></select></div>
            
            <div class="col-md-3"><span class="label-text">CẤU HÌNH CHI TIẾT</span><input type="text" id="specs" class="form-control"></div>
            <div class="col-md-3"><span class="label-text">ĐỀ XUẤT</span><input type="text" id="prop" class="form-control"></div>
            <div class="col-12"><button id="btnAction" type="button" class="btn btn-dark w-100 mt-2" onclick="saveData()">LƯU DỮ LIỆU</button></div>
        </div>
    </form>
</div>

<div class="mb-3 d-flex gap-2 no-print">
    <input type="text" id="searchBox" class="form-control" placeholder="🔍 Tìm kiếm..." onkeyup="filterData()">
    <button class="btn btn-success" onclick="exportExcel()">Xuất Excel (.xlsx)</button>
</div>

<div id="printableArea" class="bg-white p-4 border">
    <table class="table table-bordered" id="dataTable">
        <thead class="table-dark"><tr><th>Bộ phận</th><th>Người dùng</th><th>Thiết bị</th><th>SL</th><th>HĐH (BQ)</th><th>Office (BQ)</th><th>PM chuyên ngành (BQ)</th><th>Cấu hình</th><th>Đề xuất</th><th class="no-print">QR</th><th class="no-print">Thao tác</th></tr></thead>
        <tbody id="tableBody"></tbody>
    </table>
</div>

<div class="modal fade" id="deleteModal" tabindex="-1">
    <div class="modal-dialog modal-sm">
        <div class="modal-content">
            <div class="modal-header"><h5 class="modal-title">Xác nhận xóa</h5></div>
            <div class="modal-body">
                <input type="password" id="adminPass" class="form-control" placeholder="Nhập mật khẩu Admin">
                <input type="hidden" id="deleteTargetId">
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" data-bs-dismiss="modal">Hủy</button>
                <button class="btn btn-danger" onclick="confirmDelete()">Xác nhận xóa</button>
            </div>
        </div>
    </div>
</div>

<script>
    const _sb = supabase.createClient('https://ckoersckkzygzuifplwj.supabase.co', 'sb_publishable_cfzmHqhoCkWwD2KZBEHZvw_xr5vVDbi');
    let allData = [];
    const baseUrl = window.location.href.split('?')[0];

    async function checkConnection() {
        const status = document.getElementById('connectionStatus');
        try {
            const { error } = await _sb.from('asset_management').select('id').limit(1);
            if (!error) { status.innerText = "● Đã kết nối Supabase"; status.className = "bg-success text-white"; loadData(); }
            else throw error;
        } catch (e) { status.innerText = "● Lỗi kết nối!"; status.className = "bg-danger text-white"; }
    }

    function render(data) {
        document.getElementById('tableBody').innerHTML = data.map(r => `<tr>
            <td>${r.department||''}</td><td>${r.user_name||''}</td><td>${r.device_name||''}</td>
            <td>${r.quantity||'1'}</td><td>${r.os||''} (${r.os_lic||'Chưa có'})</td>
            <td>${r.office||''} (${r.off_lic||'Chưa có'})</td><td>${r.specialized_pm||'Không có'} (${r.pm_lic||'Chưa có'})</td>
            <td>${r.specs||''}</td><td>${r.proposal||''}</td>
            <td class="text-center no-print"><div id="qr-${r.id}" class="qr-canvas"></div></td>
            <td class="no-print"><button class="btn btn-sm btn-info" onclick='editData(${JSON.stringify(r).replace(/"/g, '&quot;')})'>Sửa</button> <button class="btn btn-sm btn-danger" onclick="delData(${r.id})">Xóa</button></td>
        </tr>`).join('');
        data.forEach(r => new QRCode(document.getElementById(`qr-${r.id}`), {text: baseUrl + '?id=' + r.id, width: 50, height: 50}));
    }

    async function loadData() { const { data } = await _sb.from('asset_management').select('*'); allData = data || []; render(allData); }
    
    function delData(id) { document.getElementById('deleteTargetId').value = id; new bootstrap.Modal(document.getElementById('deleteModal')).show(); }

    async function confirmDelete() {
        if(document.getElementById('adminPass').value === "ADMIN2026") {
            await _sb.from('asset_management').delete().eq('id', document.getElementById('deleteTargetId').value);
            location.reload();
        } else alert("Sai mật khẩu!");
    }

    async function saveData() { 
        const id = document.getElementById('editId').value;
        const payload = { department: dpt.value, user_name: usr.value, device_name: dev.value, quantity: qty.value, specs: specs.value, proposal: prop.value, os: os.value, os_lic: osL.value, office: off.value, off_lic: offL.value, specialized_pm: pm.value, pm_lic: pmL.value };
        if(id) await _sb.from('asset_management').update(payload).eq('id', id); else await _sb.from('asset_management').insert(payload);
        location.reload(); 
    }

    function editData(r) { document.getElementById('editId').value = r.id; document.getElementById('dpt').value = r.department || ''; document.getElementById('usr').value = r.user_name || ''; document.getElementById('dev').value = r.device_name || ''; document.getElementById('qty').value = r.quantity || '1'; document.getElementById('os').value = r.os || ''; document.getElementById('osL').value = r.os_lic || ''; document.getElementById('off').value = r.office || ''; document.getElementById('offL').value = r.off_lic || ''; document.getElementById('pm').value = r.specialized_pm || ''; document.getElementById('pmL').value = r.pm_lic || ''; document.getElementById('specs').value = r.specs || ''; document.getElementById('prop').value = r.proposal || ''; document.getElementById('btnAction').innerText = "CẬP NHẬT DỮ LIỆU"; window.scrollTo(0,0); }
    
    function filterData() { const q = document.getElementById('searchBox').value.toLowerCase(); render(allData.filter(r => (r.department + r.user_name + r.device_name + r.specialized_pm).toLowerCase().includes(q))); }
    
    function exportExcel() {
        const table = document.getElementById("dataTable").cloneNode(true);
        Array.from(table.rows).forEach(row => { if(row.cells.length > 9) { row.deleteCell(10); row.deleteCell(9); } });
        const wb = XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb, XLSX.utils.table_to_sheet(table), "TaiSan");
        XLSX.writeFile(wb, "Bao_Cao_Tai_San_2026.xlsx");
    }

    checkConnection();
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
