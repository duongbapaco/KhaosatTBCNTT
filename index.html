<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Khảo sát Thiết bị CNTT</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/davidshimjs/qrcodejs/qrcode.min.js"></script>
</head>
<body class="bg-light p-3">

<div class="card shadow p-4" style="max-width: 1000px; margin: auto;">
    <h4 class="text-center text-primary">PHIẾU KHẢO SÁT & KIỂM KÊ THIẾT BỊ CNTT</h4>
    <div id="connectionStatus" class="text-center p-2 mb-3 rounded" style="background:#eee;">Đang kiểm tra kết nối...</div>
    
    <form id="surveyForm">
        <div class="row g-2">
            <div class="col-md-4"><label>Bộ phận</label><input type="text" id="dept" class="form-control" required></div>
            <div class="col-md-4"><label>Người sử dụng</label><input type="text" id="user" class="form-control" required></div>
            <div class="col-12"><label>Tên thiết bị</label><input type="text" id="device" class="form-control" required></div>
            <button type="submit" class="btn btn-primary mt-3">Lưu thông tin</button>
        </div>
    </form>

    <hr>
    <table class="table table-bordered mt-3">
        <thead class="table-dark">
            <tr><th>Người dùng</th><th>Thiết bị</th><th>QR</th></tr>
        </thead>
        <tbody id="tableBody"></tbody>
    </table>
</div>

<script>
    // 1. CẤU HÌNH - HÃY ĐIỀN KEY CỦA BẠN VÀO ĐÂY
    const supabaseUrl = 'https://ckoersckkzygzuifplwj.supabase.co';
    const supabaseKey = 'sb_publishable_cfzmHqhoCkWwD2KZBEHZvw_xr5vVDbi'; 
    const _sb = supabase.createClient(supabaseUrl, supabaseKey);

    // 2. HÀM KẾT NỐI VÀ KIỂM TRA LỖI
    async function init() {
        const statusEl = document.getElementById('connectionStatus');
        try {
            // Kiểm tra bảng 'survey_devices'
            const { data, error } = await _sb.from('survey_devices').select('*');
            
            if (error) throw error;

            statusEl.innerText = "● Kết nối thành công! Đang tải dữ liệu...";
            statusEl.style.backgroundColor = "#d4edda"; // Xanh lá
            
            // Render dữ liệu
            document.getElementById('tableBody').innerHTML = data.map(row => `
                <tr>
                    <td>${row.full_name || ''}</td>
                    <td>${row.device_name || ''}</td>
                    <td><button class="btn btn-sm btn-info" onclick="alert('Mã QR cho: ${row.device_name}')">QR</button></td>
                </tr>`).join('');
                
        } catch (err) {
            statusEl.innerHTML = "<strong>LỖI KẾT NỐI:</strong> " + err.message + 
                                 "<br><small>Kiểm tra lại Anon Key hoặc tên bảng 'survey_devices' trong Database.</small>";
            statusEl.style.backgroundColor = "#f8d7da"; // Đỏ nhạt
            console.error("Chi tiết lỗi:", err);
        }
    }

    // 3. XỬ LÝ FORM
    document.getElementById('surveyForm').onsubmit = async (e) => {
        e.preventDefault();
        const { error } = await _sb.from('survey_devices').insert([{
            department: document.getElementById('dept').value,
            full_name: document.getElementById('user').value,
            device_name: document.getElementById('device').value
        }]);
        if(error) alert("Không lưu được: " + error.message);
        else { alert("Lưu thành công!"); init(); }
    };

    init();
</script>
</body>
</html>
