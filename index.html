<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Hệ thống Kiểm kê CNTT 2026</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>.table-warning { background-color: #fff3cd !important; }</style>
</head>
<body class="bg-light p-4">
<div class="card shadow p-4" style="max-width: 1200px; margin: auto;">
    <h4 class="text-primary mb-4">HỆ THỐNG KIỂM KÊ TÀI SẢN CNTT 2026</h4>
    
    <form id="surveyForm" class="mb-4 border p-3 rounded bg-white">
        <input type="hidden" id="editId">
        <div class="row g-3">
            <div class="col-md-3"><label>Bộ phận</label><input type="text" id="dept" class="form-control" required></div>
            <div class="col-md-3"><label>Người dùng</label><input type="text" id="user" class="form-control" required></div>
            <div class="col-md-3"><label>Thiết bị</label><input type="text" id="device" class="form-control" required></div>
            <div class="col-md-3"><label>Số lượng</label><input type="number" id="qty" class="form-control" value="1" required></div>
            
            <div class="col-md-3"><label>PM Chuyên ngành</label>
                <select id="others" class="form-select"><option value="Không">Không</option><option>ASIA Soft</option><option>Quasoft</option><option>MISA SME</option><option>FAST</option></select>
            </div>
            <div class="col-md-3"><label>Bản quyền PM</label>
                <select id="license" class="form-select text-danger"><option value="Chưa có">Chưa có</option><option value="Đã có">Đã có</option></select>
            </div>
            <div class="col-md-3"><label>Hệ điều hành</label>
                <select id="os" class="form-select">
                    <optgroup label="Windows Desktop"><option>Windows 11</option><option>Windows 10</option><option>Windows 8.1</option><option>Windows 7</option></optgroup>
                    <optgroup label="Windows Server"><option>Windows Server 2025</option><option>Windows Server 2022</option><option>Windows Server 2019</option></optgroup>
                    <optgroup label="Khác"><option>macOS</option><option>Linux (Ubuntu/CentOS)</option></optgroup>
                </select>
            </div>
            <div class="col-md-3"><label>Bộ Office</label>
                <select id="office" class="form-select">
                    <optgroup label="Microsoft Office"><option>Office 365</option><option>Office 2024</option><option>Office 2021</option><option>Office 2019</option><option>Office 2016</option></optgroup>
                    <optgroup label="Miễn phí/Thay thế"><option>WPS Office</option><option>LibreOffice</option><option>Google Workspace</option></optgroup>
                </select>
            </div>
            
            <div class="col-12"><label>Cấu hình chi tiết</label><input type="text" id="specs" class="form-control"></div>
            <div class="col-12 text-end">
                <button type="submit" id="submitBtn" class="btn btn-primary">Lưu dữ liệu</button>
                <button type="button" onclick="resetForm()" class="btn btn-secondary">Hủy</button>
            </div>
        </div>
    </form>

    <div class="mb-3"><select id="deptFilter" class="form-select w-25" onchange="filterData()"><option value="Tất cả">Lọc bộ phận (Tất cả)</option></select></div>
    <table class="table table-bordered bg-white">
        <thead class="table-dark"><tr><th>Thiết bị</th><th>Người dùng</th><th>PM Chuyên ngành</th><th>Bản quyền</th><th>OS/Office</th><th>Thao tác</th></tr></thead>
        <tbody id="tableBody"></tbody>
    </table>
</div>

<script>
    const _sb = supabase.createClient('https://ckoersckkzygzuifplwj.supabase.co', 'sb_publishable_cfzmHqhoCkWwD2KZBEHZvw_xr5vVDbi');
    let allData = [];

    async function init() {
        const { data } = await _sb.from('survey_devices').select('*');
        allData = (data || []).sort((a, b) => (a.license_status === "Chưa có" ? -1 : 1));
        const depts = [...new Set(allData.map(r => r.department))];
        document.getElementById('deptFilter').innerHTML = '<option value="Tất cả">Lọc bộ phận (Tất cả)</option>' + depts.map(d => `<option value="${d}">${d}</option>`).join('');
        renderTable(allData);
    }

    function renderTable(data) {
        document.getElementById('tableBody').innerHTML = data.map(r => `
            <tr class="${r.license_status === 'Chưa có' ? 'table-warning' : ''}">
                <td>${r.device_name||''}</td><td>${r.full_name||''}</td><td>${r.other_software||'Không'}</td>
                <td><strong>${r.license_status||''}</strong></td><td>${r.os||''}/${r.office_version||''}</td>
                <td><button class="btn btn-sm btn-warning" onclick="editRow(${r.id})">Sửa</button> <button class="btn btn-sm btn-danger" onclick="deleteRow(${r.id})">Xóa</button></td>
            </tr>`).join('');
    }

    function filterData() {
        const val = document.getElementById('deptFilter').value;
        renderTable(val === "Tất cả" ? allData : allData.filter(r => r.department === val));
    }

    function editRow(id) {
        const r = allData.find(x => x.id === id);
        document.getElementById('editId').value = r.id;
        document.getElementById('dept').value = r.department;
        document.getElementById('user').value = r.full_name;
        document.getElementById('device').value = r.device_name;
        document.getElementById('qty').value = r.qty;
        document.getElementById('others').value = r.other_software;
        document.getElementById('license').value = r.license_status;
        document.getElementById('os').value = r.os;
        document.getElementById('office').value = r.office_version;
        document.getElementById('specs').value = r.specs;
        document.getElementById('submitBtn').innerText = "Cập nhật dữ liệu";
        window.scrollTo(0, 0);
    }

    document.getElementById('surveyForm').onsubmit = async (e) => {
        e.preventDefault();
        const payload = {
            department: document.getElementById('dept').value, full_name: document.getElementById('user').value,
            device_name: document.getElementById('device').value, qty: parseInt(document.getElementById('qty').value),
            other_software: document.getElementById('others').value, license_status: document.getElementById('license').value,
            os: document.getElementById('os').value, office_version: document.getElementById('office').value, specs: document.getElementById('specs').value
        };
        await _sb.from('survey_devices').upsert([{ id: document.getElementById('editId').value || undefined, ...payload }]);
        resetForm(); init();
    };

    async function deleteRow(id) {
        if (prompt("Nhập mật khẩu xóa:") === "123456") { await _sb.from('survey_devices').delete().eq('id', id); init(); }
    }

    function resetForm() { document.getElementById('surveyForm').reset(); document.getElementById('editId').value = ""; document.getElementById('submitBtn').innerText = "Lưu dữ liệu"; }
    init();
</script>
</body>
</html>
