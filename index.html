<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Khảo Sát Thiết Bị</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
</head>
<body class="bg-light">

<div class="container py-4">
    <div class="card p-4 shadow">
        <h3>PHIẾU KHẢO SÁT</h3>
        <form id="surveyForm">
            <div class="row g-3">
                <div class="col-md-6"><label>Bộ phận</label><input type="text" id="dept" class="form-control" required></div>
                <div class="col-md-6"><label>Người sử dụng</label><input type="text" id="user" class="form-control" required></div>
                <button type="submit" class="btn btn-primary">Gửi dữ liệu</button>
            </div>
        </form>
    </div>
</div>

<script>
    // KHAI BÁO DUY NHẤT 1 LẦN
    const supabase = supabase.createClient('https://ckoersckkzygzuifplwj.supabase.co', 'sb_publishable_cfzmHqhoCkWwD2KZBEHZvw_xr5vVDbi');

    document.getElementById('surveyForm').onsubmit = async (e) => {
        e.preventDefault();
        const { error } = await supabase.from('survey_devices').insert([{
            user: document.getElementById('user').value,
            dept: document.getElementById('dept').value
        }]);
        
        if (error) {
            console.error("Lỗi:", error);
            alert("Lỗi: " + error.message);
        } else {
            alert("Gửi thành công!");
        }
    };
</script>
</body>
</html>
