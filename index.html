<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phiếu Khảo Sát Thiết Bị</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
    <style>
        body { background-color: #f0f2f5; }
        .card { max-width: 900px; margin: 20px auto; padding: 30px; border-radius: 15px; }
    </style>
</head>
<body>

<div class="container">
    <div class="card shadow">
        <h3 class="text-center mb-4 text-primary">PHIẾU KHẢO SÁT TRANG THIẾT BỊ CÔNG NGHỆ</h3>
        <form id="surveyForm">
            <div class="row g-3">
                <div class="col-md-6"><label>Bộ phận/Phòng ban *</label><input type="text" id="dept" class="form-control" required></div>
                <div class="col-md-6"><label>Người sử dụng *</label><input type="text" id="user" class="form-control" required></div>
                <div class="col-md-6"><label>Tên thiết bị *</label><input type="text" id="device" class="form-control" required></div>
                <div class="col-md-6"><label>Số lượng *</label><input type="number" id="qty" class="form-control" value="1" required></div>
                <div class="col-12"><label>Cấu hình chi tiết</label><textarea id="specs" class="form-control"></textarea></div>

                <div class="col-md-6"><label>Hệ điều hành</label>
                    <select id="os" class="form-select">
                        <option>Windows 10</option><option>Windows 11</option><option>macOS</option>
                    </select>
                </div>
                <div class="col-md-6"><label>Bản quyền HĐH</label>
                    <select id="os_license" class="form-select"><option>Chưa có</option><option>Có bản quyền</option></select>
                </div>

                <div class="col-md-6"><label>Phần mềm Office</label>
                    <select id="office" class="form-select"><option>Office 2019</option><option>Office 2021</option><option>Office 365</option></select>
                </div>
                <div class="col-md-6"><label>Bản quyền Office</label>
                    <select id="office_license" class="form-select"><option>Chưa có</option><option>Có bản quyền</option></select>
                </div>

                <div class="col-md-6"><label>Phần mềm khác</label><input type="text" id="others" class="form-control"></div>
                <div class="col-md-6"><label>Bản quyền phần mềm khác</label>
                    <select id="other_license" class="form-select"><option>Chưa có</option><option>Có bản quyền</option></select>
                </div>

                <div class="col-12"><label>Đề xuất/Kiến nghị</label><textarea id="note" class="form-control"></textarea></div>
            </div>
            <button type="submit" class="btn btn-primary w-100 mt-4">Thêm vào bảng thống kê</button>
        </form>

        <hr class="my-4">
        <button onclick="exportToExcel()" class="btn btn-success w-100">Xuất báo cáo Excel</button>
    </div>
</div>

<script>
    const supabase = supabase.createClient('https://ckoersckkzygzuifplwj.supabase.co', 'sb_publishable_cfzmHqhoCkWwD2KZBEHZvw_xr5vVDbi');

    document.getElementById('surveyForm').onsubmit = async (e) => {
        e.preventDefault();
        const data = {
            user: document.getElementById('user').value,
            dept: document.getElementById('dept').value,
            device: document.getElementById('device').value,
            qty: parseInt(document.getElementById('qty').value),
            specs: document.getElementById('specs').value,
            os: document.getElementById('os').value,
            os_license: document.getElementById('os_license').value,
            office: document.getElementById('office').value,
            office_license: document.getElementById('office_license').value,
            others: document.getElementById('others').value,
            other_license: document.getElementById('other_license').value,
            note: document.getElementById('note').value
        };

        const { error } = await supabase.from('survey_devices').insert([data]);
        if (error) alert("Lỗi: " + error.message);
        else { alert("Gửi thành công!"); document.getElementById('surveyForm').reset(); }
    };

    async function exportToExcel() {
        const { data } = await supabase.from('survey_devices').select('*');
        const ws = XLSX.utils.json_to_sheet(data);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "BaoCao");
        XLSX.writeFile(wb, "PhieuKhaoSat.xlsx");
    }
</script>
</body>
</html>
