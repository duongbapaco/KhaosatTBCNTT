<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>HỆ THỐNG QUẢN TRỊ TÀI SẢN 2026</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        body { font-family: 'Times New Roman', serif; background: #f4f7f6; font-size: 0.9rem; }
        .status-bar { padding: 5px 15px; font-size: 0.8rem; border-bottom: 1px solid #ddd; background: #fff; }
        #reportTable { width: 100%; table-layout: fixed; border: 1px solid #000; }
        th, td { padding: 8px; border: 1px solid #ccc; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .qr-action { cursor: pointer; color: blue; text-decoration: underline; }
    </style>
</head>
<body>

<div id="statusBar" class="status-bar">Đang kết nối Supabase...</div>

<div class="container-fluid p-4">
    <div class="d-flex justify-content-between mb-3">
        <h3>QUẢN LÝ TÀI SẢN DOANH NGHIỆP</h3>
        <button class="btn btn-success" onclick="exportExcel()">📄 Xuất báo cáo (Chuẩn hành chính)</button>
    </div>

    <div class="row mb-3 g-2">
        <div class="col-md-4"><input type="text" id="filter" class="form-control" placeholder="🔍 Tìm kiếm theo tên, bộ phận, thiết bị..."></div>
    </div>

    <div class="table-responsive">
        <table id="reportTable">
            <thead class="table-light">
                <tr><th>Người dùng / Bộ phận</th><th>Thiết bị</th><th>HĐH</th><th>Office</th><th>Phần mềm khác</th><th>QR</th><th>Thao tác</th></tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>
</div>

<div class="modal fade" id="qrModal" tabindex="-1"><div class="modal-dialog modal-sm"><div class="modal-content"><div class="modal-body text-center">
    <div id="qrBox" class="d-flex justify-content-center mb-3"></div>
    <div class="d-grid gap-2"><button class="btn btn-primary" onclick="window.print()">In mã QR</button><button class="btn btn-secondary" data-bs-dismiss="modal">Đóng</button></div>
</div></div></div></div>

<script>
    // CẤU HÌNH API CỦA BẠN
    const _sb = supabase.createClient('https://ckoersckkzygzuifplwj.supabase.co', 'sb_publishable_cfzmHqhoCkWwD2KZBEHZvw_xr5vVDbi');

    async function init() {
        const statusBar = document.getElementById('statusBar');
        const { data, error } = await _sb.from('asset_management').select('*');
        
        if (error) {
            statusBar.innerHTML = "🔴 Lỗi kết nối: " + error.message;
            statusBar.style.background = "#ffcccc";
        } else {
            statusBar.innerHTML = "🟢 Trạng thái: Đã kết nối thành công | " + data.length + " bản ghi";
            statusBar.style.background = "#ccffcc";
            renderTable(data);
        }
    }

    function renderTable(data) {
        document.getElementById('tableBody').innerHTML = data.map(r => `<tr>
            <td><b>${r.user_name}</b><br>${r.department}</td>
            <td>${r.device_name}</td>
            <td>${r.os} (${r.os_lic})</td>
            <td>${r.office} (${r.off_lic})</td>
            <td>${r.specialized_pm || 'N/A'}</td>
            <td class="qr-action" onclick="showQR('${r.id}')">Xem/In QR</td>
            <td><button class="btn btn-sm btn-info" onclick="editData(${r.id})">Sửa</button> <button class="btn btn-sm btn-danger" onclick="delData(${r.id})">Xóa</button></td>
        </tr>`).join('');
    }

    function showQR(id) {
        document.getElementById('qrBox').innerHTML = "";
        new QRCode(document.getElementById('qrBox'), {text: "https://your-app-url.com/asset/" + id, width: 160, height: 160});
        new bootstrap.Modal(document.getElementById('qrModal')).show();
    }

    function exportExcel() {
        let header = "<div style='text-align:center'><b>CỘNG HÒA XÃ HỘI CHỦ NGHĨA VIỆT NAM</b><br><b>Độc lập - Tự do - Hạnh phúc</b><br><br><h3>BÁO CÁO THỐNG KÊ TÀI SẢN 2026</h3></div>";
        let table = document.getElementById('reportTable').outerHTML;
        let blob = new Blob(['\ufeff', header + table], {type: 'application/vnd.ms-excel'});
        let a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'Bao_Cao_Tai_San.xls'; a.click();
    }

    init();
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
