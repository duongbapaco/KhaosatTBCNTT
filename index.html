<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Hệ thống Kiểm kê CNTT 2026</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        .status-pill { padding: 5px 15px; border-radius: 20px; font-weight: bold; }
        .bg-connected { background: #d4edda; color: #155724; }
    </style>
</head>
<body class="bg-light p-4">

<div class="card shadow p-4" style="max-width: 1200px; margin: auto;">
    <h4 class="text-primary mb-4">HỆ THỐNG KIỂM KÊ TÀI SẢN CNTT 2026</h4>
    <div id="connStatus" class="status-pill bg-secondary text-white mb-3">Đang kết nối...</div>

    <form id="surveyForm" class="mb-4 border p-3 rounded bg-white">
        <input type="hidden" id="editId">
        <div class="row g-3">
            <div class="col-md-3"><label>Bộ phận</label><input type="text" id="dept" class="form-control" required></div>
            <div class="col-md-3"><label>Người dùng</label><input type="text" id="user" class="form-control" required></div>
            <div class="col-md-3"><label>Thiết bị</label><input type="text" id="device" class="form-control" required></div>
            <div class="col-md-3"><label>Số lượng</label><input type="number" id="qty" class="form-control" value="1" required></div>
            
            <div class="col-md-4"><label>Hệ điều hành</label>
                <select id="os" class="form-select">
                    <option>Windows 11</option><option>Windows 10</option><option>Windows 8.1</option><option>Windows 7</option>
                    <option>Windows Server 2025</option><option>Windows Server 2022</option><option>macOS</option><option>Linux</option>
                </select>
            </div>
            <div class="col-md-4"><label>Bộ Office</label>
                <select id="office" class="form-select">
                    <option>Office 365</option><option>Office 2024</option><option>Office 2021</option><option>Office 2019</option>
                    <option>Office 2016</option><option>WPS Office</option><option>LibreOffice</option>
                </select>
            </div>
            <div class="col-md-4"><label>PM Chuyên ngành</label>
                <select id="others" class="form-select">
                    <option value="Không">Không</option><option>ASIA Soft</option><option>Quasoft</option><option>MISA SME</option><option>FAST</option>
                </select>
            </div>
            <div class="col-12"><label>Cấu hình chi tiết</label><input type="text" id="specs" class="form-control"></div>
            <div class="col-12 text-end">
                <button type="submit" id="submitBtn" class="btn btn-primary">Lưu dữ liệu</button>
                <button type="button" onclick="resetForm()" class="btn btn-secondary">Hủy</button>
            </div>
        </div>
    </form>

    <div class="mb-3"><select id="deptFilter" class="form-select w-25" onchange="filterData()"><option value="Tất cả">Lọc theo bộ phận (Tất cả)</option></select></div>

    <table class="table table-bordered bg-white">
        <thead class="table-dark">
            <tr><th>Thiết bị</th><th>SL</th><th>Người dùng</th><th>Bộ phận</th><th>OS</th><th>Office</th><th>PM</th><th>Thao tác</th></tr>
        </thead>
        <tbody id="tableBody"></tbody>
    </table>
</div>

<script>
    const _sb = supabase.createClient('https://ckoersckkzygzuifplwj.supabase.co', 'sb_publishable_cfzmHqhoCkWwD2KZBEHZvw_xr5vVDbi');
    let allData = [];

    async function init() {
        const { data, error } = await _sb.from('survey_devices').select('*');
        if (error) { alert("Lỗi tải dữ liệu: " + error.message); return; }
        allData = data || [];
        const depts = [...new Set(allData.map(r => r.department))];
        const filter = document.getElementById('deptFilter');
        filter.innerHTML = '<option value="Tất cả">Lọc theo bộ phận (Tất cả)</option>' + depts.map(d => `<option value="${d}">${d}</option>`).join('');
        renderTable(allData);
    }

    function renderTable(data) {
        document.getElementById('tableBody').innerHTML = data.map(r => `<tr>
            <td>${r.device_name || ''}</td><td>${r.qty || 1}</td><td>${r.full_name || ''}</td><td>${r.department || ''}</td>
            <td>${r.os || ''}</td><td>${r.office_version || ''}</td><td>${r.other_software || 'Không'}</td>
            <td>
                <button class="btn btn-sm btn-warning" onclick="editRow(${r.id})">Sửa</button>
                <button class="btn btn-sm btn-danger" onclick="deleteRow(${r.id})">Xóa</button>
            </td>
        </tr>`).join('');
    }

    function filterData() {
        const val = document.getElementById('deptFilter').value;
        renderTable(val === "Tất cả" ? allData : allData.filter(r => r.department === val));
    }

    function editRow(id) {
        const item = allData.find(r => r.id === id);
        document.getElementById('editId').value = item.id;
        document.getElementById('dept').value = item.department || "";
        document.getElementById('user').value = item.full_name || "";
        document.getElementById('device').value = item.device_name || "";
        document.getElementById('qty').value = item.qty || 1;
        document.getElementById('os').value = item.os || "Windows 11";
        document.getElementById('office').value = item.office_version || "Office 365";
        document.getElementById('others').value = item.other_software || "Không";
        document.getElementById('specs').value = item.specs || "";
        document.getElementById('submitBtn').innerText = "Cập nhật dữ liệu";
        window.scrollTo(0, 0);
    }

    document.getElementById('surveyForm').onsubmit = async (e) => {
        e.preventDefault();
        const id = document.getElementById('editId').value;
        const payload = {
            department: document.getElementById('dept').value,
            full_name: document.getElementById('user').value,
            device_name: document.getElementById('device').value,
            qty: parseInt(document.getElementById('qty').value),
            os: document.getElementById('os').value,
            office_version: document.getElementById('office').value,
            other_software: document.getElementById('others').value,
            specs: document.getElementById('specs').value
        };

        if (id) {
            const { error } = await _sb.from('survey_devices').update(payload).eq('id', id);
            if (error) alert("Lỗi cập nhật: " + error.message);
            else alert("Cập nhật thành công!");
        } else {
            const { error } = await _sb.from('survey_devices').insert([payload]);
            if (error) alert("Lỗi thêm mới: " + error.message);
            else alert("Đã thêm mới thành công!");
        }
        resetForm(); init();
    };

    async function deleteRow(id) {
        const pass = prompt("Nhập mật khẩu xóa:");
        if (pass === "123456") {
            await _sb.from('survey_devices').delete().eq('id', id);
            init();
        } else { alert("Mật khẩu sai!"); }
    }

    function resetForm() { document.getElementById('surveyForm').reset(); document.getElementById('editId').value = ""; document.getElementById('submitBtn').innerText = "Lưu dữ liệu"; }
    init();
</script>
</body>
</html>
