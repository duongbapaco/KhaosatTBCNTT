<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>QUẢN TRỊ TÀI SẢN 2026 - CHUẨN HÀNH CHÍNH</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        body { font-family: 'Times New Roman', serif; background: #f8f9fa; }
        .label-field { font-weight: bold; font-size: 0.8rem; margin-top: 10px; display: block; }
        .qr-canvas { width: 50px; height: 50px; margin: auto; }
        @media print { .no-print { display: none !important; } }
    </style>
</head>
<body class="p-4">

<div id="statusBar" class="alert alert-warning text-center no-print">Đang kiểm tra kết nối...</div>

<div class="no-print mb-4 p-3 bg-white border shadow-sm">
    <h5 class="text-center text-uppercase fw-bold" id="formTitle">Hệ thống Nhập liệu Tài sản</h5>
    <input type="hidden" id="editId">
    <div class="row g-2">
        <div class="col-md-2"><label class="label-field">BỘ PHẬN SỬ DỤNG</label><input type="text" id="dpt" class="form-control"></div>
        <div class="col-md-2"><label class="label-field">NGƯỜI SỬ DỤNG</label><input type="text" id="usr" class="form-control"></div>
        <div class="col-md-2"><label class="label-field">THIẾT BỊ</label><input type="text" id="dev" class="form-control"></div>
        <div class="col-md-1"><label class="label-field">SỐ LƯỢNG</label><input type="number" id="qty" class="form-control" value="1"></div>
        <div class="col-md-2"><label class="label-field">HĐH</label><select id="os" class="form-select"><option>Windows 11</option><option>Windows 10</option><option>macOS</option></select></div>
        <div class="col-md-1"><label class="label-field">BQ HĐH</label><select id="osL" class="form-select"><option>Chưa có</option><option>Đã có</option></select></div>
        <div class="col-md-2"><label class="label-field">OFFICE</label><select id="off" class="form-select"><option>Microsoft 365</option><option>Office 2024</option></select></div>
        <div class="col-md-1"><label class="label-field">BQ OFFICE</label><select id="offL" class="form-select"><option>Chưa có</option><option>Đã có</option></select></div>
        <div class="col-md-3"><label class="label-field">CẤU HÌNH CHI TIẾT</label><input type="text" id="specs" class="form-control"></div>
        <div class="col-md-3"><label class="label-field">ĐỀ XUẤT</label><input type="text" id="prop" class="form-control"></div>
        <div class="col-12"><button class="btn btn-dark w-100" onclick="saveData()" id="saveBtn">LƯU DỮ LIỆU</button></div>
    </div>
</div>

<table class="table table-bordered table-hover">
    <thead class="table-dark">
        <tr><th>Thông tin</th><th>Số lượng</th><th>Cấu hình</th><th>Đề xuất</th><th>QR</th><th>Thao tác</th></tr>
    </thead>
    <tbody id="tableBody"></tbody>
</table>

<script>
    const _sb = supabase.createClient('https://ckoersckkzygzuifplwj.supabase.co', 'sb_publishable_cfzmHqhoCkWwD2KZBEHZvw_xr5vVDbi');

    async function loadData() {
        const { data } = await _sb.from('asset_management').select('*');
        document.getElementById('tableBody').innerHTML = data.map(r => `<tr>
            <td><b>${r.department}</b><br>${r.user_name}<br>${r.device_name}</td>
            <td>${r.quantity}</td><td>${r.specs}</td><td>${r.proposal}</td>
            <td class="text-center"><div id="qr-${r.id}" class="qr-canvas"></div></td>
            <td>
                <button class="btn btn-sm btn-info" onclick="editData(${JSON.stringify(r).replace(/"/g, '&quot;')})">Sửa</button>
                <button class="btn btn-sm btn-danger" onclick="delData(${r.id})">Xóa</button>
            </td>
        </tr>`).join('');
        data.forEach(r => new QRCode(document.getElementById(`qr-${r.id}`), {text: "ID:" + r.id, width: 50, height: 50}));
    }

    // Chức năng Sửa: Đổ ngược dữ liệu vào form
    function editData(r) {
        document.getElementById('editId').value = r.id;
        document.getElementById('dpt').value = r.department;
        document.getElementById('usr').value = r.user_name;
        document.getElementById('dev').value = r.device_name;
        document.getElementById('qty').value = r.quantity;
        document.getElementById('specs').value = r.specs;
        document.getElementById('prop').value = r.proposal;
        document.getElementById('saveBtn').innerText = "CẬP NHẬT DỮ LIỆU";
        window.scrollTo(0,0);
    }

    async function saveData() {
        const id = document.getElementById('editId').value;
        const payload = { department: document.getElementById('dpt').value, user_name: document.getElementById('usr').value, device_name: document.getElementById('dev').value, quantity: document.getElementById('qty').value, specs: document.getElementById('specs').value, proposal: document.getElementById('prop').value };
        
        if(id) await _sb.from('asset_management').update(payload).eq('id', id);
        else await _sb.from('asset_management').insert(payload);
        location.reload();
    }

    function delData(id) {
        let p = prompt("Nhập mật khẩu Admin (mật khẩu sẽ bị ẩn):", ""); // Lưu ý: Prompt là chuẩn trình duyệt bảo mật nhất cho yêu cầu này
        if (p === "ADMIN2026") { _sb.from('asset_management').delete().eq('id', id).then(loadData); }
        else if(p !== null) alert("Sai mật khẩu!");
    }

    loadData();
</script>
</body>
</html>
