<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>QUẢN TRỊ TÀI SẢN 2026 - CHUẨN CHUYÊN NGHIỆP</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        body { font-family: 'Times New Roman', serif; background: #f4f7f6; font-size: 0.85rem; }
        .table { table-layout: fixed; width: 100%; border-collapse: collapse; }
        .table th, .table td { padding: 8px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; border: 1px solid #dee2e6; }
        .badge-lic { font-size: 0.7rem; font-style: italic; }
        .qr-icon { width: 35px; cursor: pointer; border: 1px solid #ccc; }
        .no-print { display: block; }
        @media print { .no-print { display: none; } }
    </style>
</head>
<body class="p-3">

<div class="card p-4 shadow-sm mb-4">
    <h5 class="mb-3">KÊ KHAI THÔNG TIN TÀI SẢN</h5>
    <div class="row g-3">
        <div class="col-md-2"><input type="text" id="dpt" class="form-control" placeholder="Bộ phận"></div>
        <div class="col-md-2"><input type="text" id="usr" class="form-control" placeholder="Người dùng"></div>
        <div class="col-md-2"><input type="text" id="dev" class="form-control" placeholder="Thiết bị"></div>
        <div class="col-md-1"><input type="number" id="qty" class="form-control" placeholder="Số lượng"></div>
        <div class="col-md-2">
            <select id="os" class="form-select"><optgroup label="Windows"><option>Windows 11</option><option>Windows 10</option><option>Windows 8.1</option><option>Windows 7</option></optgroup><optgroup label="Khác"><option>MacOS</option></optgroup></select>
            <select id="osL" class="form-select mt-1"><option>Đã có bản quyền</option><option>Chưa có bản quyền</option></select>
        </div>
        <div class="col-md-2">
            <input type="text" id="pm" class="form-control" list="pmList" placeholder="PM (ASIA/QUASOFT/MISA)">
            <select id="pmL" class="form-select mt-1"><option>Đã có bản quyền</option><option>Chưa có bản quyền</option></select>
        </div>
        <div class="col-md-1"><button class="btn btn-dark w-100" onclick="saveData()">LƯU</button></div>
    </div>
</div>

<div class="mb-3 d-flex gap-2">
    <input type="text" id="searchBox" class="form-control w-25" placeholder="🔍 Lọc theo bộ phận...">
    <button class="btn btn-success" onclick="exportExcel()">Xuất Excel Chuẩn</button>
</div>

<div class="card p-3">
    <table class="table table-hover" id="reportTable">
        <thead class="table-light">
            <tr><th>Người dùng / Bộ phận</th><th>Thiết bị</th><th>HĐH (BQ)</th><th>PM (BQ)</th><th>QR</th><th>Thao tác</th></tr>
        </thead>
        <tbody id="tableBody"></tbody>
    </table>
</div>

<div id="qrModal" class="modal fade" tabindex="-1"><div class="modal-dialog"><div class="modal-content"><div class="modal-body text-center"><div id="qrBox"></div></div></div></div></div>

<script>
    const _sb = supabase.createClient('https://ckoersckkzygzuifplwj.supabase.co', 'sb_publishable_cfzmHqhoCkWwD2KZBEHZvw_xr5vVDbi');
    const ADMIN_PASS = "2026@ADMIN";

    async function loadData() {
        const { data } = await _sb.from('asset_management').select('*');
        document.getElementById('tableBody').innerHTML = data.map(r => `<tr>
            <td><b>${r.user_name}</b><br><small>${r.department}</small></td>
            <td>${r.device_name}</td>
            <td>${r.os}<br><span class="badge-lic ${r.os_lic=='Đã có bản quyền'?'text-success':'text-danger'}">(${r.os_lic})</span></td>
            <td>${r.specialized_pm || 'N/A'}<br><span class="badge-lic">(${r.pm_lic || 'N/A'})</span></td>
            <td><img src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=${r.id}" class="qr-icon" onclick="showQR('${r.id}')"></td>
            <td><button class="btn btn-sm btn-info" onclick="editData(${r.id})">Sửa</button> <button class="btn btn-sm btn-danger" onclick="delData(${r.id})">Xóa</button></td>
        </tr>`).join('');
    }

    function showQR(id) {
        document.getElementById('qrBox').innerHTML = "";
        new QRCode(document.getElementById('qrBox'), {text: window.location.href + "?id=" + id, width: 250, height: 250});
        new bootstrap.Modal(document.getElementById('qrModal')).show();
    }

    function exportExcel() {
        let uri = 'data:application/vnd.ms-excel;base64,', template = '<html xmlns:o="urn:schemas-microsoft-com:office:office" xmlns:x="urn:schemas-microsoft-com:office:excel" xmlns="http://www.w3.org/TR/REC-html40"><head><meta charset="UTF-8"></head><body><h3>BÁO CÁO TÀI SẢN CNTT</h3>{table}</body></html>';
        let base64 = (s) => window.btoa(unescape(encodeURIComponent(s)));
        let table = document.getElementById('reportTable').outerHTML;
        window.location.href = uri + base64(template.replace('{table}', table));
    }

    loadData();
</script>

<datalist id="pmList">
    <option value="ASIA Enterprise 2026"><option value="ASIA Enterprise 2020"><option value="QUASOFT V9"><option value="QUASOFT V7"><option value="MISA SME 2025"><option value="MISA AMIS">
</datalist>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
