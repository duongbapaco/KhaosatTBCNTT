<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phiếu Khảo Sát Thiết Bị Công Nghệ</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
</head>
<body class="bg-light">

<div class="container py-5">
    <div class="card shadow p-4 mx-auto" style="max-width: 800px;">
        <h3 class="text-center mb-4">PHIẾU KHẢO SÁT TRANG THIẾT BỊ</h3>
        <form id="surveyForm">
            <div class="row g-3">
                <div class="col-md-6"><label>Bộ phận/Phòng ban</label><input type="text" id="dept" class="form-control" required></div>
                <div class="col-md-6"><label>Người sử dụng</label><input type="text" id="user" class="form-control" required></div>
                <div class="col-md-6"><label>Tên thiết bị</label><input type="text" id="device" class="form-control" required></div>
                <div class="col-md-6"><label>Số lượng</label><input type="number" id="qty" class="form-control" value="1"></div>
                <div class="col-12"><label>Cấu hình chi tiết</label><textarea id="specs" class="form-control" rows="2"></textarea></div>

                <div class="col-md-8"><label>Hệ điều hành</label>
                    <select id="os" class="form-select">
                        <option value="Win XP">Windows XP</option><option value="Win 7">Windows 7</option>
                        <option value="Win 10">Windows 10</option><option value="Win 11">Windows 11</option>
                        <option value="macOS">macOS</option><option value="Ubuntu">Ubuntu/Linux</option>
                    </select>
                </div>
                <div class="col-md-4"><label>Bản quyền</label>
                    <select id="os_license" class="form-select"><option value="Chưa có">Chưa có</option><option value="Có">Có bản quyền</option></select>
                </div>

                <div class="col-md-8"><label>Phần mềm Office</label>
                    <select id="office" class="form-select">
                        <option value="Office 2003">Office 2003</option><option value="Office 2007">Office 2007</option>
                        <option value="Office 2010">Office 2010</option><option value="Office 2013">Office 2013</option>
                        <option value="Office 2016">Office 2016</option><option value="Office 2019">Office 2019</option>
                        <option value="Office 2021">Office 2021</option><option value="Office 365">Office 365</option>
                    </select>
                </div>
                <div class="col-md-4"><label>Bản quyền</label>
                    <select id="office_license" class="form-select"><option value="Chưa có">Chưa có</option><option value="Có">Có bản quyền</option></select>
                </div>

                <div class="col-md-8"><label>Phần mềm khác</label>
                    <input list="softList" id="others" class="form-control" placeholder="Gõ tìm hoặc nhập mới...">
                    <datalist id="softList">
                        <option value="Adobe Photoshop"><option value="AutoCAD"><option value="MISA SME">
                        <option value="Unikey"><option value="Google Chrome"><option value="Foxit Reader">
                    </datalist>
                </div>
                <div class="col-md-4"><label>Bản quyền</label>
                    <select id="other_license" class="form-select"><option value="Chưa có">Chưa có</option><option value="Có">Có bản quyền</option></select>
                </div>

                <div class="col-12"><label>Đề xuất / Kiến nghị</label><textarea id="note" class="form-control"></textarea></div>
            </div>
            <button type="submit" class="btn btn-primary w-100 mt-4">Gửi thông tin</button>
        </form>
        <button onclick="exportToExcel()" class="btn btn-success w-100 mt-2">Xuất báo cáo Excel</button>
    </div>
</div>

<script>
    const supabaseClient = supabase.createClient(
        'https://ckoersckkzygzuifplwj.supabase.co', 
        'sb_publishable_cfzmHqhoCkWwD2KZBEHZvw_xr5vVDbi'
    );

    document.getElementById('surveyForm').onsubmit = async (e) => {
        e.preventDefault();
        const data = {
            dept: document.getElementById('dept').value,
            user: document.getElementById('user').value,
            device: document.getElementById('device').value,
            qty: parseInt(document.getElementById('qty').value),
            specs: document.getElementById('specs').value,
            os: document.getElementById('os').value,
            os_license: document.getElementById('os_license').value,
            office: document.getElementById('office').value,
            office_license: document.getElementById('office_license').value,
            others: document.getElementById('others').value,
            other_license: document.getElementById('other_license').value,
            note: document.getElementById('note').value
        };

        const { error } = await supabaseClient.from('survey_devices').insert([data]);
        if (error) alert("Lỗi: " + error.message);
        else { alert("Gửi dữ liệu thành công!"); document.getElementById('surveyForm').reset(); }
    };

    async function exportToExcel() {
        const { data } = await supabaseClient.from('survey_devices').select('*');
        const ws = XLSX.utils.json_to_sheet(data);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "Baocao");
        XLSX.writeFile(wb, "PhieuKhaoSat.xlsx");
    }
</script>
</body>
</html>
