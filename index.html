<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Hệ thống Quản trị Tài sản 2026</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        /* Bảo mật */
        #qr-container, #pass-container { display: none; position: fixed; top: 20%; left: 50%; transform: translateX(-50%); background: white; padding: 25px; border: 3px solid #0d6efd; z-index: 9999; box-shadow: 0 0 30px rgba(0,0,0,0.5); text-align: center; border-radius: 15px; }
        
        /* Chuẩn thể thức in ấn văn bản hành chính */
        @media print {
            .no-print { display: none !important; }
            body { font-family: "Times New Roman", serif; font-size: 13pt; padding: 2cm; }
            .print-header { display: block !important; text-align: center; margin-bottom: 20px; }
            table { width: 100%; border-collapse: collapse; }
            th, td { border: 1px solid #000 !important; padding: 5px; }
        }
        .print-header { display: none; }
    </style>
</head>
<body class="bg-light p-4">

    <div id="pass-container" class="no-print">
        <h5 class="text-danger">Xác thực mật khẩu</h5>
        <input type="password" id="passInput" class="form-control mb-2" placeholder="Nhập mật khẩu...">
        <button class="btn btn-primary" onclick="checkPass()">Xác nhận</button>
    </div>

    <div id="printableArea" class="card p-4 shadow" style="max-width: 1500px; margin: auto;">
        <div class="print-header no-print-hide">
            <h5 class="fw-bold">CỘNG HÒA XÃ HỘI CHỦ NGHĨA VIỆT NAM</h5>
            <h6 class="fw-bold" style="text-decoration: underline;">Độc lập - Tự do - Hạnh phúc</h6>
            <h4 class="mt-4 text-uppercase fw-bold">BÁO CÁO THỐNG KÊ TÀI SẢN CÔNG NGHỆ THÔNG TIN 2026</h4>
        </div>

        <form id="dataForm" class="row g-3 bg-white p-3 border rounded mb-4 no-print">
            <input type="hidden" id="editId">
            <div class="col-md-2"><label>Bộ phận</label><input type="text" id="dept" class="form-control" required></div>
            <div class="col-md-2"><label>Người dùng</label><input type="text" id="user" class="form-control" required></div>
            <div class="col-md-2"><label>Thiết bị</label><input type="text" id="device" class="form-control"></div>
            <div class="col-md-1"><label>SL</label><input type="number" id="qty" value="1" class="form-control"></div>
            <div class="col-md-2"><label>HĐH</label>
                <select id="os" class="form-select">
                    <optgroup label="Windows"><option>Windows 11</option><option>Windows 10</option><option>Windows 8.1</option><option>Windows 7</option><option>Windows XP</option><option>Windows Server 2025/2022/2019</option></optgroup>
                    <optgroup label="Khác"><option>macOS</option><option>Ubuntu Linux</option></optgroup>
                </select>
            </div>
            <div class="col-md-2"><label>Office</label>
                <select id="office" class="form-select">
                    <option>Microsoft 365</option><option>Office 2024</option><option>Office 2021</option><option>Office 2019</option><option>Office 2016/2013/2010</option><option>Office 2007/2003</option>
                </select>
            </div>
            <div class="col-md-3"><label>PM Chuyên ngành (Nhập/Chọn)</label>
                <input class="form-control" list="pmList" id="pm" placeholder="Chọn hoặc tự nhập">
                <datalist id="pmList"><option value="Không có"><option value="ASIA Enterprise"><option value="MISA SME.NET"><option value="FAST Accounting"><option value="BRAVO"><option value="SAP"></datalist>
            </div>
            <div class="col-md-5"><label>Cấu hình</label><input type="text" id="specs" class="form-control"></div>
            <div class="col-md-5"><label>Đề xuất</label><input type="text" id="proposal" class="form-control"></div>
            <div class="col-md-2 text-end pt-4"><button type="submit" class="btn btn-primary w-100">LƯU DỮ LIỆU</button></div>
        </form>

        <table class="table table-bordered" id="reportTable">
            <thead class="table-dark"><tr><th>Thông tin</th><th>SL</th><th>HĐH</th><th>Office</th><th>PM Chuyên ngành</th><th>Cấu hình</th><th>Đề xuất</th><th class="no-print">Thao tác</th></tr></thead>
            <tbody id="tableBody"></tbody>
        </table>
        
        <div class="text-end mt-3 no-print">
            <button class="btn btn-warning" onclick="window.print()">🖨️ In báo cáo (Chuẩn)</button>
            <button class="btn btn-success" onclick="exportFile('xlsx')">📊 Xuất Excel</button>
        </div>
    </div>

<script>
    const _sb = supabase.createClient('https://ckoersckkzygzuifplwj.supabase.co', 'sb_publishable_cfzmHqhoCkWwD2KZBEHZvw_xr5vVDbi');
    const PASS = "123456";
    let pendingAction = {type: '', data: null};

    function secureAction(type, data) { pendingAction = {type, data}; document.getElementById('pass-container').style.display = 'block'; }
    function checkPass() {
        if (document.getElementById('passInput').value === PASS) {
            document.getElementById('pass-container').style.display = 'none';
            if (pendingAction.type === 'delete') deleteRow(pendingAction.data);
            else editRow(pendingAction.data);
        } else alert("Sai mật khẩu!");
    }

    async function loadData() {
        const { data } = await _sb.from('survey_devices').select('*').order('id', {ascending: false});
        if(data) {
            document.getElementById('tableBody').innerHTML = data.map(r => `<tr>
                <td>${r.department} - ${r.full_name}<br>${r.device_name}</td>
                <td>${r.quantity}</td><td>${r.os}</td><td>${r.office_version}</td><td>${r.special_pm}</td><td>${r.specs}</td><td>${r.proposal || ''}</td>
                <td class="no-print">
                    <button class="btn btn-sm btn-info" onclick="secureAction('edit', ${JSON.stringify(r).replace(/"/g, '&quot;')})">Sửa</button>
                    <button class="btn btn-sm btn-danger" onclick="secureAction('delete', '${r.id}')">Xóa</button>
                </td>
            </tr>`).join('');
        }
    }

    // Xử lý lưu, sửa, xóa... (Giữ nguyên logic logic như cũ nhưng đảm bảo trường proposal)
    document.getElementById('dataForm').onsubmit = async (e) => { e.preventDefault(); const p = { department: document.getElementById('dept').value, full_name: document.getElementById('user').value, device_name: document.getElementById('device').value, quantity: document.getElementById('qty').value, os: document.getElementById('os').value, office_version: document.getElementById('office').value, special_pm: document.getElementById('pm').value, specs: document.getElementById('specs').value, proposal: document.getElementById('proposal').value }; const id = document.getElementById('editId').value; if(id) await _sb.from('survey_devices').update(p).eq('id', id); else await _sb.from('survey_devices').insert([p]); loadData(); document.getElementById('dataForm').reset(); };
    function editRow(r) { document.getElementById('editId').value=r.id; document.getElementById('dept').value=r.department; document.getElementById('user').value=r.full_name; document.getElementById('device').value=r.device_name; document.getElementById('qty').value=r.quantity; document.getElementById('os').value=r.os; document.getElementById('office').value=r.office_version; document.getElementById('pm').value=r.special_pm; document.getElementById('specs').value=r.specs; document.getElementById('proposal').value=r.proposal; window.scrollTo(0,0); }
    async function deleteRow(id) { await _sb.from('survey_devices').delete().eq('id', id); loadData(); }
    function exportFile(type) { const t = document.getElementById("reportTable"); XLSX.writeFile(XLSX.utils.table_to_book(t), "BaoCao_TaiSan.xlsx"); }
    loadData();
</script>
</body>
</html>
