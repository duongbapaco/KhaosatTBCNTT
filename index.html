<!-- PHẦN CẤU HÌNH SELECT / DATALIST -->

<!-- Hệ điều hành -->
<div class="col-md-4 mb-3">
    <label>Hệ điều hành</label>
    <select id="os" class="form-select">
        <optgroup label="Windows">
            <option value="Windows XP">Windows XP</option>
            <option value="Windows 7">Windows 7</option>
            <option value="Windows 10">Windows 10</option>
            <option value="Windows 11">Windows 11</option>
        </optgroup>
        <optgroup label="Khác">
            <option value="macOS">macOS</option>
            <option value="Ubuntu/Linux">Ubuntu/Linux</option>
        </optgroup>
    </select>
</div>

<!-- Office -->
<div class="col-md-4 mb-3">
    <label>Phần mềm Office</label>
    <select id="office" class="form-select">
        <option value="Office 2003">Office 2003</option>
        <option value="Office 2007">Office 2007</option>
        <option value="Office 2010">Office 2010</option>
        <option value="Office 2013">Office 2013</option>
        <option value="Office 2016">Office 2016</option>
        <option value="Office 2019">Office 2019</option>
        <option value="Office 2021">Office 2021</option>
        <option value="Office 365">Office 365</option>
        <option value="WPS Office">WPS Office</option>
    </select>
</div>

<!-- Tình trạng bản quyền (Thêm vào mỗi mục) -->
<div class="col-md-4 mb-3">
    <label>Bản quyền</label>
    <select id="license" class="form-select">
        <option value="Chưa có">Chưa có</option>
        <option value="Có bản quyền">Có bản quyền</option>
        <option value="Dùng thử">Dùng thử</option>
    </select>
</div>

<!-- Phần mềm khác (Sử dụng Datalist để gợi ý) -->
<div class="mb-3">
    <label>Phần mềm khác</label>
    <input list="softList" id="others" class="form-control" placeholder="Gõ để tìm hoặc tự nhập...">
    <datalist id="softList">
        <option value="Adobe Photoshop">
        <option value="AutoCAD">
        <option value="MISA SME">
        <option value="Unikey">
        <option value="Google Chrome">
        <option value="Foxit Reader">
        <option value="TeamViewer">
    </datalist>
</div>
