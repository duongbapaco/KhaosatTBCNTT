<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Phiếu Khảo Sát Thiết Bị CNTT</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
</head>
<body class="bg-light p-3">

<div class="card shadow p-4" style="max-width: 1000px; margin: auto;">
    <h4 class="text-center text-primary">PHIẾU KHẢO SÁT TRANG THIẾT BỊ CNTT</h4>
    <div id="status" class="text-center small mb-3 text-secondary">Đang kiểm tra kết nối...</div>
    
    <form id="surveyForm">
        <div class="row g-2">
            <div class="col-md-4"><label>Bộ phận</label><input type="text" id="dept" class="form-control" required></div>
            <div class="col-md-4"><label>Người sử dụng</label><input type="text" id="user" class="form-control" required></div>
            <div class="col-md-4"><label>Số lượng (SL)</label><input type="number" id="qty" class="form-control" value="1" required></div>
            <div class="col-12"><label>Tên thiết bị</label><input type="text" id="device" class="form-control" required></div>
            <div class="col-12"><label>Cấu hình chi tiết</label><textarea id="specs" class="form-control" rows="2"></textarea></div>
            
            <div class="col-md-3"><label>Hệ điều hành</label>
                <select id="os" class="form-select">
                    <option>Windows 10</option><option>Windows 11</option><option>macOS</option>
                </select>
            </div>
            <div class="col-md-3"><label>Bản quyền HĐH</label>
                <select id="os_license" class="form-select"><option>Có bản quyền</option><option>Chưa có</option></select>
            </div>
            <div class="col-md-3"><label>Phần mềm Office</label>
                <select id="office" class="form-select">
                    <option>Office 2019</option><option>Office 365</option><option>Office 2021</option>
                </select>
            </div>
            <div class="col-md-3"><label>Bản quyền Office</label>
                <select id="office_license" class="form-select"><option>Có bản quyền</option><option>Chưa có</option></select>
            </div>
            
            <div class="col-12"><label>Phần mềm khác</label><input type="text" id="others" class="form-control"></div>
            <div class="col-12"><label>Đề xuất / Kiến nghị</label><textarea id="note" class="form-control" rows="2"></textarea></div>
            <button type="submit" class="btn btn-primary mt-3">Lưu thông tin</button>
        </div>
    </form>

    <hr>
    <button onclick="exportToExcel()" class="btn btn-success mb-3">Xuất báo cáo chuẩn Hành chính</button>
    <div class="table-responsive">
        <table class="table table-bordered">
            <thead class="table-dark">
                <tr><th>STT</th><th>Người dùng</th><th>SL</th><th>Thiết bị</th><th>HĐH</th><th>Office</th><th>Phần mềm</th><th>Thao tác</th></tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>
</div>

<script>
    const _sb = supabase.createClient('https://ckoersckkzygzuifplwj.supabase.co', 'sb_publishable_cfzmHqhoCkWwD2KZBEHZvw_xr5vVDbi');

    async function loadData() {
        const statusEl = document.getElementById('status');
        try {
            const { data, error } = await _sb.from('survey_devices').select('*');
            if (error) throw error;
            
            statusEl.innerText = "● Đã kết nối Supabase thành công";
            statusEl.className = "text-center small mb-3 text-success";

            document.getElementById('tableBody').innerHTML = data.map((row, index) => `
                <tr>
                    <td>${index + 1}</td>
                    <td>${row.full_name || ''}</td>
                    <td>${row.quantity || 1}</td>
                    <td>${row.device_name || ''}</td>
                    <td>${row.os || ''}</td>
                    <td>${row.office_version || ''}</td>
                    <td>${row.other_software || ''}</td>
                    <td><button class="btn btn-danger btn-sm" onclick="deleteRow(${row.id})">Xóa</button></td>
                </tr>`).join('');
        } catch (err) {
            statusEl.innerText = "● Lỗi kết nối Supabase";
            statusEl.className = "text-center small mb-3 text-danger";
        }
    }

    document.getElementById('surveyForm').onsubmit = async (e) => {
        e.preventDefault();
        const data = {
            department: document.getElementById('dept').value,
            full_name: document.getElementById('user').value,
            quantity: parseInt(document.getElementById('qty').value),
            device_name: document.getElementById('device').value,
            specs: document.getElementById('specs').value,
            os: document.getElementById('os').value + " (" + document.getElementById('os_license').value + ")",
            office_version: document.getElementById('office').value + " (" + document.getElementById('office_license').value + ")",
            other_software: document.getElementById('others').value,
            suggestions: document.getElementById('note').value
        };
        const { error } = await _sb.from('survey_devices').insert([data]);
        if(error) alert("Lỗi lưu dữ liệu: " + error.message);
        else { alert("Đã lưu thành công!"); loadData(); }
    };

    async function deleteRow(id) {
        if(confirm('Xác nhận xóa?')) {
            await _sb.from('survey_devices').delete().eq('id', id);
            loadData();
        }
    }

    async function exportToExcel() {
        const { data } = await _sb.from('survey_devices').select('*');
        if (!data || data.length === 0) return alert("Không có dữ liệu để xuất!");

        const worksheetData = [
            ["BẢNG TỔNG HỢP KHẢO SÁT TRANG THIẾT BỊ CÔNG NGHỆ THÔNG TIN", "", "", "", "", "", "", "", "", ""],
            ["Thời gian xuất báo cáo: Năm 2026", "", "", "", "", "", "", "", "", ""],
            ["", "", "", "", "", "", "", "", "", ""],
            ["STT", "Người sử dụng", "Bộ phận", "Tên thiết bị", "Cấu hình chi tiết", "Hệ điều hành", "Phần mềm Office", "Phần mềm khác", "SL", "Đề xuất / Kiến nghị"]
        ];

        data.forEach((item, index) => {
            worksheetData.push([
                index + 1, item.full_name, item.department, item.device_name, item.specs, 
                item.os, item.office_version, item.other_software, item.quantity, item.suggestions
            ]);
        });

        const ws = XLSX.utils.aoa_to_sheet(worksheetData);
        ws['!cols'] = [{ wch: 5 }, { wch: 20 }, { wch: 25 }, { wch: 20 }, { wch: 40 }, { wch: 20 }, { wch: 25 }, { wch: 15 }, { wch: 5 }, { wch: 30 }];
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "BaoCao");
        XLSX.writeFile(wb, "Danh_sach_thong_ke_CNTT.xlsx");
    }

    loadData();
</script>
</body>
</html>
