<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Hệ thống Quản trị Tài sản 2026</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        /* CSS cho bảng và form */
        .table-responsive { overflow-x: auto; }
        #reportTable { width: 100%; border-collapse: collapse; }
        th, td { border: 1px solid #dee2e6; padding: 10px; }
    </style>
</head>
<body class="bg-light p-4">

    <div class="card p-4 shadow" style="max-width: 1400px; margin: auto;">
        <h3 class="text-primary fw-bold mb-4">HỆ THỐNG QUẢN TRỊ TÀI SẢN 2026</h3>
        
        <div class="mb-4">
            <button class="btn btn-warning" onclick="printReport()">🖨️ In Báo Cáo (Chuẩn)</button>
            <button class="btn btn-success" onclick="exportFile()">📊 Xuất Excel</button>
        </div>

        <form id="dataForm" class="row g-3 bg-white p-3 border rounded mb-4">
            <input type="hidden" id="editId">
            <div class="col-md-2"><input type="text" id="dept" class="form-control" placeholder="Bộ phận" required></div>
            <div class="col-md-2"><input type="text" id="user" class="form-control" placeholder="Người dùng" required></div>
            <div class="col-md-2"><input type="text" id="device" class="form-control" placeholder="Tên thiết bị"></div>
            <div class="col-md-1"><input type="number" id="qty" value="1" class="form-control" placeholder="SL"></div>
            <div class="col-md-2">
                <select id="os" class="form-select">
                    <option>Windows 11</option><option>Windows 10</option><option>macOS</option><option>Linux</option>
                </select>
            </div>
            <div class="col-md-3"><input type="text" id="proposal" class="form-control" placeholder="Đề xuất"></div>
            <div class="col-md-12 text-end"><button type="submit" class="btn btn-primary">LƯU DỮ LIỆU</button></div>
        </form>

        <div class="table-responsive">
            <table class="table table-bordered" id="reportTable">
                <thead class="table-dark"><tr><th>Thông tin</th><th>SL</th><th>HĐH</th><th>Đề xuất</th><th>Thao tác</th></tr></thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>
    </div>

<script>
    const _sb = supabase.createClient('https://ckoersckkzygzuifplwj.supabase.co', 'sb_publishable_cfzmHqhoCkWwD2KZBEHZvw_xr5vVDbi');

    // 1. In báo cáo bằng luồng tách biệt (không bị chồng QR)
    function printReport() {
        const tableHtml = document.getElementById("reportTable").outerHTML;
        const printWindow = window.open('', '_blank', 'width=900,height=600');
        printWindow.document.write(`
            <html><head><title>Báo cáo tài sản</title>
            <style>
                body { font-family: "Times New Roman", serif; padding: 20px; }
                table { width: 100%; border-collapse: collapse; }
                th, td { border: 1px solid #000; padding: 8px; text-align: center; }
            </style></head>
            <body>
                <h2 style="text-align:center;">BÁO CÁO THỐNG KÊ TÀI SẢN 2026</h2>
                ${tableHtml.replace(/<th class="no-print">.*?<\/th>/g, '').replace(/<th.*?Thao tác<\/th>/g, '').replace(/<td class="no-print">.*?<\/td>/g, '')}
            </body></html>
        `);
        printWindow.document.close();
        printWindow.print();
    }

    // 2. Tạo QR động (không làm rác DOM)
    function showQR(id) { 
        const modal = document.createElement('div');
        modal.style.cssText = "position:fixed; top:20%; left:50%; transform:translateX(-50%); background:#fff; padding:20px; border:2px solid #0d6efd; z-index:99999; box-shadow:0 0 10px #000;";
        modal.innerHTML = `<h5 class="text-primary">MÃ QR</h5><div id="qr-canvas"></div><button class="btn btn-sm btn-secondary mt-2" onclick="this.parentElement.remove()">Đóng</button>`;
        document.body.appendChild(modal);
        new QRCode(document.getElementById("qr-canvas"), { text: id, width: 200, height: 200, correctLevel: 3 });
    }

    // 3. Tải dữ liệu
    async function loadData() {
        const { data } = await _sb.from('survey_devices').select('*').order('id', {ascending: false});
        if(data) {
            document.getElementById('tableBody').innerHTML = data.map(r => `<tr>
                <td><b>${r.department}</b><br>${r.full_name}<br>${r.device_name}</td>
                <td>${r.quantity}</td><td>${r.os}</td><td>${r.proposal || ''}</td>
                <td>
                    <button class="btn btn-sm btn-secondary" onclick="showQR('${r.id}')">QR</button>
                    <button class="btn btn-sm btn-info" onclick="editRow(${JSON.stringify(r).replace(/"/g, '&quot;')})">Sửa</button>
                </td>
            </tr>`).join('');
        }
    }

    // 4. Các hàm xử lý DB (giữ nguyên)
    document.getElementById('dataForm').onsubmit = async (e) => { e.preventDefault(); /* ... */ loadData(); };
    function exportFile() { XLSX.writeFile(XLSX.utils.table_to_book(document.getElementById("reportTable")), "BaoCao.xlsx"); }
    loadData();
</script>
</body>
</html>
