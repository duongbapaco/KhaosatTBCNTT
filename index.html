<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Khảo Sát Thiết Bị Công Nghệ</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
</head>
<body class="bg-light">

<div class="container py-5">
    <div class="card shadow-sm mx-auto" style="max-width: 800px;">
        <div class="card-body">
            <h2 class="text-center mb-4">PHIẾU KHẢO SÁT TRANG THIẾT BỊ</h2>
            <form id="surveyForm">
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label>Bộ phận / Phòng ban *</label>
                        <select id="dept" class="form-select" required>
                            <option value="">-- Chọn Bộ phận --</option>
                            <option value="Kinh doanh">Kinh doanh</option>
                            <option value="Kỹ thuật">Kỹ thuật</option>
                            <option value="Kế toán">Kế toán</option>
                        </select>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label>Người sử dụng *</label>
                        <input type="text" id="user" class="form-control" required>
                    </div>
                </div>
                <button type="submit" class="btn btn-primary w-100">Thêm vào bảng thống kê</button>
            </form>

            <hr class="my-4">
            <button onclick="exportToExcel()" class="btn btn-success">Xuất báo cáo Excel</button>
            <div id="message" class="mt-2 fw-bold"></div>
        </div>
    </div>
</div>

<script>
    const supabase = supabase.createClient('URL_CUA_BAN', 'ANON_KEY_CUA_BAN');

    // Xử lý gửi dữ liệu
    document.getElementById('surveyForm').onsubmit = async (e) => {
        e.preventDefault();
        // ... (Code insert vào Supabase như cũ)
        alert('Đã thêm dữ liệu!');
    };

    // Hàm xuất Excel
    async function exportToExcel() {
        const { data, error } = await supabase.from('survey_devices').select('*');
        if (error) return alert('Lỗi tải dữ liệu');
        
        const worksheet = XLSX.utils.json_to_sheet(data);
        const workbook = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(workbook, worksheet, "DuLieuKhaoSat");
        XLSX.writeFile(workbook, "BaoCaoKhaoSat.xlsx");
    }
</script>
</body>
</html>
