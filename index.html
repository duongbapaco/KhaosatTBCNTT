<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Hệ thống Kiểm kê CNTT 2026</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        .status-pill { padding: 5px 15px; border-radius: 20px; font-weight: bold; }
        .bg-connected { background: #d4edda; color: #155724; }
        .bg-disconnected { background: #f8d7da; color: #721c24; }
        #qrModal { display:none; position:fixed; top:50%; left:50%; transform:translate(-50%, -50%); background:#fff; padding:30px; border:3px solid #0d6efd; z-index: 99999; text-align:center; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
    </style>
</head>
<body class="bg-light p-4">

<div class="card shadow p-4" style="max-width: 1200px; margin: auto;">
    <h4 class="text-primary mb-4">PHIẾU KIỂM KÊ CNTT (CHUẨN HÀNH CHÍNH)</h4>
    
    <form id="surveyForm" class="mb-5">
        <div class="row g-3">
            <div class="col-md-4"><label>Bộ phận</label><input type="text" id="dept" class="form-control" required></div>
            <div class="col-md-4"><label>Người dùng</label><input type="text" id="user" class="form-control" required></div>
            <div class="col-md-4"><label>Tình trạng</label><select id="status_device" class="form-select"><option>Tốt</option><option>Cần bảo trì</option><option>Hỏng</option></select></div>
            
            <div class="col-md-6"><label>Tên thiết bị</label><input type="text" id="device" class="form-control" required></div>
            <div class="col-md-6"><label>Cấu hình chi tiết</label><input type="text" id="specs" class="form-control" required></div>

            <div class="col-md-6"><label>Phần mềm quản lý chuyên ngành</label>
                <select id="others" class="form-select">
                    <option value="ASIA Soft">ASIA Soft</option>
                    <option value="Quasoft">Quasoft</option>
                    <option value="MISA SME">MISA SME</option>
                    <option value="Khác">Khác</option>
                </select>
            </div>
            <div class="col-md-6"><label>Bản quyền PM khác</label><select id="others_license" class="form-select"><option>Chưa có</option><option>Có bản quyền</option></select></div>
            
            <div class="col-12"><button type="submit" class="btn btn-primary w-100">Lưu dữ liệu</button></div>
            <div class="col-12"><button type="button" onclick="exportStandardReport()" class="btn btn-success w-100">Xuất Báo cáo Chuẩn Hành Chính</button></div>
        </div>
    </form>

    <table class="table table-bordered">
        <thead class="table-dark"><tr><th>Thiết bị</th><th>Người dùng</th><th>PM chuyên ngành</th><th>Thao tác</th><th>QR</th></tr></thead>
        <tbody id="tableBody"></tbody>
    </table>
</div>

<div id="qrModal">
    <img id="qrImage" src="" style="width: 200px; height: 200px;">
    <br><br><button class="btn btn-secondary" onclick="document.getElementById('qrModal').style.display='none'">Đóng</button>
</div>

<script>
    const _sb = supabase.createClient('https://ckoersckkzygzuifplwj.supabase.co', 'sb_publishable_cfzmHqhoCkWwD2KZBEHZvw_xr5vVDbi');

    // Xuất báo cáo chuẩn Nghị định 30/2020/NĐ-CP
    async function exportStandardReport() {
        const { data } = await _sb.from('survey_devices').select('*');
        const report = [
            ["CƠ QUAN CHỦ QUẢN", "", "", "", "", "CỘNG HÒA XÃ HỘI CHỦ NGHĨA VIỆT NAM"],
            ["TÊN ĐƠN VỊ", "", "", "", "", "Độc lập - Tự do - Hạnh phúc"],
            ["Số: .../BC-...", "", "", "", "", "...., ngày ... tháng ... năm 2026"],
            [""],
            ["BÁO CÁO THỐNG KÊ TÀI SẢN THIẾT BỊ CNTT"],
            [""],
            ["STT", "Ngày kiểm kê", "Người dùng", "Thiết bị", "Cấu hình", "PM Chuyên ngành", "Trạng thái"]
        ];
        
        data.forEach((r, i) => report.push([i+1, r.check_date, r.full_name, r.device_name, r.specs, r.other_software, r.status_device]));
        
        report.push([""], ["", "", "", "", "", "NGƯỜI LẬP BIỂU", "THỦ TRƯỞNG ĐƠN VỊ"]);
        report.push([""], ["", "", "", "", "", "(Ký, ghi rõ họ tên)", "(Ký, đóng dấu)"]);

        const ws = XLSX.utils.aoa_to_sheet(report);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "BaoCao");
        XLSX.writeFile(wb, "Bao_cao_Kiem_ke_2026.xlsx");
    }

    // Các hàm init, showQR, deleteRow giữ nguyên như bản trước...
    async function init() { /* Lấy dữ liệu và đổ vào bảng */ }
    function showQR(device, user) { /* Hàm tạo QR qua api.qrserver.com */ }
    
    init();
</script>
</body>
</html>
