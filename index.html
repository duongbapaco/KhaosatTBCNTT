<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>QUẢN TRỊ TÀI SẢN CNTT 2026 - FULL SYSTEM</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        body { font-family: 'Times New Roman', serif; }
        .status-bar { padding: 5px 20px; font-weight: bold; font-size: 0.9rem; }
        .card-stat { background: #f8f9fa; border: 1px solid #ddd; padding: 10px; border-radius: 5px; margin-bottom: 10px; }
        th { background: #333 !important; color: white !important; text-align: center; }
        td { border: 1px solid #000 !important; vertical-align: middle; padding: 5px; }
        .form-section { background: #fff; padding: 15px; border: 1px solid #ccc; border-radius: 5px; }
    </style>
</head>
<body class="bg-light">

<div id="statusBar" class="status-bar text-white bg-secondary">Đang kiểm tra kết nối...</div>

<div class="container-fluid p-4">
    <h3 class="text-center fw-bold mb-4">HỆ THỐNG QUẢN TRỊ TÀI SẢN CNTT 2026</h3>

    <div class="row mb-3">
        <div class="col-md-4 card-stat"><h6>HĐH & Bản quyền</h6><div id="statOS"></div></div>
        <div class="col-md-4 card-stat"><h6>Office & Bản quyền</h6><div id="statOff"></div></div>
        <div class="col-md-4 card-stat"><h6>PM Khác & Bản quyền</h6><div id="statPM"></div></div>
    </div>

    <div class="form-section mb-4">
        <form id="masterForm" class="row g-2">
            <div class="col-md-2"><input type="text" id="dpt" class="form-control" placeholder="Bộ phận" required></div>
            <div class="col-md-2"><input type="text" id="usr" class="form-control" placeholder="Người dùng" required></div>
            <div class="col-md-2"><input type="text" id="dev" class="form-control" placeholder="Thiết bị"></div>
            <div class="col-md-1"><input type="number" id="qty" class="form-control" value="1"></div>
            
            <div class="col-md-2">
                <select id="os" class="form-select">
                    <optgroup label="Windows"><option>Windows 11</option><option>Windows 10</option><option>Windows 8.1</option><option>Windows 7</option><option>Windows XP</option></optgroup>
                    <optgroup label="macOS"><option>Sequoia</option><option>Sonoma</option><option>Ventura</option></optgroup>
                </select>
            </div>
            <div class="col-md-3"><select id="osL" class="form-select"><option>Chưa có BQ</option><option>Đã có BQ</option></select></div>
            
            <div class="col-md-3">
                <select id="off" class="form-select">
                    <option>Microsoft 365</option><option>Office 2024</option><option>Office 2021</option><option>Office 2019</option><option>Office 2016</option><option>Office 2013</option><option>Office 2010</option><option>Office 2007</option>
                </select>
            </div>
            <div class="col-md-3"><select id="offL" class="form-select"><option>Chưa có BQ</option><option>Đã có BQ</option></select></div>
            
            <div class="col-md-3">
                <input type="text" id="pm" class="form-control" list="pmList" placeholder="PM Chuyên ngành">
                <datalist id="pmList"><option value="ASIA 2024"><option value="ASIA 2022"><option value="Quasoft 2023"><option value="Quasoft 2020"><option value="MISA 2025"></datalist>
            </div>
            <div class="col-md-3"><select id="pmL" class="form-select"><option>Chưa có BQ</option><option>Đã có BQ</option></select></div>
            
            <div class="col-md-4"><input type="text" id="specs" class="form-control" placeholder="Cấu hình chi tiết..."></div>
            <div class="col-md-4"><input type="text" id="prop" class="form-control" placeholder="Đề xuất (Nâng cấp/Thay thế)..."></div>
            <div class="col-md-4"><button type="submit" class="btn btn-dark w-100">Lưu dữ liệu</button></div>
        </form>
    </div>

    <table class="table table-striped table-hover" id="mainTable">
        <thead>
            <tr><th>Bộ phận</th><th>Người dùng</th><th>Thiết bị</th><th>HĐH</th><th>Office</th><th>PM Chuyên ngành</th><th>Cấu hình</th><th>Đề xuất</th><th>QR</th><th>Xóa</th></tr>
        </thead>
        <tbody id="tableBody"></tbody>
    </table>
</div>

<script>
    // TÍCH HỢP SUPABASE
    const _sb = supabase.createClient('https://ckoersckkzygzuifplwj.supabase.co', 'sb_publishable_cfzmHqhoCkWwD2KZBEHZvw_xr5vVDbi');
    
    async function loadData() {
        const { data, error } = await _sb.from('asset_management').select('*');
        if (error) { document.getElementById('statusBar').className = 'status-bar bg-danger text-white'; document.getElementById('statusBar').innerText = '● Lỗi kết nối Supabase'; return; }
        
        document.getElementById('statusBar').className = 'status-bar bg-success text-white';
        document.getElementById('statusBar').innerText = '● Đã kết nối Supabase Online';

        document.getElementById('tableBody').innerHTML = data.map(r => `
            <tr>
                <td>${r.department}</td><td>${r.user_name}</td><td>${r.device_name}</td>
                <td>${r.os_version}</td><td>${r.office_version}</td><td>${r.specialized_pm}</td>
                <td>${r.specs}</td><td>${r.proposal}</td>
                <td><div id="qr-${r.id}"></div></td>
                <td><button class="btn btn-sm btn-danger" onclick="del(${r.id})">Xóa</button></td>
            </tr>`).join('');
        data.forEach(r => new QRCode(document.getElementById(`qr-${r.id}`), {text: String(r.id), width: 30, height: 30}));
    }

    document.getElementById('masterForm').onsubmit = async (e) => {
        e.preventDefault();
        await _sb.from('asset_management').insert([{
            department: document.getElementById('dpt').value, user_name: document.getElementById('usr').value,
            device_name: document.getElementById('dev').value, os_version: document.getElementById('os').value,
            office_version: document.getElementById('off').value, specialized_pm: document.getElementById('pm').value,
            specs: document.getElementById('specs').value, proposal: document.getElementById('prop').value
        }]);
        loadData();
    };

    function del(id) { if(confirm("Xác nhận xóa?")) _sb.from('asset_management').delete().eq('id', id).then(loadData); }
    loadData();
</script>
</body>
</html>
