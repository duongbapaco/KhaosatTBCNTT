<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Hệ thống Kiểm kê CNTT 2026</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        .status-pill { padding: 5px 15px; border-radius: 20px; font-weight: bold; }
        .bg-connected { background: #d4edda; color: #155724; }
        .bg-disconnected { background: #f8d7da; color: #721c24; }
    </style>
</head>
<body class="bg-light p-4">

<div class="card shadow p-4" style="max-width: 1100px; margin: auto;">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h4 class="text-primary m-0">PHIẾU KIỂM KÊ & QUẢN LÝ THIẾT BỊ CNTT</h4>
        <div id="connStatus" class="status-pill bg-secondary text-white">Đang kết nối...</div>
    </div>

    <form id="surveyForm" class="mb-5">
        <div class="row g-3">
            <div class="col-md-3"><label>Bộ phận</label><input type="text" id="dept" class="form-control" required></div>
            <div class="col-md-3"><label>Người dùng</label><input type="text" id="user" class="form-control" required></div>
            <div class="col-md-3"><label>Ngày kiểm kê</label><input type="date" id="check_date" class="form-control" required></div>
            <div class="col-md-3"><label>Tình trạng</label>
                <select id="status_device" class="form-select"><option>Tốt</option><option>Cần bảo trì</option><option>Hỏng</option></select>
            </div>
            
            <div class="col-md-6"><label>Tên thiết bị</label><input type="text" id="device" class="form-control" required></div>
            <div class="col-md-6"><label>Cấu hình chi tiết</label><input type="text" id="specs" class="form-control" required></div>

            <div class="col-md-8"><label>Hệ điều hành</label>
                <select id="os" class="form-select"><option>Windows 11</option><option>Windows 10</option><option>macOS</option></select>
            </div>
            <div class="col-md-4"><label>Bản quyền HĐH</label>
                <select id="os_license" class="form-select"><option>Chưa có</option><option>Có bản quyền</option></select>
            </div>

            <div class="col-md-8"><label>Phần mềm Office</label>
                <select id="office" class="form-select"><option>Office 365</option><option>Office 2021</option></select>
            </div>
            <div class="col-md-4"><label>Bản quyền Office</label>
                <select id="office_license" class="form-select"><option>Chưa có</option><option>Có bản quyền</option></select>
            </div>

            <div class="col-md-8"><label>Phần mềm khác</label><input list="softList" id="others" class="form-control"></div>
            <div class="col-md-4"><label>Bản quyền PM khác</label>
                <select id="others_license" class="form-select"><option>Chưa có</option><option>Có bản quyền</option></select>
            </div>
            
            <div class="col-12"><label>Đề xuất / Kiến nghị</label><textarea id="note" class="form-control" rows="2"></textarea></div>

            <div class="col-12 d-flex gap-2">
                <button type="submit" class="btn btn-primary flex-grow-1">Lưu & Thêm vào bảng</button>
                <button type="button" onclick="exportToExcel()" class="btn btn-success">Xuất báo cáo hành chính</button>
            </div>
        </div>
    </form>

    <hr>
    <h5 class="text-secondary mt-4">Danh sách thiết bị đã kiểm kê:</h5>
    <div class="table-responsive">
        <table class="table table-hover table-bordered mt-3">
            <thead class="table-dark">
                <tr><th>Ngày</th><th>Người dùng</th><th>Thiết bị</th><th>Cấu hình</th><th>Trạng thái</th><th>Thao tác</th></tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>
</div>

<script>
    const _sb = supabase.createClient('https://ckoersckkzygzuifplwj.supabase.co', 'sb_publishable_cfzmHqhoCkWwD2KZBEHZvw_xr5vVDbi');

    // 1. Kiểm tra kết nối & Load dữ liệu ngay khi mở
    async function init() {
        const { error, data } = await _sb.from('survey_devices').select('*');
        const statusEl = document.getElementById('connStatus');
        statusEl.innerText = error ? "Chưa kết nối" : "Đã kết nối";
        statusEl.className = "status-pill " + (error ? "bg-disconnected" : "bg-connected");
        
        if (data) {
            document.getElementById('tableBody').innerHTML = data.map(row => `
                <tr>
                    <td>${row.check_date}</td>
                    <td>${row.full_name}</td>
                    <td>${row.device_name}</td>
                    <td>${row.specs}</td>
                    <td>${row.status_device}</td>
                    <td><button class="btn btn-sm btn-danger" onclick="deleteRow(${row.id})">Xóa</button></td>
                </tr>`).join('');
        }
    }

    document.getElementById('check_date').valueAsDate = new Date();

    // 2. Lưu & Cập nhật bảng
    document.getElementById('surveyForm').onsubmit = async (e) => {
        e.preventDefault();
        const data = {
            department: document.getElementById('dept').value,
            full_name: document.getElementById('user').value,
            check_date: document.getElementById('check_date').value,
            status_device: document.getElementById('status_device').value,
            device_name: document.getElementById('device').value,
            specs: document.getElementById('specs').value,
            os: document.getElementById('os').value,
            os_license: document.getElementById('os_license').value,
            office_version: document.getElementById('office').value,
            office_license: document.getElementById('office_license').value,
            other_software: document.getElementById('others').value,
            others_license: document.getElementById('others_license').value,
            suggestions: document.getElementById('note').value
        };
        await _sb.from('survey_devices').insert([data]);
        alert("Đã lưu!"); init(); // Gọi lại hàm init để cập nhật bảng ngay lập tức
    };

    async function deleteRow(id) {
        if(confirm('Xóa bản ghi này?')) { await _sb.from('survey_devices').delete().eq('id', id); init(); }
    }

    async function exportToExcel() { /* Giữ nguyên hàm cũ */ }

    init();
</script>
</body>
</html>
