<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phiếu Khảo Sát Trang Thiết Bị Công Nghệ</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
    <style>
        body { background-color: #f8f9fa; }
        .card { max-width: 900px; margin: 20px auto; padding: 20px; }
        textarea { resize: vertical; min-height: 80px; }
    </style>
</head>
<body>

<div class="container">
    <div class="card shadow">
        <h2 class="text-center mb-4">PHIẾU KHẢO SÁT TRANG THIẾT BỊ CÔNG NGHỆ</h2>
        <p class="text-center"><i>Vui lòng điền đầy đủ và chính xác thông tin thiết bị của đơn vị/phòng ban</i></p>
        
        <form id="surveyForm">
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label>Bộ phận / Phòng ban / Nhà máy *</label>
                    <input list="deptList" id="dept" class="form-control" placeholder="Chọn hoặc nhập mới" required>
                    <datalist id="deptList">
                        <option value="Khối Văn phòng">
                        <option value="Nhà máy Phong Châu">
                        <option value="Kinh doanh">
                        <option value="Kỹ thuật">
                    </datalist>
                </div>
                <div class="col-md-6 mb-3">
                    <label>Người sử dụng *</label>
                    <input type="text" id="user" class="form-control" placeholder="Họ và tên" required>
                </div>
            </div>

            <div class="row">
                <div class="col-md-6 mb-3">
                    <label>Tên thiết bị *</label>
                    <select id="device" class="form-select" required>
                        <option value="Laptop">Laptop</option>
                        <option value="Desktop">Máy tính để bàn</option>
                        <option value="Máy in">Máy in</option>
                        <option value="Máy photocopy">Máy photocopy</option>
                    </select>
                </div>
                <div class="col-md-6 mb-3">
                    <label>Số lượng *</label>
                    <input type="number" id="qty" class="form-control" value="1" min="1" required>
                </div>
            </div>

            <div class="mb-3">
                <label>Cấu hình chi tiết *</label>
                <textarea id="specs" class="form-control" placeholder="VD: CPU, RAM, Ổ cứng, Màn hình..."></textarea>
            </div>

            <div class="row">
                <div class="col-md-6 mb-3">
                    <label>Hệ điều hành</label>
                    <select id="os" class="form-select">
                        <optgroup label="Windows">
                            <option value="Win XP">Windows XP</option>
                            <option value="Win 7">Windows 7</option>
                            <option value="Win 10">Windows 10</option>
                            <option value="Win 11">Windows 11</option>
                        </optgroup>
                        <optgroup label="Khác">
                            <option value="macOS">macOS</option>
                            <option value="Ubuntu">Ubuntu/Linux</option>
                        </optgroup>
                    </select>
                </div>
                <div class="col-md-6 mb-3">
                    <label>Bản quyền HĐH</label>
                    <select id="os_license" class="form-select">
                        <option value="Chưa có">Chưa có</option>
                        <option value="Có bản quyền">Có bản quyền</option>
                    </select>
                </div>
            </div>

            <div class="row">
                <div class="col-md-6 mb-3">
                    <label>Phần mềm Office</label>
                    <select id="office" class="form-select">
                        <option value="Office 2007">Office 2007</option>
                        <option value="Office 2010">Office 2010</option>
                        <option value="Office 2013">Office 2013</option>
                        <option value="Office 2016">Office 2016</option>
                        <option value="Office 2019">Office 2019</option>
                        <option value="Office 2021">Office 2021</option>
                        <option value="Office 365">Office 365</option>
                    </select>
                </div>
                <div class="col-md-6 mb-3">
                    <label>Bản quyền Office</label>
                    <select id="office_license" class="form-select">
                        <option value="Chưa có">Chưa có</option>
                        <option value="Có bản quyền">Có bản quyền</option>
                    </select>
                </div>
            </div>

            <div class="row">
                <div class="col-md-6 mb-3">
                    <label>Phần mềm khác</label>
                    <input list="softList" id="others" class="form-control" placeholder="Gõ để tìm phần mềm...">
                    <datalist id="softList">
                        <option value="Adobe Photoshop">
                        <option value="AutoCAD">
                        <option value="MISA SME">
                        <option value="Unikey">
                        <option value="Google Chrome">
                    </datalist>
                </div>
                <div class="col-md-6 mb-3">
                    <label>Bản quyền khác</label>
                    <select id="other_license" class="form-select">
                        <option value="Chưa có">Chưa có</option>
                        <option value="Có bản quyền">Có bản quyền</option>
                    </select>
                </div>
            </div>

            <div class="mb-3">
                <label>Đề xuất / Kiến nghị</label>
                <textarea id="note" class="form-control"></textarea>
            </div>

            <button type="submit" class="btn btn-primary w-100">Thêm vào bảng thống kê</button>
        </form>

        <hr>
        <h5>Dữ liệu đã thu thập</h5>
        <div class="table-responsive">
            <table class="table table-bordered table-sm">
                <thead>
                    <tr><th>User</th><th>Thiết bị</th><th>OS</th><th>Office</th><th>Đề xuất</th></tr>
                </thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>
        <button onclick="exportToExcel()" class="btn btn-success">Xuất Báo Cáo Excel</button>
    </div>
</div>

<script>
    // --- ĐIỀN THÔNG TIN CỦA BẠN Ở ĐÂY ---
    const SUPABASE_URL = 'https://ckoersckkzygzuifplwj.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNrb2Vyc2Nra3p5Z3p1aWZwbHdqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMwNTYxNDYsImV4cCI6MjA5ODYzMjE0Nn0.E_ZIrYKxRQllSlCH4nhuzDHgNdgDKEcYn3JdFmNX1mU';
    // -----------------------------------

    const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    let surveyData = [];

    document.getElementById('surveyForm').onsubmit = async (e) => {
        e.preventDefault();
        const data = {
            user: document.getElementById('user').value,
            dept: document.getElementById('dept').value,
            device: document.getElementById('device').value,
            qty: document.getElementById('qty').value,
            specs: document.getElementById('specs').value,
            os: document.getElementById('os').value,
            os_license: document.getElementById('os_license').value,
            office: document.getElementById('office').value,
            office_license: document.getElementById('office_license').value,
            others: document.getElementById('others').value,
            other_license: document.getElementById('other_license').value,
            note: document.getElementById('note').value
        };

        const { error } = await supabase.from('survey_devices').insert([data]);
        if (error) { alert('Lỗi: ' + error.message); } 
        else {
            alert('Đã gửi thành công!');
            surveyData.push(data);
            renderTable();
            document.getElementById('surveyForm').reset();
        }
    };

    function renderTable() {
        document.getElementById('tableBody').innerHTML = surveyData.map(d => 
            `<tr><td>${d.user}</td><td>${d.device}</td><td>${d.os}</td><td>${d.office}</td><td>${d.note}</td></tr>`
        ).join('');
    }

    function exportToExcel() {
        const ws = XLSX.utils.json_to_sheet(surveyData);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "Baocao");
        XLSX.writeFile(wb, "PhieuKhaoSat.xlsx");
    }
</script>
</body>
</html>
