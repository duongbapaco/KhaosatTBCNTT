<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Phiếu Khảo Sát Thiết Bị</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
</head>
<body class="bg-light">

<div class="container py-4">
    <div class="card shadow p-4 mx-auto" style="max-width: 900px;">
        <h4 class="text-center mb-4 text-primary">PHIẾU KHẢO SÁT TRANG THIẾT BỊ CNTT</h4>
        <form id="surveyForm">
            <input type="hidden" id="editId">
            <div class="row g-3">
                <div class="col-md-6"><label>Bộ phận/Phòng ban</label><input type="text" id="dept" class="form-control" required></div>
                <div class="col-md-6"><label>Người sử dụng</label><input type="text" id="user" class="form-control" required></div>
                <div class="col-12"><label>Tên thiết bị</label><input type="text" id="device" class="form-control" required></div>
                <div class="col-12"><label>Cấu hình chi tiết</label><textarea id="specs" class="form-control" rows="2"></textarea></div>
                
                <div class="col-md-3"><label>Hệ điều hành</label>
                    <select id="os" class="form-select"><option>Chưa có</option><option>Windows 10</option><option>Windows 11</option><option>macOS</option></select>
                </div>
                <div class="col-md-3"><label>Bản quyền HĐH</label>
                    <select id="os_license" class="form-select"><option>Chưa có</option><option>Có bản quyền</option></select>
                </div>
                <div class="col-md-3"><label>Phần mềm Office</label>
                    <select id="office" class="form-select"><option>Chưa có</option><option>Office 2019</option><option>Office 2021</option><option>Office 365</option></select>
                </div>
                <div class="col-md-3"><label>Bản quyền Office</label>
                    <select id="office_license" class="form-select"><option>Chưa có</option><option>Có bản quyền</option></select>
                </div>
                
                <div class="col-12"><label>Phần mềm khác (Tài chính, Kế toán...)</label>
                    <input list="softList" id="others" class="form-control">
                    <datalist id="softList"><option value="MISA SME"><option value="FAST Accounting"><option value="Bravo"><option value="Adobe Photoshop"><option value="AutoCAD"></datalist>
                </div>
                <div class="col-12"><label>Đề xuất / Kiến nghị</label><textarea id="note" class="form-control" rows="2"></textarea></div>
            </div>
            <button type="submit" class="btn btn-primary w-100 mt-4" id="btnSubmit">Gửi thông tin</button>
            <button type="button" class="btn btn-secondary w-100 mt-2 d-none" id="btnCancel" onclick="resetForm()">Hủy sửa</button>
        </form>

        <hr class="my-4">
        <button onclick="exportToExcel()" class="btn btn-success w-100 mb-3">Xuất báo cáo chuẩn Hành chính</button>
        
        <div class="table-responsive">
            <table class="table table-bordered table-sm">
                <thead><tr><th>Người dùng</th><th>Thiết bị</th><th>Thao tác</th></tr></thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
    const supabase = supabase.createClient('https://ckoersckkzygzuifplwj.supabase.co', 'sb_publishable_cfzmHqhoCkWwD2KZBEHZvw_xr5vVDbi');

    async function loadData() {
        const { data } = await supabase.from('survey_devices').select('*');
        if (data) {
            document.getElementById('tableBody').innerHTML = data.map(row => 
                `<tr><td>${row.full_name}</td><td>${row.device_name}</td>
                 <td><button class="btn btn-sm btn-warning" onclick="editRow(${JSON.stringify(row).replace(/"/g, '&quot;')})">Sửa</button> 
                     <button class="btn btn-sm btn-danger" onclick="deleteRow(${row.id})">Xóa</button></td></tr>`
            ).join('');
        }
    }

    function editRow(row) {
        document.getElementById('editId').value = row.id;
        document.getElementById('dept').value = row.department;
        document.getElementById('user').value = row.full_name;
        document.getElementById('device').value = row.device_name;
        document.getElementById('specs').value = row.specs || "";
        document.getElementById('note').value = row.suggestions || "";
        document.getElementById('btnSubmit').innerText = "Cập nhật dữ liệu";
        document.getElementById('btnCancel').classList.remove('d-none');
    }

    function resetForm() {
        document.getElementById('surveyForm').reset();
        document.getElementById('editId').value = "";
        document.getElementById('btnSubmit').innerText = "Gửi thông tin";
        document.getElementById('btnCancel').classList.add('d-none');
    }

    document.getElementById('surveyForm').onsubmit = async (e) => {
        e.preventDefault();
        const id = document.getElementById('editId').value;
        const data = {
            department: document.getElementById('dept').value,
            full_name: document.getElementById('user').value,
            device_name: document.getElementById('device').value,
            specs: document.getElementById('specs').value,
            os: document.getElementById('os').value + " (" + document.getElementById('os_license').value + ")",
            office_version: document.getElementById('office').value + " (" + document.getElementById('office_license').value + ")",
            other_software: document.getElementById('others').value,
            suggestions: document.getElementById('note').value
        };

        if (id) {
            await supabase.from('survey_devices').update(data).eq('id', id);
        } else {
            await supabase.from('survey_devices').insert([data]);
        }
        alert("Thành công!"); resetForm(); loadData();
    };

    async function deleteRow(id) {
        if(confirm('Xác nhận xóa?')) {
            await supabase.from('survey_devices').delete().eq('id', id);
            loadData();
        }
    }

    function exportToExcel() {
        supabase.from('survey_devices').select('*').then(({data}) => {
            const reportData = [["CỘNG HÒA XÃ HỘI CHỦ NGHĨA VIỆT NAM"],["Độc lập - Tự do - Hạnh phúc"],[],["BÁO CÁO TỔNG HỢP KHẢO SÁT TRANG THIẾT BỊ CNTT"],["Thời gian: Năm 2026"],[],["STT", "Người dùng", "Bộ phận", "Tên thiết bị", "Cấu hình", "Hệ điều hành", "Office", "Phần mềm khác", "Kiến nghị"]];
            data.forEach((item, index) => reportData.push([index+1, item.full_name, item.department, item.device_name, item.specs, item.os, item.office_version, item.other_software, item.suggestions]));
            const ws = XLSX.utils.aoa_to_sheet(reportData);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "BaoCao");
            XLSX.writeFile(wb, "Bao_Cao_Tong_Hop.xlsx");
        });
    }

    loadData();
</script>
</body>
</html>
