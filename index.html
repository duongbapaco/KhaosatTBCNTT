<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Hệ thống Kiểm kê CNTT 2026</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        .table-warning { background-color: #fff3cd !important; }
        body { font-family: 'Times New Roman', serif; }
    </style>
</head>
<body class="bg-light p-4">
<div class="card p-4 shadow" style="max-width: 1300px; margin: auto;">
    <h3 class="text-center text-uppercase fw-bold text-primary">HỆ THỐNG KIỂM KÊ TÀI SẢN CNTT 2026</h3>
    <hr>
    <form id="surveyForm" class="mb-4 border p-3 rounded bg-white">
        <input type="hidden" id="editId">
        <div class="row g-3">
            <div class="col-md-3"><label>Bộ phận</label><input type="text" id="dept" class="form-control" required></div>
            <div class="col-md-3"><label>Người dùng</label><input type="text" id="user" class="form-control" required></div>
            <div class="col-md-3"><label>Thiết bị</label><input type="text" id="device" class="form-control" required></div>
            <div class="col-md-3"><label>Số lượng</label><input type="number" id="qty" class="form-control" value="1"></div>
            
            <div class="col-md-3"><label>Hệ điều hành</label>
                <select id="os" class="form-select">
                    <optgroup label="Windows"><option>Windows 11</option><option>Windows 10</option><option>Windows 8.1</option><option>Windows 7</option></optgroup>
                    <optgroup label="Server"><option>Windows Server 2025</option><option>Windows Server 2022</option><option>Windows Server 2019</option></optgroup>
                    <optgroup label="Khác"><option>macOS</option><option>Ubuntu</option></optgroup>
                </select>
            </div>
            <div class="col-md-3"><label>Bản quyền HĐH</label>
                <select id="os_license" class="form-select text-danger fw-bold"><option value="Chưa có">Chưa có (Ưu tiên)</option><option value="Đã có">Đã có</option></select>
            </div>

            <div class="col-md-3"><label>Bộ Office</label>
                <select id="office" class="form-select">
                    <optgroup label="Microsoft"><option>Office 365</option><option>Office 2024</option><option>Office 2021</option><option>Office 2019</option><option>Office 2016</option><option>Office 2013</option><option>Office 2010</option></optgroup>
                    <optgroup label="Khác"><option>WPS Office</option><option>LibreOffice</option></optgroup>
                </select>
            </div>
            <div class="col-md-3"><label>Bản quyền Office</label>
                <select id="office_license" class="form-select text-danger fw-bold"><option value="Chưa có">Chưa có (Ưu tiên)</option><option value="Đã có">Đã có</option></select>
            </div>

            <div class="col-12"><label>Cấu hình chi tiết</label><input type="text" id="specs" class="form-control"></div>
            <div class="col-12 text-end mt-3">
                <button type="submit" id="submitBtn" class="btn btn-primary px-4">Lưu dữ liệu</button>
                <button type="button" onclick="resetForm()" class="btn btn-secondary px-4">Hủy bỏ</button>
                <button type="button" class="btn btn-success px-4" onclick="exportExcel()">Xuất báo cáo Excel</button>
            </div>
        </div>
    </form>

    <div class="table-responsive">
        <table class="table table-bordered table-hover" id="dataTable">
            <thead class="table-dark">
                <tr><th>Thiết bị</th><th>OS</th><th>BQ OS</th><th>Office</th><th>BQ Office</th><th>Cấu hình</th><th>Thao tác</th></tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>
</div>

<script>
    const _sb = supabase.createClient('https://ckoersckkzygzuifplwj.supabase.co', 'sb_publishable_cfzmHqhoCkWwD2KZBEHZvw_xr5vVDbi');
    let allData = [];

    async function init() {
        const { data } = await _sb.from('survey_devices').select('*');
        allData = (data || []).sort((a, b) => (a.os_license === 'Chưa có' ? -1 : 1));
        renderTable(allData);
    }

    function renderTable(data) {
        document.getElementById('tableBody').innerHTML = data.map(r => `
            <tr class="${(r.os_license === 'Chưa có' || r.office_license === 'Chưa có') ? 'table-warning' : ''}">
                <td>${r.device_name || ''}</td><td>${r.os || ''}</td><td><strong>${r.os_license || ''}</strong></td>
                <td>${r.office_version || ''}</td><td><strong>${r.office_license || ''}</strong></td>
                <td>${r.specs || ''}</td>
                <td>
                    <button class="btn btn-sm btn-warning" onclick="editRow(${r.id})">Sửa</button>
                    <button class="btn btn-sm btn-danger" onclick="deleteRow(${r.id})">Xóa</button>
                </td>
            </tr>`).join('');
    }

    function editRow(id) {
        const r = allData.find(x => x.id === id);
        if(!r) return;
        document.getElementById('editId').value = r.id;
        document.getElementById('user').value = r.full_name || "";
        document.getElementById('device').value = r.device_name || "";
        document.getElementById('os').value = r.os || "Windows 11";
        document.getElementById('os_license').value = r.os_license || "Chưa có";
        document.getElementById('office').value = r.office_version || "Office 365";
        document.getElementById('office_license').value = r.office_license || "Chưa có";
        document.getElementById('specs').value = r.specs || "";
        window.scrollTo(0,0);
    }

    document.getElementById('surveyForm').onsubmit = async (e) => {
        e.preventDefault();
        const id = document.getElementById('editId').value;
        const payload = {
            full_name: document.getElementById('user').value,
            device_name: document.getElementById('device').value,
            os: document.getElementById('os').value,
            os_license: document.getElementById('os_license').value,
            office_version: document.getElementById('office').value,
            office_license: document.getElementById('office_license').value,
            specs: document.getElementById('specs').value
        };

        if(id) await _sb.from('survey_devices').update(payload).eq('id', id);
        else await _sb.from('survey_devices').insert([payload]);
        document.getElementById('surveyForm').reset(); init();
    };

    function exportExcel() {
        const wb = XLSX.utils.book_new();
        const ws = XLSX.utils.aoa_to_sheet([["BÁO CÁO TÀI SẢN 2026"],[],["Thiết bị","OS","BQ OS","Office","BQ Office","Cấu hình"], ...allData.map(r => [r.device_name, r.os, r.os_license, r.office_version, r.office_license, r.specs])]);
        ws['!cols'] = [{wch: 20}, {wch: 15}, {wch: 15}, {wch: 15}, {wch: 15}, {wch: 30}];
        XLSX.utils.book_append_sheet(wb, ws, "BaoCao");
        XLSX.writeFile(wb, "Bao_cao_Tai_san_2026.xlsx");
    }

    function deleteRow(id) {
        if (prompt("Nhập mật khẩu:") === "123456") {
            _sb.from('survey_devices').delete().eq('id', id).then(init);
        }
    }

    init();
</script>
</body>
</html>
