<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phiếu Khảo Sát Thiết Bị</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
    <link rel="icon" href="data:,">
</head>
<body class="bg-light">

<div class="container py-4">
    <div class="card shadow p-4 mx-auto" style="max-width: 800px;">
        <h4 class="text-center mb-4 text-primary">PHIẾU KHẢO SÁT TRANG THIẾT BỊ</h4>
        <form id="surveyForm">
            <div class="row g-3">
                <div class="col-md-6"><label>Bộ phận</label><input type="text" id="dept" class="form-control" required></div>
                <div class="col-md-6"><label>Người sử dụng</label><input type="text" id="user" class="form-control" required></div>
                <div class="col-12"><label>Tên thiết bị</label><input type="text" id="device" class="form-control" required></div>
                <div class="col-12"><label>Cấu hình chi tiết</label><textarea id="specs" class="form-control" rows="2"></textarea></div>
                
                <div class="col-md-6"><label>Hệ điều hành</label>
                    <select id="os" class="form-select"><option>Windows 10</option><option>Windows 11</option></select>
                </div>
                <div class="col-md-6"><label>Bản quyền HĐH</label>
                    <select id="os_license" class="form-select"><option>Có bản quyền</option><option>Chưa có bản quyền</option></select>
                </div>
                
                <div class="col-md-6"><label>Phiên bản Office</label>
                    <select id="office" class="form-select"><option>Office 2019</option><option>Office 365</option></select>
                </div>
                <div class="col-md-6"><label>Bản quyền Office</label>
                    <select id="office_license" class="form-select"><option>Có bản quyền</option><option>Chưa có bản quyền</option></select>
                </div>
                
                <div class="col-12"><label>Phần mềm khác</label><input type="text" id="others" class="form-control"></div>
                <div class="col-12"><label>Đề xuất / Kiến nghị</label><textarea id="note" class="form-control" rows="2"></textarea></div>
            </div>
            <button type="submit" class="btn btn-primary w-100 mt-4">Gửi thông tin</button>
        </form>
        <button onclick="exportToExcel()" class="btn btn-success w-100 mt-3">Xuất báo cáo Excel theo mẫu</button>
    </div>
</div>

<script>
    // Khởi tạo Supabase với thông tin dự án của bạn
    const supabaseClient = supabase.createClient(
        'https://ckoersckkzygzuifplwj.supabase.co', 
        'sb_publishable_cfzmHqhoCkWwD2KZBEHZvw_xr5vVDbi'
    );

    document.getElementById('surveyForm').onsubmit = async (e) => {
        e.preventDefault();
        const data = {
            department: document.getElementById('dept').value,
            full_name: document.getElementById('user').value,
            device_name: document.getElementById('device').value,
            specs: document.getElementById('specs').value,
            os: document.getElementById('os').value + " (" + document.getElementById('os_license').value + ")",
            office_version: document.getElementById('office').value + " (" + document.getElementById('office_license').value + ")",
            other_software: document.getElementById('others').value,
            suggestions: document.getElementById('note').value
        };

        const { error } = await supabaseClient.from('survey_devices').insert([data]);
        if (error) alert("Lỗi: " + error.message);
        else { alert("Đã gửi thành công!"); document.getElementById('surveyForm').reset(); }
    };

    async function exportToExcel() {
        const { data } = await supabaseClient.from('survey_devices').select('*');
        const formattedData = data.map((item, index) => ({
            "STT": index + 1,
            "Người sử dụng": item.full_name,
            "Bộ phận": item.department,
            "Tên thiết bị": item.device_name,
            "Cấu hình chi tiết": item.specs,
            "Hệ điều hành": item.os,
            "Phần mềm Office": item.office_version,
            "Phần mềm khác": item.other_software || "-",
            "SL": 1,
            "Đề xuất / Kiến nghị": item.suggestions
        }));
        const ws = XLSX.utils.json_to_sheet(formattedData);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "BaoCao");
        XLSX.writeFile(wb, "Bang_Tong_Hop_Khao_Sat.xlsx");
    }
</script>
</body>
</html>
