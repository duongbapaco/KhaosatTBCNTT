<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Hệ thống Quản trị Tài sản 2026</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        /* Định dạng bảo mật */
        #pass-container { display: none; position: fixed; top: 30%; left: 50%; transform: translateX(-50%); background: #f8f9fa; padding: 30px; border: 2px solid #0d6efd; z-index: 9999; box-shadow: 0 0 20px rgba(0,0,0,0.5); border-radius: 12px; }
        
        /* Chỉnh sửa chuẩn in ấn (NĐ 30/2020/NĐ-CP) */
        @media print {
            body { font-family: "Times New Roman", serif; font-size: 13pt; margin: 2cm 2cm 2cm 3cm; }
            .no-print { display: none !important; }
            .print-header { display: block !important; text-align: center; margin-bottom: 20px; }
            table { width: 100%; border-collapse: collapse; margin-top: 10px; }
            th, td { border: 1px solid #000 !important; padding: 5px; }
            .card { border: none !important; box-shadow: none !important; }
        }
        .print-header { display: none; }
        .table-responsive { overflow-x: auto; }
    </style>
</head>
<body class="bg-light">

    <div id="pass-container" class="no-print">
        <h5 class="text-danger fw-bold mb-3">XÁC THỰC QUYỀN TRUY CẬP</h5>
        <input type="password" id="passInput" class="form-control mb-3" placeholder="Nhập mật khẩu...">
        <button class="btn btn-primary w-100" onclick="checkPass()">XÁC NHẬN</button>
    </div>

    <div class="container-fluid p-4">
        <div class="print-header">
            <p>ĐƠN VỊ: QUẢN TRỊ THIẾT BỊ<br><b>CỘNG HÒA XÃ HỘI CHỦ NGHĨA VIỆT NAM<br>Độc lập - Tự do - Hạnh phúc</b></p>
            <h4 class="mt-4">BÁO CÁO THỐNG KÊ TÀI SẢN CNTT NĂM 2026</h4>
        </div>

        <div class="card p-4 shadow mb-4 no-print">
            <h4 class="text-primary fw-bold mb-3">HỆ THỐNG QUẢN TRỊ TÀI SẢN 2026</h4>
            <form id="dataForm" class="row g-2">
                <input type="hidden" id="editId">
                <div class="col-md-2"><input type="text" id="dept" class="form-control" placeholder="Bộ phận" required></div>
                <div class="col-md-2"><input type="text" id="user" class="form-control" placeholder="Người dùng" required></div>
                <div class="col-md-2"><input type="text" id="device" class="form-control" placeholder="Tên thiết bị"></div>
                <div class="col-md-1"><input type="number" id="qty" value="1" class="form-control" placeholder="SL"></div>
                <div class="col-md-2">
                    <select id="os" class="form-select">
                        <optgroup label="Windows"><option>Win 11</option><option>Win 10</option><option>Win 8.1</option><option>Win 7</option><option>Server 2025/2022</option></optgroup>
                        <optgroup label="Khác"><option>macOS</option><option>Linux</option></optgroup>
                    </select>
                </div>
                <div class="col-md-2"><select id="office" class="form-select"><option>Microsoft 365</option><option>Office 2024</option><option>Office 2021</option><option>Office 2019</option></select></div>
                <div class="col-md-3"><input class="form-control" list="pmList" id="pm" placeholder="PM Chuyên ngành (Chọn/Nhập)">
                    <datalist id="pmList"><option value="Không có"><option value="ASIA Enterprise"><option value="MISA SME.NET"><option value="FAST"><option value="BRAVO"></datalist>
                </div>
                <div class="col-md-4"><input type="text" id="specs" class="form-control" placeholder="Cấu hình"></div>
                <div class="col-md-4"><input type="text" id="proposal" class="form-control" placeholder="Đề xuất"></div>
                <div class="col-md-2"><button type="submit" class="btn btn-primary w-100">LƯU DỮ LIỆU</button></div>
            </form>
        </div>

        <div class="table-responsive">
            <table class="table table-bordered table-hover" id="reportTable">
                <thead class="table-dark"><tr><th>Thông tin</th><th>SL</th><th>HĐH</th><th>Office</th><th>PM</th><th>Cấu hình</th><th>Đề xuất</th><th class="no-print">Thao tác</th></tr></thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>

        <div class="mt-3 no-print text-end">
            <button class="btn btn-warning" onclick="window.print()">🖨️ In Báo Cáo (Chuẩn)</button>
            <button class="btn btn-success" onclick="exportFile()">📊 Xuất Excel</button>
        </div>
    </div>

<script>
    const _sb = supabase.createClient('https://ckoersckkzygzuifplwj.supabase.co', 'sb_publishable_cfzmHqhoCkWwD2KZBEHZvw_xr5vVDbi');
    const PASS = "123456";
    let pendingAction = {type: '', data: null};

    function secureAction(type, data) { pendingAction = {type, data}; document.getElementById('pass-container').style.display = 'block'; }
    function checkPass() { if (document.getElementById('passInput').value === PASS) { document.getElementById('pass-container').style.display = 'none'; if (pendingAction.type === 'delete') deleteRow(pendingAction.data); else editRow(pendingAction.data); } else alert("Sai mật khẩu!"); }

    async function loadData() {
        const { data } = await _sb.from('survey_devices').select('*').order('id', {ascending: false});
        if(data) {
            document.getElementById('tableBody').innerHTML = data.map(r => `<tr>
                <td><b>${r.department}</b><br>${r.full_name}<br>${r.device_name}</td>
                <td>${r.quantity}</td><td>${r.os}</td><td>${r.office_version}</td><td>${r.special_pm}</td><td>${r.specs}</td><td>${r.proposal || ''}</td>
                <td class="no-print">
                    <button class="btn btn-sm btn-info" onclick="secureAction('edit', ${JSON.stringify(r).replace(/"/g, '&quot;')})">Sửa</button>
                    <button class="btn btn-sm btn-danger" onclick="secureAction('delete', '${r.id}')">Xóa</button>
                </td>
            </tr>`).join('');
        }
    }

    document.getElementById('dataForm').onsubmit = async (e) => { e.preventDefault(); const p = { department: document.getElementById('dept').value, full_name: document.getElementById('user').value, device_name: document.getElementById('device').value, quantity: document.getElementById('qty').value, os: document.getElementById('os').value, office_version: document.getElementById('office').value, special_pm: document.getElementById('pm').value, specs: document.getElementById('specs').value, proposal: document.getElementById('proposal').value }; if(document.getElementById('editId').value) await _sb.from('survey_devices').update(p).eq('id', document.getElementById('editId').value); else await _sb.from('survey_devices').insert([p]); loadData(); document.getElementById('dataForm').reset(); };
    function editRow(r) { document.getElementById('editId').value=r.id; document.getElementById('dept').value=r.department; document.getElementById('user').value=r.full_name; document.getElementById('device').value=r.device_name; document.getElementById('qty').value=r.quantity; document.getElementById('os').value=r.os; document.getElementById('office').value=r.office_version; document.getElementById('pm').value=r.special_pm; document.getElementById('specs').value=r.specs; document.getElementById('proposal').value=r.proposal; window.scrollTo(0,0); }
    async function deleteRow(id) { await _sb.from('survey_devices').delete().eq('id', id); loadData(); }
    function exportFile() { XLSX.writeFile(XLSX.utils.table_to_book(document.getElementById("reportTable")), "BaoCao_TaiSan_HanhChinh.xlsx"); }
    loadData();
</script>
</body>
</html>
