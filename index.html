<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>HỆ THỐNG QUẢN TRỊ TÀI SẢN 2026</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        body { font-family: 'Times New Roman', serif; background: #f8f9fa; }
        .nav-link { cursor: pointer; }
        .section { display: none; }
        .active { display: block; }
        th, td { padding: 10px; border: 1px solid #dee2e6; }
    </style>
</head>
<body class="p-3">

<div id="connectionStatus" class="alert alert-secondary text-center">Đang kiểm tra kết nối...</div>

<ul class="nav nav-tabs mb-3">
    <li class="nav-item"><a class="nav-link active" onclick="showSection('survey')">Nhập liệu Khảo sát</a></li>
    <li class="nav-item"><a class="nav-link" onclick="showSection('admin')">Quản trị & Báo cáo</a></li>
</ul>

<div id="survey" class="section active container card p-4 shadow">
    <form id="surveyForm" class="row g-3">
        <div class="col-md-3"><label>Bộ phận</label><input type="text" id="dpt" class="form-control" required></div>
        <div class="col-md-3"><label>Người dùng</label><input type="text" id="usr" class="form-control" required></div>
        <div class="col-md-3"><label>Thiết bị</label><input type="text" id="dev" class="form-control"></div>
        <div class="col-md-3"><label>Số lượng</label><input type="number" id="qty" class="form-control" value="1"></div>
        <div class="col-md-3"><label>CPU</label><input type="text" id="cpu" class="form-control"></div>
        <div class="col-md-3"><label>RAM</label><input type="text" id="ram" class="form-control"></div>
        <div class="col-md-3"><label>HDD/SSD</label><input type="text" id="hdd" class="form-control"></div>
        <div class="col-md-3"><label>VGA</label><input type="text" id="vga" class="form-control"></div>
        
        <div class="col-md-4"><label>HĐH</label>
            <select id="os" class="form-select"><optgroup label="Windows"><option>Windows 11</option><option>Windows 10</option><option>Windows 8.1</option><option>Windows 7</option></optgroup><optgroup label="Khác"><option>macOS</option><option>Ubuntu</option></optgroup></select>
            <select id="osL" class="form-select mt-1"><option>Chưa có bản quyền</option><option>Đã có bản quyền</option></select>
        </div>
        <div class="col-md-4"><label>Office</label>
            <select id="off" class="form-select"><option>Microsoft 365</option><option>Office 2024</option><option>Office 2021</option><option>Office 2016</option></select>
            <select id="offL" class="form-select mt-1"><option>Chưa có bản quyền</option><option>Đã có bản quyền</option></select>
        </div>
        <div class="col-md-4"><label>PM Khác</label>
            <input type="text" id="pm" class="form-control" list="pmList">
            <datalist id="pmList"><option value="ASIA Enterprise 2026"><option value="MISA SME 2025"><option value="QUASOFT V9"></datalist>
            <select id="pmL" class="form-select mt-1"><option>Chưa có bản quyền</option><option>Đã có bản quyền</option></select>
        </div>
        <button type="submit" class="btn btn-primary">GỬI PHIẾU KHẢO SÁT</button>
    </form>
</div>

<div id="admin" class="section container-fluid">
    <button class="btn btn-success mb-2" onclick="exportExcel()">📄 Xuất Excel Chuẩn</button>
    <div class="table-responsive"><table class="table table-bordered" id="reportTable"><thead class="table-dark"><tr><th>Thông tin</th><th>Cấu hình</th><th>Phần mềm</th><th>Thao tác</th></tr></thead><tbody id="tableBody"></tbody></table></div>
</div>

<div class="modal fade" id="actionModal" tabindex="-1"><div class="modal-dialog"><div class="modal-content"><div class="modal-body text-center">
    <div id="qrBox" class="d-flex justify-content-center mb-3"></div>
    <input type="password" id="adminPass" class="form-control mb-2" placeholder="Mật khẩu Admin">
    <button class="btn btn-danger" onclick="handleDelete()">Xóa dữ liệu</button>
</div></div></div></div>

<script>
    const _sb = supabase.createClient('https://ckoersckkzygzuifplwj.supabase.co', 'sb_publishable_cfzmHqhoCkWwD2KZBEHZvw_xr5vVDbi');
    let selectedId = null;

    async function init() {
        const { data, error } = await _sb.from('asset_management').select('*');
        if (!error) {
            document.getElementById('connectionStatus').className = "alert alert-success";
            document.getElementById('connectionStatus').innerText = "🟢 KẾT NỐI ỔN ĐỊNH";
            document.getElementById('tableBody').innerHTML = data.map(r => `<tr>
                <td>${r.user_name}<br><b>${r.department}</b></td>
                <td>${r.device_name}<br><small>${r.cpu}/${r.ram}/${r.hdd}</small></td>
                <td>HĐH:${r.os}<br>Off:${r.office}</td>
                <td><button class="btn btn-sm btn-info" onclick="openModal('${r.id}', ${JSON.stringify(r).replace(/"/g, "'")})">Quản lý</button></td>
            </tr>`).join('');
        }
    }

    document.getElementById('surveyForm').onsubmit = async (e) => {
        e.preventDefault();
        await _sb.from('asset_management').insert([{ department: dpt.value, user_name: usr.value, device_name: dev.value, cpu: cpu.value, ram: ram.value, hdd: hdd.value, os: os.value, os_lic: osL.value, office: off.value, off_lic: offL.value, specialized_pm: pm.value, pm_lic: pmL.value }]);
        location.reload();
    };

    function openModal(id, rObj) {
        selectedId = id;
        document.getElementById('qrBox').innerHTML = "";
        // Encode an toàn cho Unicode
        const qrData = btoa(unescape(encodeURIComponent(JSON.stringify(rObj))));
        new QRCode(document.getElementById('qrBox'), {text: qrData, width: 150, height: 150});
        new bootstrap.Modal(document.getElementById('actionModal')).show();
    }

    async function handleDelete() {
        if(document.getElementById('adminPass').value !== '123456') return alert("Sai mật khẩu!");
        await _sb.from('asset_management').delete().eq('id', selectedId);
        location.reload();
    }

    function showSection(id) {
        document.querySelectorAll('.section').forEach(s => s.style.display = 'none');
        document.getElementById(id).style.display = 'block';
    }

    function exportExcel() {
        let h = `<div style="text-align:center;"><b>CỘNG HÒA XÃ HỘI CHỦ NGHĨA VIỆT NAM</b><br><b>Độc lập - Tự do - Hạnh phúc</b><hr><h3>BÁO CÁO TÀI SẢN CNTT 2026</h3></div>`;
        let b = new Blob(['\ufeff', h + document.getElementById('reportTable').outerHTML], {type: 'application/vnd.ms-excel'});
        let a = document.createElement('a'); a.href = URL.createObjectURL(b); a.download = 'Bao_Cao.xls'; a.click();
    }
    init();
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
