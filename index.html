<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Hệ thống Kiểm kê CNTT 2026</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        .status-pill { padding: 5px 15px; border-radius: 20px; font-weight: bold; }
        .bg-connected { background: #d4edda; color: #155724; }
        .bg-disconnected { background: #f8d7da; color: #721c24; }
    </style>
</head>
<body class="bg-light p-4">

<div class="card shadow p-4" style="max-width: 1000px; margin: auto;">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h4 class="text-primary m-0">PHIẾU KIỂM KÊ & ĐỀ XUẤT THIẾT BỊ CNTT</h4>
        <div id="connStatus" class="status-pill bg-secondary text-white">Đang kiểm tra kết nối...</div>
    </div>

    <form id="surveyForm">
        <div class="row g-3">
            <div class="col-md-3"><label>Bộ phận</label><input type="text" id="dept" class="form-control" required></div>
            <div class="col-md-3"><label>Người dùng</label><input type="text" id="user" class="form-control" required></div>
            <div class="col-md-3"><label>Ngày kiểm kê</label><input type="date" id="check_date" class="form-control" required></div>
            <div class="col-md-3"><label>Tình trạng</label>
                <select id="status_device" class="form-select">
                    <option>Tốt</option><option>Cần bảo trì</option><option>Hỏng</option>
                </select>
            </div>
            <div class="col-12"><label>Tên thiết bị</label><input type="text" id="device" class="form-control" required></div>

            <div class="col-md-8"><label>Hệ điều hành</label>
                <select id="os" class="form-select">
                    <option>Windows 11</option><option>Windows 10</option><option>Windows 7</option><option>macOS</option>
                </select>
            </div>
            <div class="col-md-4"><label>Bản quyền HĐH</label>
                <select id="os_license" class="form-select"><option>Chưa có</option><option>Có bản quyền</option></select>
            </div>

            <div class="col-md-8"><label>Phần mềm Office</label>
                <select id="office" class="form-select">
                    <option>Office 365</option><option>Office 2021</option><option>Office 2019</option>
                </select>
            </div>
            <div class="col-md-4"><label>Bản quyền Office</label>
                <select id="office_license" class="form-select"><option>Chưa có</option><option>Có bản quyền</option></select>
            </div>

            <div class="col-md-8"><label>Phần mềm khác (ASIA, Quasoft...)</label>
                <input list="softList" id="others" class="form-control">
                <datalist id="softList">
                    <option value="ASIA Soft"><option value="Quasoft"><option value="MISA SME"><option value="AutoCAD">
                </datalist>
            </div>
            <div class="col-md-4"><label>Bản quyền PM khác</label>
                <select id="others_license" class="form-select"><option>Chưa có</option><option>Có bản quyền</option></select>
            </div>
            
            <div class="col-12"><label>Đề xuất / Kiến nghị</label><textarea id="note" class="form-control" rows="2"></textarea></div>

            <div class="col-12 d-flex gap-2">
                <button type="submit" class="btn btn-primary flex-grow-1">Lưu dữ liệu</button>
                <button type="button" onclick="exportToExcel()" class="btn btn-success">Xuất báo cáo hành chính</button>
            </div>
        </div>
    </form>
</div>

<script>
    // 1. CẤU HÌNH (Dán API Key vào đây)
    const _sb = supabase.createClient('https://ckoersckkzygzuifplwj.supabase.co', 'sb_publishable_cfzmHqhoCkWwD2KZBEHZvw_xr5vVDbi');

    // 2. Kiểm tra kết nối khi tải trang
    async function checkConnection() {
        const statusEl = document.getElementById('connStatus');
        const { error } = await _sb.from('survey_devices').select('id').limit(1);
        if (error) {
            statusEl.innerText = "Chưa kết nối";
            statusEl.className = "status-pill bg-disconnected";
        } else {
            statusEl.innerText = "Đã kết nối";
            statusEl.className = "status-pill bg-connected";
        }
    }

    document.getElementById('check_date').valueAsDate = new Date();

    // 3. Lưu dữ liệu
    document.getElementById('surveyForm').onsubmit = async (e) => {
        e.preventDefault();
        const data = {
            department: document.getElementById('dept').value,
            full_name: document.getElementById('user').value,
            check_date: document.getElementById('check_date').value,
            status_device: document.getElementById('status_device').value,
            device_name: document.getElementById('device').value,
            os: document.getElementById('os').value,
            os_license: document.getElementById('os_license').value,
            office_version: document.getElementById('office').value,
            office_license: document.getElementById('office_license').value,
            other_software: document.getElementById('others').value,
            others_license: document.getElementById('others_license').value,
            suggestions: document.getElementById('note').value
        };
        const { error } = await _sb.from('survey_devices').insert([data]);
        if (error) alert("Lỗi lưu: " + error.message);
        else { alert("Lưu thành công!"); location.reload(); }
    };

    // 4. Xuất báo cáo chuyên nghiệp
    async function exportToExcel() {
        const { data } = await _sb.from('survey_devices').select('*');
        if (!data) return alert("Không có dữ liệu!");
        
        const report = [
            ["CƠ QUAN CHỦ QUẢN", "", "", "", "", "CỘNG HÒA XÃ HỘI CHỦ NGHĨA VIỆT NAM"],
            ["TÊN CƠ QUAN", "", "", "", "", "Độc lập - Tự do - Hạnh phúc"],
            ["BÁO CÁO THỐNG KÊ KIỂM KÊ CNTT", "", "", "", "", ""],
            ["STT", "Ngày", "Bộ phận", "Người dùng", "Thiết bị", "HĐH", "BQ HĐH", "Office", "BQ Off", "PM Khác", "BQ PM", "Trạng thái", "Kiến nghị"]
        ];
        data.forEach((item, i) => report.push([i+1, item.check_date, item.department, item.full_name, item.device_name, item.os, item.os_license, item.office_version, item.office_license, item.other_software, item.others_license, item.status_device, item.suggestions]));
        
        const ws = XLSX.utils.aoa_to_sheet(report);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "BaoCao");
        XLSX.writeFile(wb, "Bao_cao_Kiem_ke_2026.xlsx");
    }

    checkConnection();
</script>
</body>
</html>
