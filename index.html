<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Hệ thống Quản lý Tài sản CNTT 2026</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        #qrcode img { margin: auto; border: 5px solid #fff; box-shadow: 0 0 15px rgba(0,0,0,0.2); }
        .table-responsive { max-height: 500px; overflow-y: auto; }
    </style>
</head>
<body class="bg-light p-4">
<div class="card p-4 shadow" style="max-width: 1500px; margin: auto;">
    <h3 class="text-center text-uppercase fw-bold text-primary mb-4">HỆ THỐNG KIỂM KÊ & QUẢN TRỊ TÀI SẢN CNTT 2026</h3>

    <div class="row mb-4">
        <div class="col-md-4"><div class="card bg-warning p-3 text-center"><h6>Chưa có bản quyền</h6><h3 id="missingLicenseCount">0</h3></div></div>
        <div class="col-md-4"><div class="card bg-success text-white p-3 text-center"><h6>Đã có bản quyền</h6><h3 id="haveLicenseCount">0</h3></div></div>
        <div class="col-md-4"><div class="card bg-primary text-white p-3 text-center"><h6>Tổng thiết bị</h6><h3 id="totalCount">0</h3></div></div>
    </div>

    <form id="dataForm" class="row g-3 bg-white p-3 border rounded mb-4">
        <div class="col-md-2"><label>Bộ phận</label><input type="text" id="dept" class="form-control" required></div>
        <div class="col-md-2"><label>Người dùng</label><input type="text" id="user" class="form-control" required></div>
        <div class="col-md-2"><label>Thiết bị</label><input type="text" id="device" class="form-control"></div>
        <div class="col-md-2"><label>Hệ điều hành</label>
            <select id="os" class="form-select">
                <optgroup label="Windows"><option>Windows 11</option><option>Windows 10</option><option>Windows 7</option><option>Windows XP</option></optgroup>
                <optgroup label="Server"><option>Server 2025</option><option>Server 2022</option><option>Server 2019</option></optgroup>
            </select>
        </div>
        <div class="col-md-1"><label>BQ HĐH</label><select id="os_license" class="form-select"><option value="Chưa có">Chưa có</option><option value="Có">Có</option></select></div>
        <div class="col-md-2"><label>Bộ Office</label>
            <select id="office" class="form-select">
                <option>Microsoft 365</option><option>Office 2024</option><option>Office 2021</option><option>Office 2016</option><option>Office 2010</option>
            </select>
        </div>
        <div class="col-md-1"><label>BQ Off</label><select id="office_license" class="form-select"><option value="Chưa có">Chưa có</option><option value="Có">Có</option></select></div>
        <div class="col-md-2"><label>PM Chuyên ngành</label>
            <select id="pm" class="form-select"><option>ASIA Enterprise</option><option>ASIA Accounting</option><option>Quasoft Q-Office</option><option>Quasoft Q-Human</option><option>MISA</option><option>FAST</option></select>
        </div>
        <div class="col-md-1"><label>BQ PM</label><select id="pm_license" class="form-select"><option value="Chưa có">Chưa có</option><option value="Có">Có</option></select></div>
        <div class="col-md-6"><label>Cấu hình máy</label><input type="text" id="specs" class="form-control"></div>
        <div class="col-md-6"><label>Đề xuất / Kiến nghị</label><input type="text" id="proposal" class="form-control"></div>
        <div class="col-12 text-end">
            <button type="submit" class="btn btn-primary px-4">Lưu dữ liệu</button>
            <button type="button" class="btn btn-success" onclick="exportExcel()">Xuất báo cáo</button>
        </div>
    </form>

    <div class="mb-3"><input type="text" id="searchInput" class="form-control" placeholder="🔍 Tìm kiếm hoặc lọc (VD: Chưa có)..." onkeyup="filterTable()"></div>
    
    <div class="card p-3 mb-4 text-center">
        <h6>Mã QR tài sản (Nhấp vào dòng trong bảng để tạo mã):</h6>
        <div id="qrcode" class="mt-2"></div>
    </div>

    <div class="table-responsive">
        <table class="table table-bordered table-sm table-hover" id="reportTable">
            <thead class="table-dark">
                <tr><th>Bộ phận</th><th>Người dùng</th><th>Thiết bị</th><th>HĐH (BQ)</th><th>Office (BQ)</th><th>PM (BQ)</th><th>Cấu hình</th><th>Đề xuất</th><th>Xóa</th></tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>
</div>

<script>
    const _sb = supabase.createClient('https://ckoersckkzygzuifplwj.supabase.co', 'sb_publishable_cfzmHqhoCkWwD2KZBEHZvw_xr5vVDbi');
    const qrcode = new QRCode("qrcode", { width: 200, height: 200, correctLevel: QRCode.CorrectLevel.H });

    async function loadData() {
        const { data } = await _sb.from('survey_devices').select('*').order('id', {ascending: false});
        renderTable(data || []);
        updateStats(data || []);
    }

    function updateStats(data) {
        document.getElementById('totalCount').innerText = data.length;
        const missing = data.filter(r => r.os_license === 'Chưa có' || r.office_license === 'Chưa có' || r.pm_license === 'Chưa có').length;
        document.getElementById('missingLicenseCount').innerText = missing;
        document.getElementById('haveLicenseCount').innerText = data.length - missing;
    }

    function renderTable(data) {
        document.getElementById('tableBody').innerHTML = data.map(r => `
            <tr onclick='showQR(${JSON.stringify(r)})' style="cursor:pointer">
                <td>${r.department||''}</td><td>${r.full_name||''}</td><td>${r.device_name||''}</td>
                <td>${r.os||''} (${r.os_license||''})</td>
                <td>${r.office_version||''} (${r.office_license||''})</td>
                <td>${r.special_pm||''} (${r.pm_license||''})</td>
                <td>${r.specs||''}</td><td>${r.proposal||''}</td>
                <td><button class="btn btn-danger btn-sm" onclick="event.stopPropagation(); deleteRow('${r.id}')">Xóa</button></td>
            </tr>`).join('');
    }

    function showQR(data) {
        const info = `User: ${data.full_name} | TB: ${data.device_name} | OS: ${data.os} | Office: ${data.office_version}`;
        qrcode.makeCode(info);
    }

    function filterTable() {
        const query = document.getElementById('searchInput').value.toLowerCase();
        document.querySelectorAll('#tableBody tr').forEach(row => row.style.display = row.innerText.toLowerCase().includes(query) ? '' : 'none');
    }

    document.getElementById('dataForm').onsubmit = async (e) => {
        e.preventDefault();
        const payload = { 
            department: document.getElementById('dept').value, full_name: document.getElementById('user').value, 
            device_name: document.getElementById('device').value, os: document.getElementById('os').value, 
            os_license: document.getElementById('os_license').value, office_version: document.getElementById('office').value, 
            office_license: document.getElementById('office_license').value, special_pm: document.getElementById('pm').value, 
            pm_license: document.getElementById('pm_license').value, specs: document.getElementById('specs').value,
            proposal: document.getElementById('proposal').value 
        };
        await _sb.from('survey_devices').insert([payload]);
        loadData(); document.getElementById('dataForm').reset();
    };

    async function deleteRow(id) { await _sb.from('survey_devices').delete().eq('id', id); loadData(); }
    function exportExcel() { XLSX.writeFile(XLSX.utils.table_to_book(document.getElementById("reportTable")), "KiemKe_TaiSan.xlsx"); }
    loadData();
</script>
</body>
</html>
