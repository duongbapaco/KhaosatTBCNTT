<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>QUẢN TRỊ TÀI SẢN 2026 - FULL</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        body { font-family: 'Times New Roman', serif; background: #f8f9fa; }
        .label-field { font-weight: bold; font-size: 0.75rem; color: #333; margin-top: 10px; display: block; }
        .qr-canvas { width: 50px; height: 50px; margin: auto; }
        @media print { .no-print { display: none !important; } }
    </style>
</head>
<body class="p-3">

<div id="statusBar" class="alert alert-warning text-center no-print">Đang kết nối Database...</div>

<div class="no-print mb-4 p-3 bg-white border shadow-sm">
    <h5 class="text-center text-uppercase fw-bold">QUẢN TRỊ TÀI SẢN 2026</h5>
    <form id="masterForm">
        <input type="hidden" id="editId">
        <div class="row g-2">
            <div class="col-md-2"><label class="label-field">BỘ PHẬN</label><input type="text" id="dpt" class="form-control" required></div>
            <div class="col-md-2"><label class="label-field">NGƯỜI DÙNG</label><input type="text" id="usr" class="form-control" required></div>
            <div class="col-md-2"><label class="label-field">THIẾT BỊ</label><input type="text" id="dev" class="form-control" required></div>
            <div class="col-md-1"><label class="label-field">SL</label><input type="number" id="qty" class="form-control" value="1"></div>
            
            <div class="col-md-2"><label class="label-field">HỆ ĐIỀU HÀNH</label>
                <select id="os" class="form-select">
                    <optgroup label="Windows"><option>Win 11</option><option>Win 10</option><option>Win 8.1</option><option>Win 7</option><option>Win XP</option></optgroup>
                    <optgroup label="macOS"><option>Sequoia</option><option>Sonoma</option><option>Ventura</option><option>Monterey</option></optgroup>
                </select>
            </div>
            <div class="col-md-1"><label class="label-field">BQ HĐH</label><select id="osL" class="form-select"><option>Chưa có</option><option>Đã có</option></select></div>
            
            <div class="col-md-2"><label class="label-field">OFFICE</label>
                <select id="off" class="form-select">
                    <option>Microsoft 365</option><option>Office 2024</option><option>Office 2021</option><option>Office 2019</option><option>Office 2016</option><option>Office 2013</option><option>Office 2010</option>
                </select>
            </div>
            <div class="col-md-1"><label class="label-field">BQ OFFICE</label><select id="offL" class="form-select"><option>Chưa có</option><option>Đã có</option></select></div>
            
            <div class="col-md-2"><label class="label-field">PHẦN MỀM KHÁC</label>
                <input type="text" id="pm" class="form-control" list="pmList">
                <datalist id="pmList">
                    <option value="ASIA Enterprise 2026"><option value="ASIA Enterprise 2025"><option value="ASIA Enterprise 2020"><option value="QUASOFT V9"><option value="QUASOFT V8"><option value="QUASOFT V7"><option value="Adobe CC"><option value="AutoCAD 2025"><option value="Unikey"><option value="Chrome/Edge">
                </datalist>
            </div>
            <div class="col-md-1"><label class="label-field">BQ PM</label><select id="pmL" class="form-select"><option>Không có</option><option>Chưa có</option><option>Đã có</option></select></div>
            
            <div class="col-md-3"><label class="label-field">CẤU HÌNH</label><input type="text" id="specs" class="form-control"></div>
            <div class="col-md-3"><label class="label-field">ĐỀ XUẤT</label><input type="text" id="prop" class="form-control"></div>
            <div class="col-12"><button id="btnAction" type="button" class="btn btn-dark w-100" onclick="saveData()">LƯU DỮ LIỆU</button></div>
        </div>
    </form>
</div>

<div class="mb-3 d-flex gap-2 no-print">
    <input type="text" id="searchBox" class="form-control" placeholder="🔍 Tìm theo bộ phận, tên, thiết bị..." onkeyup="filterData()">
    <select id="fDpt" class="form-select" onchange="filterData()"><option value="">Tất cả bộ phận</option></select>
    <button class="btn btn-success" onclick="exportFile('excel')">Excel</button>
    <button class="btn btn-primary" onclick="exportFile('word')">Word</button>
</div>

<div id="printableArea" class="bg-white p-4 border">
    <table class="table table-bordered table-hover">
        <thead class="table-dark">
            <tr><th>Thông tin</th><th>SL</th><th>HĐH</th><th>Office</th><th>PM</th><th>Cấu hình</th><th>Đề xuất</th><th>QR</th><th>Thao tác</th></tr>
        </thead>
        <tbody id="tableBody"></tbody>
    </table>
</div>

<script>
    const _sb = supabase.createClient('https://ckoersckkzygzuifplwj.supabase.co', 'sb_publishable_cfzmHqhoCkWwD2KZBEHZvw_xr5vVDbi');
    let allData = [];

    async function loadData() {
        const { data } = await _sb.from('asset_management').select('*');
        allData = data || [];
        
        // Cập nhật danh sách bộ phận cho bộ lọc
        const depts = [...new Set(allData.map(r => r.department))];
        const fDpt = document.getElementById('fDpt');
        fDpt.innerHTML = '<option value="">Tất cả bộ phận</option>' + depts.map(d => `<option value="${d}">${d}</option>`).join('');
        
        render(allData);
        document.getElementById('statusBar').innerText = "● KẾT NỐI DATABASE THÀNH CÔNG";
        document.getElementById('statusBar').className = "alert alert-success text-center no-print";
    }

    function render(data) {
        document.getElementById('tableBody').innerHTML = data.map(r => `<tr>
            <td><b>${r.department}</b><br>${r.user_name}<br>${r.device_name}</td>
            <td>${r.quantity}</td>
            <td>${r.os} (${r.os_lic})</td>
            <td>${r.office} (${r.off_lic})</td>
            <td>${r.specialized_pm || 'N/A'} (${r.pm_lic})</td>
            <td>${r.specs}</td><td>${r.proposal}</td>
            <td class="text-center"><div id="qr-${r.id}" class="qr-canvas"></div></td>
            <td>
                <button class="btn btn-sm btn-info" onclick='editData(${JSON.stringify(r).replace(/"/g, '&quot;')})'>Sửa</button>
                <button class="btn btn-sm btn-danger" onclick="delData(${r.id})">Xóa</button>
            </td>
        </tr>`).join('');
        data.forEach(r => new QRCode(document.getElementById(`qr-${r.id}`), {text: "ID:"+r.id, width: 50, height: 50}));
    }

    function filterData() {
        const q = document.getElementById('searchBox').value.toLowerCase();
        const d = document.getElementById('fDpt').value;
        const filtered = allData.filter(r => 
            (r.department.toLowerCase().includes(q) || r.user_name.toLowerCase().includes(q) || r.device_name.toLowerCase().includes(q)) && 
            (d === "" || r.department === d)
        );
        render(filtered);
    }

    function editData(r) {
        document.getElementById('editId').value = r.id;
        document.getElementById('dpt').value = r.department;
        document.getElementById('usr').value = r.user_name;
        document.getElementById('dev').value = r.device_name;
        document.getElementById('qty').value = r.quantity;
        document.getElementById('os').value = r.os;
        document.getElementById('osL').value = r.os_lic;
        document.getElementById('off').value = r.office;
        document.getElementById('offL').value = r.off_lic;
        document.getElementById('pm').value = r.specialized_pm;
        document.getElementById('pmL').value = r.pm_lic;
        document.getElementById('specs').value = r.specs;
        document.getElementById('prop').value = r.proposal;
        document.getElementById('btnAction').innerText = "CẬP NHẬT DỮ LIỆU";
        window.scrollTo(0,0);
    }

    async function saveData() {
        const id = document.getElementById('editId').value;
        const payload = { department: document.getElementById('dpt').value, user_name: document.getElementById('usr').value, device_name: document.getElementById('dev').value, quantity: document.getElementById('qty').value, specs: document.getElementById('specs').value, proposal: document.getElementById('prop').value, os: document.getElementById('os').value, os_lic: document.getElementById('osL').value, office: document.getElementById('off').value, off_lic: document.getElementById('offL').value, specialized_pm: document.getElementById('pm').value, pm_lic: document.getElementById('pmL').value };
        
        if(id) await _sb.from('asset_management').update(payload).eq('id', id);
        else await _sb.from('asset_management').insert(payload);
        
        document.getElementById('masterForm').reset();
        document.getElementById('editId').value = '';
        document.getElementById('btnAction').innerText = "LƯU DỮ LIỆU";
        loadData();
    }

    function delData(id) {
        let p = prompt("Nhập mật khẩu Admin:");
        if (p === "ADMIN2026") { _sb.from('asset_management').delete().eq('id', id).then(loadData); }
    }

    function exportFile(type) {
        let blob = new Blob(['\ufeff', document.getElementById('printableArea').innerHTML], { type: 'application/vnd.ms-excel' });
        let a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = `Bao_Cao_Tai_San.${type === 'excel' ? 'xls' : 'doc'}`;
        a.click();
    }

    loadData();
</script>
</body>
</html>
