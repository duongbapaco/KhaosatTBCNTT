<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>QUẢN TRỊ TÀI SẢN CNTT 2026 - FULL OS DATA</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        body { font-family: 'Times New Roman', serif; }
        @media print { .no-print { display: none !important; } }
        .status-bar { padding: 5px 20px; font-size: 0.8rem; font-weight: bold; }
        .table-striped tbody tr:nth-of-type(odd) { background-color: #f2f2f2; }
        th { background: #333 !important; color: white !important; text-align: center; border: 1px solid #000 !important; }
        td { border: 1px solid #000 !important; vertical-align: middle; padding: 8px; }
        .form-section { background: #fff; padding: 20px; border: 1px solid #ddd; border-radius: 5px; }
        label { font-weight: bold; margin-bottom: 5px; display: block; font-size: 0.85rem; }
    </style>
</head>
<body class="bg-light">

<div id="statusBar" class="status-bar text-white bg-secondary no-print">Đang kết nối...</div>

<div class="container-fluid p-4">
    <h3 class="text-center fw-bold mb-4 no-print">HỆ THỐNG QUẢN TRỊ TÀI SẢN CNTT 2026</h3>

    <div class="form-section shadow-sm no-print mb-4">
        <form id="masterForm" class="row g-2">
            <div class="col-md-2"><label>Bộ phận</label><input type="text" id="dpt" class="form-control" required></div>
            <div class="col-md-2"><label>Người dùng</label><input type="text" id="usr" class="form-control" required></div>
            <div class="col-md-2"><label>Thiết bị</label><input type="text" id="dev" class="form-control"></div>
            <div class="col-md-1"><label>Số lượng</label><input type="number" id="qty" class="form-control" value="1"></div>
            
            <div class="col-md-2"><label>HĐH</label>
                <select id="os" class="form-select">
                    <optgroup label="Windows">
                        <option>Windows 11</option><option>Windows 10</option><option>Windows 8.1</option><option>Windows 8</option>
                        <option>Windows 7</option><option>Windows Vista</option><option>Windows XP</option><option>Windows 2000</option>
                        <option>Windows Me</option><option>Windows 98</option><option>Windows 95</option>
                    </optgroup>
                    <optgroup label="macOS">
                        <option>macOS Sequoia</option><option>macOS Sonoma</option><option>macOS Ventura</option><option>macOS Monterey</option>
                        <option>macOS Big Sur</option><option>macOS Catalina</option><option>OS X El Capitan</option>
                    </optgroup>
                    <optgroup label="Khác"><option>Linux Ubuntu</option><option>Linux Debian</option><option>Fedora</option><option>ChromeOS</option></optgroup>
                </select></div>
            
            <div class="col-md-3"><label>BQ HĐH</label><select id="osL" class="form-select"><option>Chưa có</option><option>Đã có bản quyền</option></select></div>
            <div class="col-md-3"><label>Office</label>
                <select id="off" class="form-select"><option>Microsoft 365</option><option>Office 2024</option><option>2021</option><option>2019</option><option>2016</option><option>2013</option><option>2010</option><option>2007</option><option>2003</option></select></div>
            <div class="col-md-3"><label>BQ Office</label><select id="offL" class="form-select"><option>Chưa có</option><option>Đã có bản quyền</option></select></div>
            <div class="col-md-3"><label>PM Chuyên ngành</label><input type="text" id="pm" class="form-control" list="pmList"><datalist id="pmList"><option value="Không có"><option value="ASIA"><option value="Quasoft"><option value="MISA"></datalist></div>
            <div class="col-md-3"><label>BQ PM</label><select id="pmL" class="form-select"><option>Chưa có</option><option>Đã có bản quyền</option></select></div>
            
            <div class="col-md-6"><label>Cấu hình chi tiết</label><input type="text" id="specs" class="form-control"></div>
            <div class="col-md-4"><label>Đề xuất</label><input type="text" id="prop" class="form-control"></div>
            <div class="col-md-2 d-flex align-items-end"><button type="submit" class="btn btn-dark w-100">Lưu dữ liệu</button></div>
        </form>
    </div>

    <div class="mb-3 no-print"><select id="filterDept" class="form-select" onchange="loadData()"><option value="">-- Lọc theo Bộ phận --</option></select></div>
    
    <table class="table table-striped table-hover" id="mainTable">
        <thead>
            <tr><th>Bộ phận</th><th>Người dùng</th><th>Thiết bị</th><th>SL</th><th>HĐH</th><th>BQ HĐH</th><th>Office</th><th>BQ Office</th><th>PM Chuyên ngành</th><th>BQ PM</th><th>Cấu hình</th><th>Đề xuất</th><th>QR</th><th class="no-print">Xử lý</th></tr>
        </thead>
        <tbody id="tableBody"></tbody>
    </table>
</div>

<script>
    const _sb = supabase.createClient('https://ckoersckkzygzuifplwj.supabase.co', 'sb_publishable_cfzmHqhoCkWwD2KZBEHZvw_xr5vVDbi');
    
    async function loadData() {
        const { data } = await _sb.from('asset_management').select('*');
        const fDept = document.getElementById('filterDept').value;
        const filtered = fDept ? data.filter(r => r.department === fDept) : data;
        
        document.getElementById('tableBody').innerHTML = (filtered || []).map(r => `
            <tr>
                <td>${r.department}</td><td>${r.user_name}</td><td>${r.device_name}</td><td>${r.quantity}</td>
                <td>${r.os_version}</td><td>${r.os_license}</td>
                <td>${r.office_version}</td><td>${r.office_license}</td>
                <td>${r.specialized_pm}</td><td>${r.pm_license}</td>
                <td>${r.specs}</td><td>${r.proposal}</td>
                <td><div id="qr-${r.id}"></div></td>
                <td class="no-print"><button class="btn btn-sm btn-danger" onclick="del(${r.id})">Xóa</button></td>
            </tr>`).join('');
        filtered.forEach(r => new QRCode(document.getElementById(`qr-${r.id}`), {text: String(r.id), width: 40, height: 40}));
    }

    document.getElementById('masterForm').onsubmit = async (e) => {
        e.preventDefault();
        await _sb.from('asset_management').insert([{
            department: document.getElementById('dpt').value, user_name: document.getElementById('usr').value,
            device_name: document.getElementById('dev').value, quantity: document.getElementById('qty').value,
            os_version: document.getElementById('os').value, os_license: document.getElementById('osL').value,
            office_version: document.getElementById('off').value, office_license: document.getElementById('offL').value,
            specialized_pm: document.getElementById('pm').value, pm_license: document.getElementById('pmL').value,
            specs: document.getElementById('specs').value, proposal: document.getElementById('prop').value
        }]);
        loadData();
    };

    function del(id) { if(prompt("Mật khẩu:")==="ADMIN2026") _sb.from('asset_management').delete().eq('id', id).then(loadData); }
    loadData();
</script>
</body>
</html>
