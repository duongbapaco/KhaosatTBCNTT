<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Hệ thống Quản trị Tài sản 2026</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        #qr-container { display: none; position: fixed; top: 10%; left: 50%; transform: translateX(-50%); background: white; padding: 25px; border: 3px solid #0d6efd; z-index: 9999; box-shadow: 0 0 30px rgba(0,0,0,0.5); text-align: center; border-radius: 15px; }
        #qrcode-preview { margin: 15px auto; width: 150px; height: 150px; }
        @media print { .no-print { display: none !important; } }
    </style>
</head>
<body class="bg-light p-4">

    <div id="qr-container" class="no-print">
        <h5 class="text-primary fw-bold">MÃ QR TÀI SẢN</h5>
        <div id="qrcode-preview"></div>
        <button class="btn btn-secondary mt-3" onclick="document.getElementById('qr-container').style.display='none'">Đóng</button>
    </div>

    <div class="card p-4 shadow" style="max-width: 1500px; margin: auto;">
        <h3 class="text-uppercase fw-bold text-primary mb-4">HỆ THỐNG QUẢN TRỊ TÀI SẢN 2026</h3>
        
        <form id="dataForm" class="row g-3 bg-white p-3 border rounded mb-4">
            <input type="hidden" id="editId">
            <div class="col-md-2"><label>Bộ phận</label><input type="text" id="dept" class="form-control" required></div>
            <div class="col-md-2"><label>Người dùng</label><input type="text" id="user" class="form-control" required></div>
            <div class="col-md-2"><label>Thiết bị</label><input type="text" id="device" class="form-control"></div>
            <div class="col-md-1"><label>SL</label><input type="number" id="qty" value="1" class="form-control"></div>
            <div class="col-md-2"><label>HĐH</label>
                <select id="os" class="form-select">
                    <optgroup label="Windows Desktop"><option>Windows 11</option><option>Windows 10</option><option>Windows 8.1</option><option>Windows 7</option><option>Windows Vista</option><option>Windows XP</option><option>Windows 2000</option><option>Windows 98/95</option></optgroup>
                    <optgroup label="Windows Server"><option>Server 2025</option><option>Server 2022</option><option>Server 2019</option><option>Server 2016</option><option>Server 2012</option><option>Server 2008</option></optgroup>
                    <optgroup label="Khác"><option>macOS Sequoia/Sonoma</option><option>Linux (Ubuntu/CentOS)</option></optgroup>
                </select>
            </div>
            <div class="col-md-1"><label>BQ HĐH</label><select id="os_license" class="form-select"><option>Chưa</option><option>Có</option></select></div>
            <div class="col-md-2"><label>Office</label>
                <select id="office" class="form-select">
                    <option>Microsoft 365</option><option>Office 2024</option><option>Office 2021</option><option>Office 2019</option><option>Office 2016</option><option>Office 2013</option><option>Office 2010</option><option>Office 2007</option><option>Office 2003</option><option>Office XP</option><option>Office 2000</option><option>Office 97</option>
                </select>
            </div>
            <div class="col-md-1"><label>BQ Office</label><select id="office_license" class="form-select"><option>Chưa</option><option>Có</option></select></div>
            <div class="col-md-2"><label>PM Chuyên ngành</label><input class="form-control" list="pmList" id="pm">
                <datalist id="pmList"><option value="ASIA Enterprise 2025"><option value="ASIA Standard"><option value="Quasoft ERP"><option value="MISA SME.NET 2024"><option value="MISA AMIS"><option value="FAST Accounting 11"><option value="BRAVO 8R3"><option value="SAP Business One"></datalist></div>
            <div class="col-md-1"><label>BQ PM</label><select id="pm_license" class="form-select"><option>Chưa</option><option>Có</option></select></div>
            <div class="col-md-5"><label>Cấu hình</label><input type="text" id="specs" class="form-control"></div>
            <div class="col-md-5"><label>Đề xuất</label><input type="text" id="proposal" class="form-control"></div>
            <div class="col-md-2 text-end pt-4"><button type="submit" class="btn btn-primary w-100">LƯU DỮ LIỆU</button></div>
            <div class="col-12 text-end">
                <button type="button" class="btn btn-warning" onclick="window.print()">🖨️ In Báo Cáo</button>
                <button type="button" class="btn btn-success" onclick="exportFile('xlsx')">📊 Xuất Excel</button>
                <button type="button" class="btn btn-info" onclick="exportFile('doc')">📄 Xuất Word</button>
            </div>
        </form>

        <table class="table table-bordered table-hover" id="reportTable">
            <thead class="table-dark"><tr><th>Thông tin</th><th>SL</th><th>HĐH</th><th>Office</th><th>PM Chuyên ngành</th><th>Cấu hình</th><th>Thao tác</th></tr></thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>

<script>
    const _sb = supabase.createClient('https://ckoersckkzygzuifplwj.supabase.co', 'sb_publishable_cfzmHqhoCkWwD2KZBEHZvw_xr5vVDbi');
    const PASS = "123456";

    function secureAction(type, data) {
        let p = prompt("Nhập mật khẩu (ẩn):");
        if (p === PASS) { if (type === 'delete') deleteRow(data); else editRow(data); }
        else if (p !== null) alert("Mật khẩu sai!");
    }

    async function loadData() {
        const { data } = await _sb.from('survey_devices').select('*').order('id', {ascending: false});
        if(data) {
            document.getElementById('tableBody').innerHTML = data.map(r => `<tr>
                <td><b>${r.department}</b><br>${r.full_name}<br>${r.device_name}</td>
                <td>${r.quantity}</td><td>${r.os}</td><td>${r.office_version}</td><td>${r.special_pm}</td><td>${r.specs}</td>
                <td>
                    <button class="btn btn-sm btn-secondary" onclick="showQR('${r.id}')">QR</button>
                    <button class="btn btn-sm btn-info" onclick="secureAction('edit', ${JSON.stringify(r).replace(/"/g, '&quot;')})">Sửa</button>
                    <button class="btn btn-sm btn-danger" onclick="secureAction('delete', '${r.id}')">Xóa</button>
                </td>
            </tr>`).join('');
        }
    }

    function editRow(r) { document.getElementById('editId').value=r.id; document.getElementById('dept').value=r.department; document.getElementById('user').value=r.full_name; document.getElementById('device').value=r.device_name; document.getElementById('qty').value=r.quantity; document.getElementById('os').value=r.os; document.getElementById('office').value=r.office_version; document.getElementById('pm').value=r.special_pm; document.getElementById('specs').value=r.specs; document.getElementById('proposal').value=r.proposal; window.scrollTo(0,0); }
    async function deleteRow(id) { await _sb.from('survey_devices').delete().eq('id', id); loadData(); }
    function exportFile(type) { const t = document.getElementById("reportTable"); if(type==='xlsx') XLSX.writeFile(XLSX.utils.table_to_book(t), "BaoCao.xlsx"); else { const b = new Blob([t.outerHTML], {type: "application/msword"}); const u = URL.createObjectURL(b); const a = document.createElement("a"); a.href = u; a.download = "BaoCao.doc"; a.click(); } }
    function showQR(id) { document.getElementById("qrcode-preview").innerHTML = ""; new QRCode(document.getElementById("qrcode-preview"), id); document.getElementById("qr-container").style.display = "block"; }
    
    document.getElementById('dataForm').onsubmit = async (e) => { e.preventDefault(); const p = { department: document.getElementById('dept').value, full_name: document.getElementById('user').value, device_name: document.getElementById('device').value, quantity: document.getElementById('qty').value, os: document.getElementById('os').value, office_version: document.getElementById('office').value, special_pm: document.getElementById('pm').value, specs: document.getElementById('specs').value, proposal: document.getElementById('proposal').value }; const id = document.getElementById('editId').value; if(id) await _sb.from('survey_devices').update(p).eq('id', id); else await _sb.from('survey_devices').insert([p]); loadData(); document.getElementById('dataForm').reset(); };
    loadData();
</script>
</body>
</html>
