<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Hệ thống Kiểm kê CNTT 2026</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        .status-pill { padding: 5px 15px; border-radius: 20px; font-weight: bold; }
        .bg-connected { background: #d4edda; color: #155724; }
        .bg-disconnected { background: #f8d7da; color: #721c24; }
        #qrModal { display:none; position:fixed; top:50%; left:50%; transform:translate(-50%, -50%); background:#fff; padding:30px; border:3px solid #0d6efd; z-index: 99999; text-align:center; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
    </style>
</head>
<body class="bg-light p-4">

<div class="card shadow p-4" style="max-width: 1200px; margin: auto;">
    <h4 class="text-primary mb-4">PHIẾU KIỂM KÊ CNTT 2026</h4>
    <form id="surveyForm" class="mb-5">
        <div class="row g-3">
            <div class="col-md-3"><label>Bộ phận</label><input type="text" id="dept" class="form-control" required></div>
            <div class="col-md-3"><label>Người dùng</label><input type="text" id="user" class="form-control" required></div>
            <div class="col-md-3"><label>Ngày kiểm kê</label><input type="date" id="check_date" class="form-control" required></div>
            <div class="col-md-3"><label>Tình trạng</label><select id="status_device" class="form-select"><option>Tốt</option><option>Cần bảo trì</option><option>Hỏng</option></select></div>
            
            <div class="col-md-6"><label>Tên thiết bị</label><input type="text" id="device" class="form-control" required></div>
            <div class="col-md-6"><label>Cấu hình chi tiết</label><input type="text" id="specs" class="form-control" required></div>

            <div class="col-md-4"><label>Hệ điều hành</label>
                <select id="os" class="form-select"><option>Windows 11</option><option>Windows 10</option><option>Windows 7</option><option>macOS</option><option>Linux</option></select>
            </div>
            <div class="col-md-2"><label>BQ HĐH</label><select id="os_license" class="form-select"><option>Chưa</option><option>Có</option></select></div>

            <div class="col-md-4"><label>Bộ Office</label>
                <select id="office" class="form-select"><option>Office 365</option><option>Office 2021</option><option>Office 2019</option><option>Office 2010</option></select>
            </div>
            <div class="col-md-2"><label>BQ Office</label><select id="office_license" class="form-select"><option>Chưa</option><option>Có</option></select></div>

            <div class="col-md-4"><label>Phần mềm chuyên ngành</label>
                <select id="others" class="form-select"><option value="ASIA Soft">ASIA Soft</option><option value="Quasoft">Quasoft</option><option value="MISA SME">MISA SME</option><option value="FAST">FAST</option></select>
            </div>
            <div class="col-md-2"><label>BQ PM khác</label><select id="others_license" class="form-select"><option>Chưa</option><option>Có</option></select></div>
            
            <div class="col-12"><label>Đề xuất / Kiến nghị</label><textarea id="note" class="form-control" rows="2"></textarea></div>

            <div class="col-12 d-flex gap-2">
                <button type="submit" class="btn btn-primary flex-grow-1">Lưu dữ liệu</button>
                <button type="button" onclick="exportReport()" class="btn btn-success">Xuất báo cáo hành chính</button>
            </div>
        </div>
    </form>

    <table class="table table-bordered"><thead class="table-dark"><tr><th>Thiết bị</th><th>Người dùng</th><th>Cấu hình</th><th>PM</th><th>Thao tác</th><th>QR</th></tr></thead><tbody id="tableBody"></tbody></table>
</div>

<div id="qrModal"><img id="qrImage" src="" style="width: 200px; height: 200px;"><br><br><button class="btn btn-secondary" onclick="document.getElementById('qrModal').style.display='none'">Đóng</button></div>

<script>
    const _sb = supabase.createClient('https://ckoersckkzygzuifplwj.supabase.co', 'sb_publishable_cfzmHqhoCkWwD2KZBEHZvw_xr5vVDbi');

    async function init() {
        const { data } = await _sb.from('survey_devices').select('*');
        if (data) document.getElementById('tableBody').innerHTML = data.map(r => `<tr><td>${r.device_name}</td><td>${r.full_name}</td><td>${r.specs}</td><td>${r.other_software}</td><td><button class="btn btn-sm btn-danger" onclick="deleteRow(${r.id})">Xóa</button></td><td><button class="btn btn-sm btn-info" onclick="showQR('${r.device_name}', '${r.full_name}')">QR</button></td></tr>`).join('');
    }

    function showQR(d, u) { document.getElementById('qrImage').src = "https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=" + encodeURIComponent("TB: " + d + " | SD: " + u); document.getElementById('qrModal').style.display = 'block'; }

    async function deleteRow(id) { await _sb.from('survey_devices').delete().eq('id', id); init(); }

    document.getElementById('surveyForm').onsubmit = async (e) => {
        e.preventDefault();
        const data = {
            department: document.getElementById('dept').value, full_name: document.getElementById('user').value,
            check_date: document.getElementById('check_date').value, status_device: document.getElementById('status_device').value,
            device_name: document.getElementById('device').value, specs: document.getElementById('specs').value,
            os: document.getElementById('os').value, os_license: document.getElementById('os_license').value,
            office_version: document.getElementById('office').value, office_license: document.getElementById('office_license').value,
            other_software: document.getElementById('others').value, others_license: document.getElementById('others_license').value,
            suggestions: document.getElementById('note').value
        };
        await _sb.from('survey_devices').insert([data]); alert("Lưu thành công!"); init();
    };

    function exportReport() {
        _sb.from('survey_devices').select('*').then(({data}) => {
            const report = [["CƠ QUAN...", "", "", "CỘNG HÒA XÃ HỘI CHỦ NGHĨA VIỆT NAM"], ["TÊN ĐƠN VỊ...", "", "", "Độc lập - Tự do - Hạnh phúc"], [], ["BÁO CÁO KIỂM KÊ CNTT"], [], ["STT", "Ngày", "Người dùng", "Thiết bị", "Cấu hình", "PM Chuyên ngành"]];
            data.forEach((r, i) => report.push([i+1, r.check_date, r.full_name, r.device_name, r.specs, r.other_software]));
            const wb = XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(report), "BaoCao"); XLSX.writeFile(wb, "Bao_cao_Kiem_ke_Hanh_chinh.xlsx");
        });
    }
    init();
</script>
</body>
</html>
