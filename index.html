<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>QUẢN TRỊ TÀI SẢN CNTT 2026 - TOÀN DIỆN</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        body { font-family: 'Times New Roman', serif; }
        @media print { .no-print { display: none !important; } }
        .status-bar { padding: 5px 20px; font-size: 0.8rem; font-weight: bold; }
        .table-striped tbody tr:nth-of-type(odd) { background-color: #f2f2f2; }
        th { background-color: #333 !important; color: white !important; text-align: center; border: 1px solid #000 !important; }
        td { border: 1px solid #000 !important; vertical-align: middle; padding: 8px; }
        .form-section { background: #fff; padding: 20px; border: 1px solid #ddd; border-radius: 5px; }
        label { font-weight: bold; margin-bottom: 5px; display: block; font-size: 0.85rem; }
    </style>
</head>
<body class="bg-light">

<div id="statusBar" class="status-bar text-white bg-secondary no-print">Đang kiểm tra kết nối Supabase...</div>

<div class="container-fluid p-4">
    <h3 class="text-center fw-bold mb-4 no-print">HỆ THỐNG QUẢN TRỊ TÀI SẢN CNTT 2026</h3>

    <div class="form-section shadow-sm no-print mb-4">
        <form id="masterForm" class="row g-2">
            <div class="col-md-2"><label>Bộ phận</label><input type="text" id="dpt" class="form-control" required></div>
            <div class="col-md-2"><label>Người dùng</label><input type="text" id="usr" class="form-control" required></div>
            <div class="col-md-2"><label>Thiết bị</label><input type="text" id="dev" class="form-control"></div>
            <div class="col-md-1"><label>Số lượng</label><input type="number" id="qty" class="form-control" value="1"></div>
            <div class="col-md-2"><label>Hệ điều hành</label><select id="os" class="form-select"><optgroup label="Windows"><option>Windows 11</option><option>Windows 10</option><option>Windows 7</option></optgroup></select></div>
            <div class="col-md-3"><label>Tình trạng Bản quyền HĐH</label><select id="osL" class="form-select"><option>Chưa có</option><option>Đã có bản quyền</option></select></div>
            
            <div class="col-md-3"><label>Phần mềm Office</label><select id="off" class="form-select"><option>Microsoft 365</option><option>Office 2024</option><option>Office 2021</option><option>Office 2019</option><option>Office 2016</option></select></div>
            <div class="col-md-3"><label>Tình trạng Bản quyền Office</label><select id="offL" class="form-select"><option>Chưa có</option><option>Đã có bản quyền</option></select></div>
            <div class="col-md-3"><label>PM Chuyên ngành</label><input type="text" id="pm" class="form-control" list="pmList"><datalist id="pmList"><option value="ASIA"><option value="Quasoft"><option value="MISA"></datalist></div>
            <div class="col-md-3"><label>Tình trạng Bản quyền PM</label><select id="pmL" class="form-select"><option>Chưa có</option><option>Đã có bản quyền</option></select></div>
            
            <div class="col-md-4"><label>Cấu hình chi tiết</label><input type="text" id="specs" class="form-control"></div>
            <div class="col-md-4"><label>Đề xuất</label><input type="text" id="prop" class="form-control"></div>
            <div class="col-md-4 d-flex align-items-end"><button type="submit" class="btn btn-dark w-100">Lưu dữ liệu</button></div>
        </form>
    </div>

    <div class="row mb-3 g-2 no-print">
        <div class="col-md-3">
            <select id="filterDept" class="form-select" onchange="loadData()">
                <option value="">-- Lọc theo Bộ phận (Tất cả) --</option>
            </select>
        </div>
        <div class="col-md-9 text-end">
            <button class="btn btn-success" onclick="exportExcel()">📊 Xuất Excel</button>
            <button class="btn btn-secondary" onclick="window.print()">🖨️ In Báo Cáo</button>
        </div>
    </div>

    <table class="table table-striped table-hover" id="mainTable">
        <thead>
            <tr><th>Bộ phận</th><th>Người dùng</th><th>Thiết bị</th><th>SL</th><th>HĐH</th><th>Bản quyền HĐH</th><th>Office</th><th>Bản quyền Office</th><th>PM Chuyên ngành</th><th>Bản quyền PM</th><th>Cấu hình</th><th>Đề xuất</th><th>QR</th><th class="no-print">Sửa/Xóa</th></tr>
        </thead>
        <tbody id="tableBody"></tbody>
    </table>
</div>

<script>
    const _sb = supabase.createClient('https://ckoersckkzygzuifplwj.supabase.co', 'sb_publishable_cfzmHqhoCkWwD2KZBEHZvw_xr5vVDbi');
    const statusDiv = document.getElementById('statusBar');

    async function checkConnection() {
        try {
            const { error } = await _sb.from('asset_management').select('id').limit(1);
            if (error) throw error;
            statusDiv.className = 'status-bar text-white bg-success';
            statusDiv.innerText = '● Đã kết nối với Supabase Online';
        } catch (e) {
            statusDiv.className = 'status-bar text-white bg-danger';
            statusDiv.innerText = '● Lỗi kết nối Supabase: ' + e.message;
        }
    }

    async function loadData() {
        const { data } = await _sb.from('asset_management').select('*');
        const fDept = document.getElementById('filterDept').value;
        const depts = [...new Set(data.map(r => r.department))];
        const fSelect = document.getElementById('filterDept');
        depts.forEach(d => { if(!fSelect.querySelector(`option[value="${d}"]`)) fSelect.innerHTML += `<option value="${d}">${d}</option>`; });

        const filtered = fDept ? data.filter(r => r.department === fDept) : data;
        document.getElementById('tableBody').innerHTML = (filtered || []).map(r => `
            <tr>
                <td>${r.department}</td><td>${r.user_name}</td><td>${r.device_name}</td><td>${r.quantity}</td>
                <td>${r.os_version}</td><td>${r.os_license}</td>
                <td>${r.office_version}</td><td>${r.office_license}</td>
                <td>${r.specialized_pm}</td><td>${r.pm_license}</td>
                <td>${r.specs}</td><td>${r.proposal}</td>
                <td><div id="qr-${r.id}"></div></td>
                <td class="no-print"><button class="btn btn-sm btn-warning">Sửa</button> <button class="btn btn-sm btn-danger" onclick="del(${r.id})">Xóa</button></td>
            </tr>`).join('');
        filtered.forEach(r => new QRCode(document.getElementById(`qr-${r.id}`), {text: String(r.id), width: 40, height: 40}));
    }

    function exportExcel() { XLSX.writeFile(XLSX.utils.table_to_book(document.getElementById('mainTable')), "BaoCao_TaiSan_2026.xlsx"); }
    function del(id) { if(prompt("Nhập mật khẩu:")==="ADMIN2026") _sb.from('asset_management').delete().eq('id', id).then(loadData); }
    
    checkConnection();
    loadData();
</script>
</body>
</html>
